function getWordMeta(word){return{jlpt:'N3',lesson:null,...(WORD_META[word.dict]||{})};}
function wordKind(word){return isAdjective(word)?word.group:'verb';}
function wordKey(word){return`${word.group}:${word.dict}`;}
function filterWordsForPrefs(words,prefs=DEFAULT_PREFS,wordLists=[]){
  const levels=prefs.jlptLevels&&prefs.jlptLevels.length?prefs.jlptLevels:JLPT_LEVELS;
  const types=prefs.wordTypes&&prefs.wordTypes.length?prefs.wordTypes:WORD_TYPE_OPTIONS.map(o=>o.id);
  const selectedLists=prefs.wordListIds&&prefs.wordListIds.length?prefs.wordListIds:[];
  const allowedKeys=selectedLists.length?new Set(wordLists.filter(l=>selectedLists.includes(l.id)).flatMap(l=>l.wordKeys||[])):null;
  return words.filter(w=>levels.includes(getWordMeta(w).jlpt)&&types.includes(wordKind(w))&&(!allowedKeys||allowedKeys.has(wordKey(w))));
}

const ROMAJI_MAP={

  sha:'しゃ',shu:'しゅ',sho:'しょ',shi:'し',cha:'ちゃ',chu:'ちゅ',cho:'ちょ',chi:'ち',tsu:'つ',

  bya:'びゃ',byu:'びゅ',byo:'びょ',pya:'ぴゃ',pyu:'ぴゅ',pyo:'ぴょ',
  mya:'みゃ',myu:'みゅ',myo:'みょ',rya:'りゃ',ryu:'りゅ',ryo:'りょ',
  ja:'じゃ',ju:'じゅ',jo:'じょ',ji:'じ',
  ka:'か',ki:'き',ku:'く',ke:'け',ko:'こ',ga:'が',gi:'ぎ',gu:'ぐ',ge:'げ',go:'ご',
  sa:'さ',su:'す',se:'せ',so:'そ',si:'し',za:'ざ',zu:'ず',ze:'ぜ',zo:'ぞ',zi:'じ',
  ta:'た',te:'て',to:'と',ti:'ち',tu:'つ',da:'だ',di:'ぢ',du:'づ',de:'で',do:'ど',
  na:'な',ni:'に',nu:'ぬ',ne:'ね',no:'の',ha:'は',hi:'ひ',fu:'ふ',he:'へ',ho:'ほ',hu:'ふ',
  ba:'ば',bi:'び',bu:'ぶ',be:'べ',bo:'ぼ',pa:'ぱ',pi:'ぴ',pu:'ぷ',pe:'ぺ',po:'ぽ',
  ma:'ま',mi:'み',mu:'む',me:'め',mo:'も',ya:'や',yu:'ゆ',yo:'よ',
  ra:'ら',ri:'り',ru:'る',re:'れ',ro:'ろ',wa:'わ',wo:'を',

function toHiragana(s){
  if(!s)return'';
  s=s.toLowerCase().trim();
  let out='',i=0;
  while(i<s.length){
    const ch=s[i];
    if(ch.charCodeAt(0)>127){out+=ch;i++;continue;}
    if(/\s/.test(ch)){i++;continue;}
    if(ch==='n'){const nx=s[i+1];if(nx===undefined||nx==='n'||!/[aiueoy]/.test(nx)){out+='ん';i++;continue;}}
    if(i<s.length-1&&/[bcdfghjkmpqrstvwxyz]/.test(ch)&&s[i]===s[i+1]){out+='っ';i++;continue;}
    let matched=false;
    for(let len=3;len>=1;len--){const sub=s.slice(i,i+len);if(ROMAJI_MAP[sub]){out+=ROMAJI_MAP[sub];i+=len;matched=true;break;}}
    if(!matched){out+=ch;i++;}
  }

}
function isAllKana(s){
  if(!s)return false;
  for(const ch of s){const c=ch.charCodeAt(0);if(!((c>=0x3040&&c<=0x309F)||(c>=0x30A0&&c<=0x30FF)))return false;}
  return true;
}

const A_ROW={う:'わ',く:'か',ぐ:'が',す:'さ',つ:'た',ぬ:'な',ぶ:'ば',む:'ま',る:'ら'};
const I_ROW={う:'い',く:'き',ぐ:'ぎ',す:'し',つ:'ち',ぬ:'に',ぶ:'び',む:'み',る:'り'};
const E_ROW={う:'え',く:'け',ぐ:'げ',す:'せ',つ:'て',ぬ:'ね',ぶ:'べ',む:'め',る:'れ'};

const PAST_END={く:'いた',ぐ:'いだ',す:'した',つ:'った',う:'った',る:'った',ぬ:'んだ',ぶ:'んだ',む:'んだ'};
const TE_END={く:'いて',ぐ:'いで',す:'して',つ:'って',う:'って',る:'って',ぬ:'んで',ぶ:'んで',む:'んで'};

function conjugate(verb,type){

      'te-form':te,'potential':stem+'られる','volitional':stem+'よう','conditional-tara':past+'ら','conditional-ba':stem+'れば',
      'imperative':stem+'ろ','passive':stem+'られる','causative':stem+'させる','causative-passive':stem+'させられる',
      'desiderative':stem+'たい','progressive':te+'いる','negative-te':neg+'で','prohibition':reading+'な'
    };

  if(group==='godan'){

      'te-form':te,'potential':stem+E_ROW[last]+'る','volitional':stem+O_ROW[last]+'う','conditional-tara':past+'ら','conditional-ba':stem+E_ROW[last]+'ば',
      'imperative':stem+E_ROW[last],'passive':stem+A_ROW[last]+'れる','causative':stem+A_ROW[last]+'せる','causative-passive':stem+A_ROW[last]+'せられる',
      'desiderative':stem+I_ROW[last]+'たい','progressive':te+'いる','negative-te':neg+'で','prohibition':reading+'な'
    };

  }
  if(group==='suru'){
    const stem=reading.endsWith('する')?reading.slice(0,-2):'';
    const M={
      'plain-present':'する','plain-past':'した','plain-negative':'しない','plain-past-negative':'しなかった',
      'polite-present':'します','polite-past':'しました','polite-negative':'しません','polite-past-negative':'しませんでした',
      'te-form':'して','potential':'できる','volitional':'しよう','conditional-tara':'したら','conditional-ba':'すれば',
      'imperative':'しろ','passive':'される','causative':'させる','causative-passive':'させられる',
      'desiderative':'したい','progressive':'している','negative-te':'しないで','prohibition':'するな'
    };
    return stem+(M[type]||'');
  }
  if(group==='kuru'){
    const stem=reading.endsWith('くる')?reading.slice(0,-2):'';
    const M={
      'plain-present':'くる','plain-past':'きた','plain-negative':'こない','plain-past-negative':'こなかった',
      'polite-present':'きます','polite-past':'きました','polite-negative':'きません','polite-past-negative':'きませんでした',
      'te-form':'きて','potential':'こられる','volitional':'こよう','conditional-tara':'きたら','conditional-ba':'くれば',
      'imperative':'こい','passive':'こられる','causative':'こさせる','causative-passive':'こさせられる',
      'desiderative':'きたい','progressive':'きている','negative-te':'こないで','prohibition':'くるな'
    };
    return stem+(M[type]||'');
  }
  return'';
}

function adjectiveStem(adj){
  const reading=adj.reading;
  if(adj.irregular||reading==='いい'||reading==='かっこいい')return reading.slice(0,-2)+'よ';

function conjugateAdjective(adj,type){
  const{reading,group}=adj;

      'adj-tara':stem+'だったら','adj-sou':stem+'そう','adj-sugiru':stem+'すぎる','adj-naru':stem+'になる'

  }

}
function conjugateItem(item,type){return item.group==='i-adjective'||item.group==='na-adjective'?conjugateAdjective(item,type):conjugate(item,type);}

function diagnose(verb,type,userAnswer){
  const got=toHiragana(userAnswer);
  if(!got)return'';
  for(const t of CONJ_TYPES){if(t.id===type)continue;if(conjugate(verb,t.id)===got)return`That's the ${t.label.toLowerCase()} form — wrong conjugation pattern.`;}

  return'';
}
function diagnoseItem(item,type,userAnswer){
  if(!isAdjective(item))return diagnose(item,type,userAnswer);
  const got=toHiragana(userAnswer);
  if(!got)return'';
  for(const t of ADJ_TYPES){if(t.id===type)continue;if(conjugateAdjective(item,t.id)===got)return`That's the ${t.label.toLowerCase()} form, but this card asks for ${getTypeInfo(type).label.toLowerCase()}.`;}
  const other=item.group==='i-adjective'?'na-adjective':'i-adjective';
  try{if(conjugateAdjective({...item,group:other},type)===got)return`You used the ${other==='i-adjective'?'い-adjective':'な-adjective'} pattern, but ${item.dict} is ${GROUP_NAMES[item.group]}.`;}catch{}
  return'';
}

  if(!g)return null;
  const v=g.toLowerCase();
  if(v.includes('ichidan')||v.includes('ru-verb')||v.includes('group 2'))return'ichidan';
  if(v.includes('godan')||v.includes('u-verb')||v.includes('group 1'))return'godan';
  if(v.includes('suru'))return'suru';
  if(v.includes('kuru'))return'kuru';
  return null;
}
function extractJSON(text){
  for(let i=0;i<text.length;i++){
    if(text[i]!=='{')continue;
    let depth=0,inStr=false;
    for(let j=i;j<text.length;j++){
      const c=text[j];
      if(inStr){if(c==='\\')j++;else if(c==='"')inStr=false;}
      else if(c==='"')inStr=true;
      else if(c==='{')depth++;
      else if(c==='}'){if(!--depth){try{return JSON.parse(text.slice(i,j+1));}catch(e){break;}}}
    }
  }
  return null;
}

async function callGemini(contents,apiKey,maxTokens=600,temp=0.7,systemText=AI_SYSTEM){
  if(!apiKey)throw new Error('No Gemini API key — add it in Settings.');
  const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${encodeURIComponent(apiKey)}`,
    {method:'POST',headers:{'Content-Type':'application/json'},
     body:JSON.stringify({contents,systemInstruction:{parts:[{text:systemText}]},generationConfig:{maxOutputTokens:maxTokens,temperature:temp}})});
  const d=await r.json();
  if(!r.ok)throw new Error(d.error?.message||`HTTP ${r.status}`);
  return geminiText(d);
}

async function lookupVerbWithGemini(query,apiKey){
  if(!apiKey)throw new Error('No Gemini API key set');
  const prompt=`Look up this Japanese verb: "${query}"\n\nReturn ONLY a JSON object (no markdown, no extra text):\n{"dict":"kanji/kana dictionary form","reading":"hiragana only","meaning":"English meaning starting with to","group":"ichidan or godan or suru or kuru"}\n\nIf the input is English or romaji, find the most common Japanese verb for that meaning.`;
  const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${encodeURIComponent(apiKey)}`,
    {method:'POST',headers:{'Content-Type':'application/json'},
     body:JSON.stringify({contents:[{role:'user',parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:1024,temperature:0.1,thinkingConfig:{thinkingBudget:0}}})});
  const d=await r.json();
  if(!r.ok)throw new Error(d.error?.message||`HTTP ${r.status}`);
  const result=extractJSON(geminiText(d));
  if(result)result.group=normalizeGroup(result.group);
  if(!result||!result.dict||!result.reading||!result.meaning||!result.group)
    throw new Error('Unexpected AI response — try a different input');
  return result;
}

async function getSuggestedVerb(existingVerbs,apiKey){
  if(!apiKey)throw new Error('No Gemini API key set');
  const list=existingVerbs.map(v=>`${v.dict} (${v.reading}) — ${v.meaning} [${v.group}]`).join('\n');
  const prompt=`I'm learning Japanese verb conjugation with an SRS app. Here are the ${existingVerbs.length} verbs I'm already studying:\n\n${list}\n\nBased on my current vocabulary, suggest ONE new verb to add next. Consider JLPT frequency, useful patterns I haven't covered, and what learners at this level typically need. Do NOT suggest any verb already in my list.\n\nReturn ONLY a JSON object (no markdown):\n{"dict":"e.g. 始める","reading":"e.g. はじめる","meaning":"e.g. to begin","group":"ichidan or godan or suru or kuru","reason":"One sentence explaining why this is a good next verb for me."}`;
  const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${encodeURIComponent(apiKey)}`,
    {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{role:'user',parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:1024,temperature:0.9,thinkingConfig:{thinkingBudget:0}}})});
  const d=await r.json();
  if(!r.ok)throw new Error(d.error?.message||`HTTP ${r.status}`);
  const result=extractJSON(geminiText(d));
  if(result)result.group=normalizeGroup(result.group);
  if(!result||!result.dict||!result.reading||!result.meaning||!result.group)throw new Error('Unexpected AI response');
  return result;
}

function buildContext(verb,type,userAnswer,expected,explanation){
  const ti=getTypeInfo(type);
  const label=isAdjective(verb)?'Adjective':'Verb';
  return`I'm studying Japanese and just got this wrong.\n\n${label}: ${verb.dict} (${verb.reading}) — ${verb.meaning}\nType: ${GROUP_NAMES[verb.group]}\nTask: ${ti.label} (${ti.hint})\nMy answer: ${toHiragana(userAnswer)||'(blank)'}\nCorrect: ${expected}\n\nAuto-explanation: ${explanation.intro} ${explanation.rule}${explanation.derivation&&explanation.derivation!==expected?'\nStep: '+explanation.derivation:''}${explanation.note?'\nNote: '+explanation.note:''}\n\nHelp me understand why the answer is ${expected} and where I went wrong. Always show romaji.`;
}

function ChatPanel({verb,type,userAnswer,expected,explanation,geminiKey}){
  const[apiHistory,setApiHistory]=useState([]);
  const[display,setDisplay]=useState([]);
  const[input,setInput]=useState('');
  const[loading,setLoading]=useState(true);
  const endRef=useRef(null);
  const context=useMemo(()=>buildContext(verb,type,userAnswer,expected,explanation),[]);

  useEffect(()=>{
    const init=[{role:'user',content:context}];
    const geminiMsgs=init.map(m=>({role:m.role==='assistant'?'model':'user',parts:[{text:m.content}]}));
    callGemini(geminiMsgs,geminiKey)
      .then(reply=>{setApiHistory([...init,{role:'assistant',content:reply}]);setDisplay([{role:'assistant',content:reply}]);})
      .catch(e=>setDisplay([{role:'assistant',content:`Error: ${e.message}`}]))
      .finally(()=>setLoading(false));
  },[]);

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'});},[display,loading]);

  async function send(){
    if(!input.trim()||loading)return;
    const txt=input;setInput('');
    const newDisplay=[...display,{role:'user',content:txt}];
    setDisplay(newDisplay);setLoading(true);
    const newApi=[...apiHistory,{role:'user',content:txt}];
    try{
      const geminiMsgs=newApi.map(m=>({role:m.role==='assistant'?'model':'user',parts:[{text:m.content}]}));
      const reply=await callGemini(geminiMsgs,geminiKey);
      setApiHistory([...newApi,{role:'assistant',content:reply}]);
      setDisplay([...newDisplay,{role:'assistant',content:reply}]);
    }catch(e){setDisplay([...newDisplay,{role:'assistant',content:`Error: ${e.message}`}]);}
    setLoading(false);
  }

  return(
    <div className="mt-3 pt-3 border-t border-rose-200">
      <div className="text-xs font-medium text-stone-500 mb-2 flex items-center gap-1.5"><IconChat className="w-3.5 h-3.5"/>Chat with Gemini</div>
      <div className="space-y-2 max-h-56 overflow-y-auto pb-1">
        {loading&&!display.length&&<div className="text-sm text-stone-400 italic px-3 py-2">Gemini is thinking…</div>}
        {display.map((m,i)=>(
          <div key={i} style={{whiteSpace:'pre-wrap'}}
            className={`text-sm px-3 py-2 rounded-lg leading-relaxed ${m.role==='assistant'?'bg-white border border-stone-200 text-stone-800':'bg-indigo-50 border border-indigo-100 text-indigo-900 ml-6 text-right'}`}>
            {m.content}
          </div>
        ))}
        {loading&&display.length>0&&<div className="text-sm text-stone-400 italic px-3">Gemini is thinking…</div>}
        <div ref={endRef}/>
      </div>
      <div className="flex gap-2 mt-2">
        <input type="text" value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();send();}}}
          placeholder="Ask a follow-up…" disabled={loading}
          autoCorrect="off" spellCheck="false"
          className="flex-1 px-3 py-1.5 text-sm border border-stone-200 rounded-lg focus:border-indigo-500 focus:outline-none disabled:opacity-50"/>
        <button onClick={send} disabled={loading||!input.trim()}
          className="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-40 text-white rounded-lg text-sm font-medium">Send</button>
      </div>
    </div>
  );
}

const DAY=86400000;
function localDateKey(offsetDays=0){const d=new Date(Date.now()+offsetDays*DAY);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function defaultState(){return{cards:{},verbStats:{},mistakes:[],shadow:{attempted:0,totalRating:0,byScenario:{}},game:{played:0,bestScore:0,bestCombo:0},enabledTypes:[...CONJ_TYPES.filter(t=>t.id!=='plain-present').map(t=>t.id),...ADJ_TYPES.filter(t=>t.id!=='adj-plain-present').map(t=>t.id)],session:{reviewed:0,correct:0},daily:{date:localDateKey(),count:0,goalHit:false,goalStreak:0,bestGoalStreak:0,currentAnswerStreak:0,bestAnswerStreak:0},classify:{attempted:0,correct:0,byGroup:{}}};}
function mergeState(saved,sessionOverride){
  const base=defaultState();
  const merged={...base,...(saved||{}),verbStats:(saved&&saved.verbStats)||{},mistakes:Array.isArray(saved&&saved.mistakes)?saved.mistakes:[],shadow:(saved&&saved.shadow)||base.shadow,game:(saved&&saved.game)||base.game,daily:(saved&&saved.daily)||base.daily,classify:(saved&&saved.classify)||base.classify,session:sessionOverride||base.session};
  if(saved&&Array.isArray(saved.enabledTypes)&&!saved.enabledTypes.some(id=>id.startsWith('adj-'))){
    merged.enabledTypes=[...saved.enabledTypes,...base.enabledTypes.filter(id=>id.startsWith('adj-'))];
  }
  return merged;
}
function bumpDaily(daily,correct,dailyGoal){
  const today=localDateKey(),yesterday=localDateKey(-1);
  let d=daily||{};
  if(d.date!==today){
    const keepGoalStreak=d.date===yesterday&&d.goalHit;
    d={date:today,count:0,goalHit:false,goalStreak:keepGoalStreak?(d.goalStreak||0):0,bestGoalStreak:d.bestGoalStreak||0,currentAnswerStreak:0,bestAnswerStreak:d.bestAnswerStreak||0};
  }
  const count=(d.count||0)+1;
  const wasGoalHit=!!d.goalHit;
  const goalHit=count>=dailyGoal;
  const goalStreak=(d.goalStreak||0)+(!wasGoalHit&&goalHit?1:0);
  const currentAnswerStreak=correct?(d.currentAnswerStreak||0)+1:0;
  return{...d,count,goalHit,goalStreak,bestGoalStreak:Math.max(d.bestGoalStreak||0,goalStreak),currentAnswerStreak,bestAnswerStreak:Math.max(d.bestAnswerStreak||0,currentAnswerStreak)};
}
function recordMistake(mistakes,item,type,promptType,userAnswer,expected){
  const key=`${item.group}|${item.dict}|${type}|${promptType||'dictionary'}`;
  const now=Date.now();
  const prior=(mistakes||[]).find(m=>m.key===key);
  const fresh={key,dict:item.dict,reading:item.reading,meaning:item.meaning,group:item.group,type,promptType:promptType||null,userAnswer,expected,at:now,count:(prior?.count||0)+1,resolved:false};
  return[fresh,...(mistakes||[]).filter(m=>m.key!==key)].slice(0,50);
}
function markMistakeResolved(mistakes,key){
  return(mistakes||[]).map(m=>m.key===key?{...m,resolved:true,resolvedAt:Date.now()}:m);
}
function gradeCard(card,correct){
  const now=Date.now();
  if(!card)card={ease:2.5,interval:0,reps:0,nextReview:0,correct:0,incorrect:0,lastSeen:0};
  if(correct){let iv;if(card.reps===0)iv=1;else if(card.reps===1)iv=3;else iv=Math.ceil(card.interval*card.ease);return{ease:card.ease,reps:card.reps+1,interval:iv,nextReview:now+iv*DAY,correct:card.correct+1,incorrect:card.incorrect,lastSeen:now};}
  return{ease:Math.max(1.3,card.ease-0.2),reps:0,interval:0,nextReview:now+60000,correct:card.correct,incorrect:card.incorrect+1,lastSeen:now};
}
function selectNext(state,verbs,enabledTypes,lastRuleId){
  const now=Date.now(),pool=[];
  for(const rule of RULES){
    if(!enabledTypes.includes(rule.type))continue;
    const candidates=rule.verbFilter(verbs);
    if(!candidates.length)continue;
    pool.push({rule,candidates});
  }
  if(!pool.length)return null;
  const avail=pool.length>1?pool.filter(p=>p.rule.id!==lastRuleId):pool;
  const due=avail.filter(p=>{const c=state.cards[p.rule.id];return c&&c.nextReview<=now;});
  const fresh=avail.filter(p=>!state.cards[p.rule.id]);
  const future=avail.filter(p=>{const c=state.cards[p.rule.id];return c&&c.nextReview>now;});
  let chosen;
  if(due.length){due.sort((a,b)=>state.cards[a.rule.id].nextReview-state.cards[b.rule.id].nextReview);const sl=due.slice(0,Math.min(5,due.length));chosen=sl[Math.floor(Math.random()*sl.length)];}
  else if(fresh.length){chosen=fresh[Math.floor(Math.random()*fresh.length)];}
  else{future.sort((a,b)=>state.cards[a.rule.id].nextReview-state.cards[b.rule.id].nextReview);chosen=future[0];}
  if(!chosen)return null;
  const verb=pickVerb(chosen.candidates,chosen.rule.id,state.verbStats);
  return{id:chosen.rule.id,verb,type:chosen.rule.type,card:state.cards[chosen.rule.id],ruleLabel:chosen.rule.label};
}
function pickVerb(candidates,ruleId,verbStats){
  const vs=verbStats||{};
  const withS=candidates.map(v=>{const s=(vs[v.dict]||{})[ruleId]||{seen:0,incorrect:0};return{v,seen:s.seen,incorrect:s.incorrect};});
  const unseen=withS.filter(x=>x.seen===0);
  if(unseen.length)return unseen[Math.floor(Math.random()*unseen.length)].v;
  const weights=withS.map(x=>x.incorrect+1);
  const total=weights.reduce((a,b)=>a+b,0);
  let r=Math.random()*total;
  for(let i=0;i<withS.length;i++){r-=weights[i];if(r<=0)return withS[i].v;}
  return withS[withS.length-1].v;
}
function fmtInterval(d){if(!d)return'new';if(d<1)return'<1d';if(d<30)return Math.round(d)+'d';if(d<365)return Math.round(d/30)+'mo';return(d/365).toFixed(1)+'y';}

// ============================================================================
// RULE TAXONOMY
// ============================================================================
const RULES=(()=>{
  const rules=[];
  const short={ichidan:'る-verb',godan:'う-verb',suru:'する',kuru:'来る'};
  for(const g of['ichidan','godan','suru','kuru']){
    for(const t of CONJ_TYPES){
      const ikuEx=g==='godan'&&(t.id==='plain-past'||t.id==='te-form');
      rules.push({
        id:`${g}|${t.id}`,group:g,type:t.id,label:short[g],
        verbFilter:(verbs)=>verbs.filter(v=>v.group===g&&(!ikuEx||!v.reading.endsWith('いく'))),
      });
    }
  }
  for(const tid of['plain-past','te-form']){
    rules.push({
      id:`exception-いく|${tid}`,group:'godan',type:tid,label:'行く (exception)',
      verbFilter:(verbs)=>verbs.filter(v=>v.reading.endsWith('いく')),
    });
  }
  const adjShort={'i-adjective':'い-adj','na-adjective':'な-adj'};
  for(const g of['i-adjective','na-adjective']){
    for(const t of ADJ_TYPES){
      rules.push({
        id:`${g}|${t.id}`,group:g,type:t.id,label:adjShort[g],
        verbFilter:(words)=>words.filter(w=>w.group===g),
      });
    }
  }
  return rules;
})();

function cleanCfg(cfg){return{...cfg,url:(cfg.url||'').trim().replace(/\/+$/,''),anonKey:(cfg.anonKey||'').trim(),syncId:(cfg.syncId||'').trim()};}
function syncReady(cfg){return!!(cfg&&cfg.url&&cfg.anonKey&&cfg.syncId);}
async function cloudFetch(cfg){const c=cleanCfg(cfg);const r=await fetch(`${c.url}/rest/v1/srs_state?id=eq.${encodeURIComponent(c.syncId)}&select=data,updated_at`,{headers:{apikey:c.anonKey,Authorization:`Bearer ${c.anonKey}`}});if(!r.ok){const t=await r.text().catch(()=>'');throw new Error(`HTTP ${r.status}${t?': '+t.slice(0,120):''}`);}const rows=await r.json();return rows[0]||null;}
async function cloudUpsert(cfg,payload){const c=cleanCfg(cfg);const r=await fetch(`${c.url}/rest/v1/srs_state`,{method:'POST',headers:{apikey:c.anonKey,Authorization:`Bearer ${c.anonKey}`,'Content-Type':'application/json',Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({id:c.syncId,data:payload,updated_at:new Date().toISOString()})});if(!r.ok){const t=await r.text().catch(()=>'');throw new Error(`HTTP ${r.status}${t?': '+t.slice(0,120):''}`);}};

function App(){
  const[tab,setTab]=useState('study');
  const[state,setState]=useState(defaultState);
  const[customVerbs,setCustomVerbs]=useState([]);
  const[customAdjectives,setCustomAdjectives]=useState([]);
  const[wordLists,setWordLists]=useState([]);
  const[practicePrefs,setPracticePrefs]=useState(DEFAULT_PREFS);
  const[syncConfig,setSyncConfig]=useState(DEFAULT_SYNC);
  const[syncStatus,setSyncStatus]=useState({kind:'idle',message:'',at:null});
  const[geminiKey,setGeminiKey]=useState('');
  const[hydrated,setHydrated]=useState(false);
  const pushTimer=useRef(null);
  const lastSyncedAtRef=useRef(0);

  useEffect(()=>{
    const local=loadAll();
    let cfg=DEFAULT_SYNC;
    if(local){
      if(local.state)setState(mergeState(local.state,{reviewed:0,correct:0}));
      if(Array.isArray(local.customVerbs))setCustomVerbs(local.customVerbs);
      if(Array.isArray(local.customAdjectives))setCustomAdjectives(local.customAdjectives);
      if(Array.isArray(local.wordLists))setWordLists(local.wordLists);
      if(local.practicePrefs)setPracticePrefs({...DEFAULT_PREFS,...local.practicePrefs});
      if(local.syncConfig){cfg={...DEFAULT_SYNC,...local.syncConfig};setSyncConfig(cfg);}
      if(typeof local.lastSyncedAt==='number')lastSyncedAtRef.current=local.lastSyncedAt;
      if(local.geminiKey)setGeminiKey(local.geminiKey);
    }
    if(cfg.enabled&&syncReady(cfg)){
      setSyncStatus({kind:'syncing',message:'Checking cloud…',at:null});
      cloudFetch(cfg).then(cloud=>{
        if(cloud&&cloud.data){
          const cloudAt=cloud.updated_at?new Date(cloud.updated_at).getTime():0;
          if(cloudAt>lastSyncedAtRef.current){
            if(cloud.data.state)setState(mergeState(cloud.data.state,{reviewed:0,correct:0}));
            if(Array.isArray(cloud.data.customVerbs))setCustomVerbs(cloud.data.customVerbs);
            if(Array.isArray(cloud.data.customAdjectives))setCustomAdjectives(cloud.data.customAdjectives);
            if(Array.isArray(cloud.data.wordLists))setWordLists(cloud.data.wordLists);
            if(cloud.data.practicePrefs)setPracticePrefs({...DEFAULT_PREFS,...cloud.data.practicePrefs});
            lastSyncedAtRef.current=cloudAt;setSyncStatus({kind:'ok',message:'Restored from cloud',at:cloudAt});
          }else{setSyncStatus({kind:'ok',message:'Up to date',at:lastSyncedAtRef.current});}
        }else{setSyncStatus({kind:'ok',message:'New cloud row — will upload',at:null});}
      }).catch(e=>setSyncStatus({kind:'error',message:e.message||'Cloud unreachable',at:null}));
    }
    setHydrated(true);
  },[]);

  useEffect(()=>{
    if(!hydrated)return;
    saveAll(state,customVerbs,customAdjectives,wordLists,syncConfig,lastSyncedAtRef.current,geminiKey,practicePrefs);
    if(syncConfig.enabled&&syncReady(syncConfig)){
      if(pushTimer.current)clearTimeout(pushTimer.current);
      pushTimer.current=setTimeout(async()=>{
        setSyncStatus(s=>({...s,kind:'syncing',message:'Saving to cloud…'}));
        try{await cloudUpsert(syncConfig,{state,customVerbs,customAdjectives,wordLists,practicePrefs});const now=Date.now();lastSyncedAtRef.current=now;saveAll(state,customVerbs,customAdjectives,wordLists,syncConfig,now,geminiKey,practicePrefs);setSyncStatus({kind:'ok',message:'Saved to cloud',at:now});}
        catch(e){setSyncStatus({kind:'error',message:e.message||'Push failed',at:null});}
      },2000);
    }
  },[state,customVerbs,customAdjectives,wordLists,syncConfig,geminiKey,practicePrefs,hydrated]);

  async function syncNow(){
    if(!syncReady(syncConfig))return;
    setSyncStatus({kind:'syncing',message:'Syncing…',at:null});
    try{
      const cloud=await cloudFetch(syncConfig);
      const cloudAt=cloud&&cloud.updated_at?new Date(cloud.updated_at).getTime():0;
      if(cloud&&cloud.data&&cloudAt>lastSyncedAtRef.current){
        if(cloud.data.state)setState(mergeState(cloud.data.state,state.session));
        if(Array.isArray(cloud.data.customVerbs))setCustomVerbs(cloud.data.customVerbs);
        if(Array.isArray(cloud.data.customAdjectives))setCustomAdjectives(cloud.data.customAdjectives);
        if(Array.isArray(cloud.data.wordLists))setWordLists(cloud.data.wordLists);
        if(cloud.data.practicePrefs)setPracticePrefs({...DEFAULT_PREFS,...cloud.data.practicePrefs});
        lastSyncedAtRef.current=cloudAt;setSyncStatus({kind:'ok',message:'Pulled from cloud',at:cloudAt});
      }else{
        await cloudUpsert(syncConfig,{state,customVerbs,customAdjectives,wordLists,practicePrefs});const now=Date.now();lastSyncedAtRef.current=now;setSyncStatus({kind:'ok',message:'Pushed to cloud',at:now});
      }

function speakJapanese(text,rate=0.9){
  if(!window.speechSynthesis||!text)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ja-JP';u.rate=rate;
  window.speechSynthesis.speak(u);
}
function normalizeJapaneseText(s){return(s||'').normalize('NFKC').replace(/[、。！？\s'"「」『』（）()]/g,'').toLowerCase();}
function editDistance(a,b){
  a=normalizeJapaneseText(a);b=normalizeJapaneseText(b);
  const dp=Array.from({length:a.length+1},()=>Array(b.length+1).fill(0));
  for(let i=0;i<=a.length;i++)dp[i][0]=i;
  for(let j=0;j<=b.length;j++)dp[0][j]=j;
  for(let i=1;i<=a.length;i++)for(let j=1;j<=b.length;j++)dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  return dp[a.length][b.length];
}
function speechSimilarity(target,heard){
  const a=normalizeJapaneseText(target),b=normalizeJapaneseText(heard);
  if(!a||!b)return null;
  return Math.max(0,Math.round((1-editDistance(a,b)/Math.max(a.length,b.length))*100));
}
function shuffled(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function makeChoices(current,verbs){
  const expected=conjugateItem(current.verb,current.type);
  const types=isAdjective(current.verb)?ADJ_TYPES:CONJ_TYPES;
  const set=new Set([expected]);
  for(const t of shuffled(types)){const v=conjugateItem(current.verb,t.id);if(v&&v!==expected)set.add(v);if(set.size>=4)break;}
  for(const v of shuffled(verbs.filter(v=>v.group===current.verb.group))){const x=conjugateItem(v,current.type);if(x&&x!==expected)set.add(x);if(set.size>=4)break;}
  return shuffled([...set].slice(0,4));
}
function StudyView({state,setState,verbs,geminiKey,practicePrefs=DEFAULT_PREFS,wordLists=[]}){

  const[phase,setPhase]=useState('answering');

  const[now,setNow]=useState(Date.now());
  const inputRef=useRef(null);
  const enabledTypes=state.enabledTypes.length>0?state.enabledTypes:['plain-past'];
  const practiceWords=useMemo(()=>filterWordsForPrefs(verbs,practicePrefs,wordLists),[verbs,practicePrefs,wordLists]);

  useEffect(()=>{if(current===null){setCurrent(selectNext(state,practiceWords,enabledTypes,null));}},[current,practiceWords,enabledTypes]);
  useEffect(()=>{if(current&&practiceWords.length&&!practiceWords.some(w=>w.dict===current.verb.dict&&w.group===current.verb.group)){setCurrent(null);setAnswer('');setPhase('answering');}},[practiceWords,current]);
  useEffect(()=>{if(phase==='answering'&&inputRef.current)inputRef.current.focus();},[current,phase]);
  useEffect(()=>{if(current&&phase==='reviewing'&&practicePrefs.autoSpeak)speakJapanese(conjugateItem(current.verb,current.type));},[current,phase,practicePrefs.autoSpeak]);
  useEffect(()=>{
    if(practicePrefs.durationSec>0)setEndAt(Date.now()+practicePrefs.durationSec*1000);
    else setEndAt(null);
    setNow(Date.now());
  },[practicePrefs.durationSec]);
  useEffect(()=>{
    if(!endAt)return;
    const id=setInterval(()=>setNow(Date.now()),500);
    return()=>clearInterval(id);
  },[endAt]);

  if(!current)return(<div className="bg-white rounded-2xl border border-stone-200 p-12 text-center"><p className="text-stone-600 mb-2">No cards available</p><p className="text-xs text-stone-400">Enable conjugation types in Settings.</p></div>);

  const expected=conjugateItem(current.verb,current.type);

  const promptValue=promptType?conjugateItem(current.verb,promptType):(practicePrefs.scriptMode==='hiragana'?current.verb.reading:current.verb.dict);
  const typeInfo=getTypeInfo(current.type);
  const explanation=phase==='reviewing'&&!wasCorrect?explainItem(current.verb,current.type):null;
  const diagnostic=phase==='reviewing'&&!wasCorrect?diagnoseItem(current.verb,current.type,answer):'';
  const choices=makeChoices(current,practiceWords);
  const wordType=isAdjective(current.verb)?'Adjective':'Verb';
  const timeLeft=endAt?Math.max(0,Math.ceil((endAt-now)/1000)):null;

  function submit(choiceValue){

    const raw=choiceValue!==undefined?choiceValue:answer;

    const nextMistakes=ok?state.mistakes:recordMistake(state.mistakes,current.verb,current.type,promptType,normalized,expected);
    setState({...state,cards:{...state.cards,[rid]:gradeCard(state.cards[rid],ok)},verbStats:newVerbStats,mistakes:nextMistakes,session:{reviewed:state.session.reviewed+1,correct:state.session.correct+(ok?1:0)},daily:bumpDaily(state.daily,ok,practicePrefs.dailyGoal||10)});
    setWasCorrect(ok);setPhase('reviewing');
  }

  const preview=toHiragana(answer);

  if(timeLeft===0)return(
    <div className="bg-white rounded-2xl border border-stone-200 p-8 text-center">

    </div>
  );

  return(
    <div className="space-y-4">
      <div className="bg-white rounded-2xl border border-stone-200 overflow-hidden">
        <div className="px-4 pt-3 pb-2 sm:px-6 sm:pt-5 sm:pb-3 border-b border-stone-100">

            <div className="text-xs text-stone-400 text-right">{timeLeft!==null&&<div className="text-indigo-600 font-medium">{Math.floor(timeLeft/60)}:{String(timeLeft%60).padStart(2,'0')}</div>}<div>{card?(fmtInterval(card.interval)+' · ease '+card.ease.toFixed(1)):'new'}</div></div>
          </div>
        </div>
        <div className="px-4 py-4 sm:px-6 sm:py-8 text-center">

          <div className="text-4xl sm:text-5xl font-medium mb-2" lang="ja">{promptValue}</div>
          {!promptType&&practicePrefs.scriptMode!=='hiragana'&&current.verb.dict!==current.verb.reading&&<div className="text-base text-stone-500" lang="ja">{current.verb.reading}</div>}
          {promptType&&<div className="text-xs text-stone-400">Base: <span lang="ja">{current.verb.dict}</span>{current.verb.dict!==current.verb.reading&&<span lang="ja"> · {current.verb.reading}</span>}</div>}
          <div className="text-sm text-stone-400 mt-2 italic">{current.verb.meaning}</div>
          <div className="text-xs text-stone-400 mt-1">{GROUP_NAMES[current.verb.group]} · {wordType}</div>
          <div className="text-[11px] text-stone-400 mt-1">JLPT {getWordMeta(current.verb).jlpt}{getWordMeta(current.verb).lesson?` · Genki L${getWordMeta(current.verb).lesson}`:''}</div>
        </div>
        <div className="px-4 pb-4 sm:px-6 sm:pb-6">
          {phase==='answering'?(
            <>
              <div className="sm:hidden mb-3 pb-3 border-b border-stone-100 flex flex-wrap items-baseline gap-x-2 gap-y-0.5">
                <span className="text-xs uppercase tracking-wider text-indigo-600 font-semibold">{typeInfo.label}</span>
                <span className="text-xs text-indigo-400">· {current.ruleLabel}</span>
                <span className="text-xs text-stone-400">{typeInfo.sub&&(typeInfo.sub+' · ')}{typeInfo.hint}</span>
              </div>
              {practicePrefs.answerMode==='choice'?(
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                  {choices.map(c=>(<button key={c} onClick={()=>submit(c)} className="min-h-14 px-3 py-3 border-2 border-stone-200 hover:border-indigo-400 hover:bg-indigo-50 rounded-xl text-xl transition" lang="ja">{c}</button>))}

                    placeholder="Type romaji or kana…" className="w-full px-4 py-3 text-xl text-center border-2 border-stone-200 rounded-xl focus:border-indigo-500 focus:outline-none transition"

          ):(
            <div className={`rounded-xl p-4 ${wasCorrect?'bg-emerald-50 border border-emerald-200':'bg-rose-50 border border-rose-200'}`}>
              <div className="flex items-start gap-3">
                <div className={`mt-0.5 flex-shrink-0 ${wasCorrect?'text-emerald-600':'text-rose-600'}`}>{wasCorrect?<IconCheck className="w-5 h-5"/>:<IconX className="w-5 h-5"/>}</div>
                <div className="flex-1">
                  <div className={`text-sm font-medium ${wasCorrect?'text-emerald-800':'text-rose-800'}`}>{wasCorrect?'Correct!':'Not quite.'}</div>

function RushView({state,setState,verbs,practicePrefs=DEFAULT_PREFS,wordLists=[]}){
  const gameWords=useMemo(()=>filterWordsForPrefs(verbs,practicePrefs,wordLists),[verbs,practicePrefs,wordLists]);
  const eligible=useMemo(()=>gameWords.filter(w=>compatibleTypes(w).some(t=>state.enabledTypes.includes(t.id))),[gameWords,state.enabledTypes]);
  const game=state.game||defaultState().game;
  const[active,setActive]=useState(false);
  const[paused,setPaused]=useState(false);
  const[round,setRound]=useState(null);
  const[answer,setAnswer]=useState('');
  const[score,setScore]=useState(0);
  const[combo,setCombo]=useState(0);
  const[cleared,setCleared]=useState(0);
  const[wave,setWave]=useState(1);
  const[deadline,setDeadline]=useState(0);
  const[timeLeft,setTimeLeft]=useState(0);
  const[feedback,setFeedback]=useState(null);
  const[recent,setRecent]=useState([]);
  const advanceRef=useRef(null);
  const resolvingRef=useRef(false);
  useEffect(()=>()=>{if(advanceRef.current)clearTimeout(advanceRef.current);},[]);
  useEffect(()=>{
    if(!active||paused||!round)return;
    const id=setInterval(()=>{
      const left=Math.max(0,deadline-Date.now());
      setTimeLeft(left);
      if(left<=0)resolveRound(false,'timeout');
    },100);
    return()=>clearInterval(id);
  },[active,paused,round,deadline]);
  function buildRound(){
    if(!eligible.length)return null;
    const item=shuffled(eligible)[0];
    const types=compatibleTypes(item).filter(t=>state.enabledTypes.includes(t.id));
    if(!types.length)return null;
    const type=shuffled(types)[0];
    const promptType=pickPromptType(item,type.id,practicePrefs);
    const promptValue=promptType?conjugateItem(item,promptType):(practicePrefs.scriptMode==='hiragana'?item.reading:item.dict);
    return{item,type,promptType,promptValue,expected:conjugateItem(item,type.id),key:`${item.dict}-${type.id}-${Date.now()}-${Math.random()}`};
  }
  function launchRound(nextCleared=cleared){
    const next=buildRound();
    if(!next){setActive(false);setRound(null);setFeedback({kind:'bad',title:'No cards available',detail:'Current filters have no enabled conjugation cards.'});return;}
    const nextWave=1+Math.floor(nextCleared/5);
    const limit=Math.max(3600,8500-Math.min(nextWave-1,9)*520);
    resolvingRef.current=false;
    setWave(nextWave);setRound({...next,limit});setAnswer('');setFeedback(null);setDeadline(Date.now()+limit);setTimeLeft(limit);
  }
  function startGame(){
    if(!eligible.length){setFeedback({kind:'bad',title:'No cards available',detail:'Current filters have no enabled conjugation cards.'});return;}
    if(advanceRef.current)clearTimeout(advanceRef.current);
    setScore(0);setCombo(0);setCleared(0);setRecent([]);setPaused(false);setActive(true);
    setState(s=>{const prev=s.game||defaultState().game;return{...s,game:{...prev,played:(prev.played||0)+1}};});
    launchRound(0);
  }
  function endGame(){
    if(advanceRef.current)clearTimeout(advanceRef.current);
    setActive(false);setPaused(false);setRound(null);setFeedback(null);setAnswer('');
  }
  function matchingRule(item,typeId){return RULES.find(r=>r.type===typeId&&r.verbFilter([item]).length);}
  function recordRushAttempt(current,ok,raw,nextScore,nextCombo){
    setState(s=>{
      const rule=matchingRule(current.item,current.type.id);
      const rid=rule?.id||`${current.item.group}-${current.type.id}`;
      const dict=current.item.dict;
      const prevVS=(s.verbStats?.[dict]?.[rid])||{seen:0,incorrect:0};
      const prevGame=s.game||defaultState().game;
      return{...s,
        cards:{...s.cards,[rid]:gradeCard(s.cards[rid],ok)},
        verbStats:{...(s.verbStats||{}),[dict]:{...(s.verbStats?.[dict]||{}),[rid]:{seen:prevVS.seen+1,incorrect:prevVS.incorrect+(ok?0:1)}}},
        mistakes:ok?s.mistakes:recordMistake(s.mistakes,current.item,current.type.id,current.promptType,toHiragana(raw),current.expected),
        session:{reviewed:s.session.reviewed+1,correct:s.session.correct+(ok?1:0)},
        daily:ok?bumpDaily(s.daily,true,practicePrefs.dailyGoal||10):s.daily,
        game:{...prevGame,bestScore:Math.max(prevGame.bestScore||0,nextScore),bestCombo:Math.max(prevGame.bestCombo||0,nextCombo)}
      };
    });
  }
  function resolveRound(ok,reason='answer'){
    if(resolvingRef.current)return;
    if(!round)return;
    resolvingRef.current=true;
    const current=round;
    const raw=answer.trim();
    setRound(null);
    if(ok){
      const left=Math.max(0,deadline-Date.now());
      const nextCombo=combo+1;
      const gained=100+Math.round((left/current.limit)*90)+nextCombo*12+wave*5;
      const nextScore=score+gained;
      const nextCleared=cleared+1;
      setScore(nextScore);setCombo(nextCombo);setCleared(nextCleared);
      setFeedback({kind:'ok',title:`+${gained}`,detail:`${current.expected} · combo ${nextCombo}`});
      setRecent(r=>[{ok:true,prompt:current.promptValue,type:current.type.label,expected:current.expected,answer:toHiragana(raw)},...r].slice(0,5));
      recordRushAttempt(current,true,raw,nextScore,nextCombo);
      advanceRef.current=setTimeout(()=>active&&launchRound(nextCleared),520);
    }else{
      setCombo(0);
      setFeedback({kind:'bad',title:reason==='timeout'?'Time':'Miss',detail:`${current.expected} · ${current.type.label}`});
      setRecent(r=>[{ok:false,prompt:current.promptValue,type:current.type.label,expected:current.expected,answer:raw?toHiragana(raw):'--'},...r].slice(0,5));
      recordRushAttempt(current,false,raw,score,0);
      advanceRef.current=setTimeout(()=>active&&launchRound(cleared),900);
    }
  }
  function submit(){
    if(!round)return;
    const ok=toHiragana(answer)===round.expected;
    resolveRound(ok,ok?'answer':'wrong');
  }
  const pct=round?Math.max(0,Math.min(100,Math.round((timeLeft/round.limit)*100))):0;

        <div className="bg-white rounded-xl border border-stone-200 p-4"><div className="text-2xl font-semibold tabular-nums">{wave}</div><div className="text-xs text-stone-500">Wave</div></div>
        <div className="bg-white rounded-xl border border-stone-200 p-4"><div className="text-2xl font-semibold tabular-nums">{game.bestScore||0}</div><div className="text-xs text-stone-500">Best</div></div>
      </div>
      <div className="grid lg:grid-cols-[1fr_260px] gap-4">
        <div className="bg-white rounded-2xl border border-stone-200 p-5">
          <div className="flex items-center justify-between gap-3 mb-4">
            <div><h3 className="font-medium flex items-center gap-2"><IconSpark className="w-4 h-4 text-amber-500"/>Kotoba Rush</h3><p className="text-xs text-stone-500">{eligible.length} filtered cards · best combo {game.bestCombo||0}</p></div>
            <div className="flex gap-2">
              {!active?<button onClick={startGame} className="px-3 py-2 bg-stone-800 hover:bg-stone-900 text-white rounded-lg text-sm font-medium">Start</button>:<button onClick={()=>setPaused(!paused)} className="px-3 py-2 border border-stone-200 hover:bg-stone-50 rounded-lg text-sm">{paused?'Resume':'Pause'}</button>}
              {active&&<button onClick={endGame} className="px-3 py-2 border border-stone-200 hover:bg-stone-50 rounded-lg text-sm">End</button>}
            </div>
          </div>
          <div className="h-2 bg-stone-100 rounded-full overflow-hidden mb-4"><div className={`h-full transition-all ${pct>35?'bg-emerald-500':pct>15?'bg-amber-500':'bg-rose-500'}`} style={{width:pct+'%'}}/></div>
          <div className="relative h-80 overflow-hidden rounded-2xl bg-stone-900 border border-stone-800 text-white">
            <div className="absolute inset-x-5 bottom-10 h-px bg-rose-400/70"/>
            {round&&(
              <div className="absolute left-5 right-5 transition-transform duration-100" style={{transform:`translateY(${fall}px)`}}>
                <div className="rounded-2xl bg-white text-stone-900 shadow-xl p-5 border border-stone-200">
                  <div className="flex items-center justify-between gap-3 text-xs text-stone-500 mb-3"><span>{promptLabel} → {round.type.label}</span><span>Wave {wave}</span></div>
                  <div className="text-3xl sm:text-4xl font-semibold leading-relaxed" lang="ja">{round.promptValue}</div>
                  <div className="mt-2 text-sm text-stone-500">{round.item.meaning}</div>

            {!round&&(

            <button onClick={submit} disabled={!round||paused} className="px-5 py-3 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-40 text-white rounded-xl font-medium">Submit</button>

        </div>
      </div>
    </div>
  );
}

function StatsView({state,verbs}){
  const stats=useMemo(()=>{const now=Date.now();let totalReviews=0,totalCorrect=0,due=0,learning=0,mastered=0,fresh=0,total=0;const leeches=[];for(const rule of RULES){if(!state.enabledTypes.includes(rule.type))continue;if(!rule.verbFilter(verbs).length)continue;total++;const c=state.cards[rule.id];if(!c){fresh++;continue;}totalReviews+=c.correct+c.incorrect;totalCorrect+=c.correct;if(c.nextReview<=now)due++;if(c.interval>=30)mastered++;else learning++;if(c.incorrect>=3&&c.incorrect>c.correct*0.5)leeches.push({id:rule.id,rule,card:c});}leeches.sort((a,b)=>b.card.incorrect-a.card.incorrect);return{totalReviews,totalCorrect,acc:totalReviews>0?Math.round((totalCorrect/totalReviews)*100):0,due,learning,mastered,fresh,leeches:leeches.slice(0,10),total};},[state,verbs]);
  const Stat=({label,value})=>(<div className="bg-white rounded-xl border border-stone-200 p-4"><div className="text-2xl font-semibold text-stone-800">{value}</div><div className="text-xs text-stone-500 mt-0.5">{label}</div></div>);
  return(<div className="space-y-4"><div className="grid grid-cols-2 sm:grid-cols-4 gap-3"><Stat label="Due now" value={stats.due}/><Stat label="Learning" value={stats.learning}/><Stat label="Mastered" value={stats.mastered}/><Stat label="New" value={stats.fresh}/></div><div className="bg-white rounded-2xl border border-stone-200 p-5"><div className="flex items-baseline justify-between mb-2"><h3 className="font-medium">Lifetime accuracy</h3><span className="text-2xl font-semibold text-stone-800">{stats.acc}%</span></div><div className="h-2 bg-stone-100 rounded-full overflow-hidden"><div className="h-full bg-emerald-500 transition-all" style={{width:stats.acc+'%'}}/></div><div className="text-xs text-stone-500 mt-2">{stats.totalCorrect} correct / {stats.totalReviews} reviews / {stats.total} rules</div></div><div className="bg-white rounded-2xl border border-stone-200 p-5"><h3 className="font-medium mb-3 flex items-center gap-2"><IconFlame className="w-4 h-4 text-rose-500"/>Leeches</h3>{stats.leeches.length===0?<p className="text-sm text-stone-500">No leeches yet!</p>:<ul className="space-y-2">{stats.leeches.map(l=>(<li key={l.id} className="flex items-center justify-between py-1.5 px-2 hover:bg-stone-50 rounded-lg"><div><span className="font-medium text-stone-700">{l.rule.label}</span><span className="text-xs text-stone-400 ml-2">{TYPE_LABEL[l.rule.type]}</span></div><div className="text-xs text-rose-600">{l.card.incorrect} miss{l.card.incorrect===1?'':'es'}</div></li>))}</ul>}</div></div>);
}

function SRSLevelView({state,verbs}){
  const enabledTypes=state.enabledTypes.length>0?state.enabledTypes:ALL_CARD_TYPES.map(t=>t.id);

  const levelCounts=useMemo(()=>{
    const c=[0,0,0,0,0,0];
    for(const r of RULES){if(!enabledTypes.includes(r.type))continue;if(!r.verbFilter(verbs).length)continue;c[ruleLevel[r.id]]++;}

  },[ruleLevel,enabledTypes,verbs]);
  const totalCards=levelCounts.reduce((s,c)=>s+c,0)||1;

  const COL_KEYS=['ichidan','godan','suru','kuru','exception-いく','i-adjective','na-adjective'];

        <div className="grid grid-cols-3 gap-2 mb-4">
          {SRS_LEVELS.map((l,i)=>(
            <div key={l.id} className={`rounded-xl border p-3 ${l.bg} ${l.border}`}>
              <div className={`text-2xl font-bold ${l.text}`}>{levelCounts[i]}</div>
              <div className={`text-xs font-semibold mt-0.5 ${l.text}`}>{l.name}</div>
              <div className="text-xs text-stone-400 mt-0.5 leading-tight hidden sm:block">{l.sub}</div>
            </div>
          ))}
        </div>
        <div className="h-2.5 bg-stone-100 rounded-full overflow-hidden flex">
          {SRS_LEVELS.map((l,i)=>levelCounts[i]>0?(<div key={l.id} className={`h-full ${l.dot} transition-all`} style={{width:(levelCounts[i]/totalCards*100)+'%'}}/>):null)}
        </div>
        <div className="flex gap-3 mt-2 flex-wrap">
          {SRS_LEVELS.map((l,i)=>levelCounts[i]>0?(<div key={l.id} className="flex items-center gap-1"><div className={`w-2 h-2 rounded-sm ${l.dot}`}/><span className="text-xs text-stone-500">{l.name}</span></div>):null)}
        </div>
      </div>

      <div className="bg-white rounded-2xl border border-stone-200 overflow-hidden">
        <div className="flex items-center px-4 py-2 border-b border-stone-100 bg-stone-50">
          <div className="flex-1 text-xs text-stone-400 font-medium">Conjugation type</div>
          {COL_HEADS.map(h=>(<div key={h} className="w-14 text-center text-xs text-stone-400 font-medium flex-shrink-0" lang="ja">{h}</div>))}
        </div>
        <div className="divide-y divide-stone-50">
          {byType.map(({typeObj,rules})=>(
            <div key={typeObj.id} className="flex items-center px-4 py-2.5">
              <div className="flex-1 min-w-0 pr-2">
                <div className="text-sm text-stone-700 truncate">{typeObj.label}</div>
                {typeObj.sub&&<div className="text-xs text-stone-400" lang="ja">{typeObj.sub}</div>}
              </div>
              {COL_KEYS.map(col=>{
                const rid=col==='exception-いく'?`exception-いく|${typeObj.id}`:`${col}|${typeObj.id}`;
                const rule=rules.find(r=>r.id===rid);
                if(!rule)return(<div key={col} className="w-14 flex justify-center flex-shrink-0"><span className="w-10 h-6 rounded-md bg-stone-50 border border-stone-100 inline-block"/></div>);
                const lDef=SRS_LEVELS[ruleLevel[rule.id]];
                return(
                  <div key={col} className="w-14 flex justify-center flex-shrink-0">
                    <span title={`${typeObj.label} · ${rule.label} — ${lDef.name}`}
                      className={`text-xs font-semibold px-1.5 py-0.5 rounded-md border ${lDef.bg} ${lDef.text} ${lDef.border}`}
                      lang="ja">{COL_HEADS[COL_KEYS.indexOf(col)]}</span>

          ))}

      <div className="bg-white rounded-2xl border border-stone-200 p-4">

              <span className="text-xs text-stone-400">{l.sub}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

const CLASSIFY_OPTIONS=[
  {id:'ichidan',label:'る-verb',hint:'Drop る and attach endings directly.'},
  {id:'godan',label:'う-verb',hint:'The final kana shifts across あ/い/え/お rows.'},
  {id:'suru',label:'する',hint:'Irregular する pattern.'},
  {id:'kuru',label:'来る',hint:'Irregular 来る pattern.'},
  {id:'i-adjective',label:'い-adjective',hint:'Usually ends in い and conjugates like 高い → 高かった.'},
  {id:'na-adjective',label:'な-adjective',hint:'Takes な before nouns and uses だ/です as a predicate.'},
];
function classifyHint(word){
  if(word.group==='ichidan')return `${word.reading} is ichidan: remove る to make forms like ${conjugate(word,'polite-present')}.`;
  if(word.group==='godan')return `${word.reading} is godan: the final ${word.reading.slice(-1)} shifts rows, as in ${conjugate(word,'plain-negative')}.`;
  if(word.group==='suru')return 'する is irregular: する, した, しない, して, できる.';
  if(word.group==='kuru')return '来る is irregular: くる, きた, こない, きて.';
  if(word.group==='i-adjective')return `${word.reading} conjugates as an い-adjective: ${conjugateAdjective(word,'adj-plain-past')}, ${conjugateAdjective(word,'adj-plain-negative')}.`;
  return `${word.reading} is a な-adjective: ${conjugateAdjective(word,'adj-attributive')} + noun, or ${conjugateAdjective(word,'adj-polite-present')}.`;
}
function ClassificationView({state,setState,words,practicePrefs,wordLists=[]}){
  const filtered=useMemo(()=>filterWordsForPrefs(words,practicePrefs,wordLists),[words,practicePrefs,wordLists]);
  const[current,setCurrent]=useState(null);
  const[result,setResult]=useState(null);
  useEffect(()=>{if(!current&&filtered.length)setCurrent(filtered[Math.floor(Math.random()*filtered.length)]);},[current,filtered]);
  useEffect(()=>{if(current&&filtered.length&&!filtered.some(w=>w.dict===current.dict&&w.group===current.group)){setCurrent(null);setResult(null);}},[filtered,current]);
  if(!filtered.length)return(<div className="bg-white rounded-2xl border border-stone-200 p-8 text-center text-stone-500">No words match the current filters.</div>);
  if(!current)return null;
  const allowed=CLASSIFY_OPTIONS.filter(o=>filtered.some(w=>w.group===o.id)||o.id===current.group);
  const stats=state.classify||defaultState().classify;
  function choose(group){
    if(result)return;
    const ok=group===current.group;
    const prev=stats.byGroup?.[current.group]||{attempted:0,correct:0};
    setState({...state,classify:{attempted:(stats.attempted||0)+1,correct:(stats.correct||0)+(ok?1:0),byGroup:{...(stats.byGroup||{}),[current.group]:{attempted:prev.attempted+1,correct:prev.correct+(ok?1:0)}}},daily:bumpDaily(state.daily,ok,practicePrefs.dailyGoal||10)});
    setResult({ok,chosen:group});
  }
  function next(){
    setResult(null);
    const pool=filtered.length>1?filtered.filter(w=>w.dict!==current.dict||w.group!==current.group):filtered;
    setCurrent(pool[Math.floor(Math.random()*pool.length)]);
  }
  const acc=stats.attempted?Math.round(stats.correct/stats.attempted*100):0;
  return(
    <div className="space-y-4">
      <div className="bg-white rounded-2xl border border-stone-200 p-5">
        <div className="flex items-center justify-between mb-4">
          <div><h3 className="font-medium">Classification drill</h3><p className="text-xs text-stone-500">Practice the group recognition step before conjugating.</p></div>
          <div className="text-xs text-stone-500 text-right"><div>{stats.correct}/{stats.attempted}</div><div>{acc}% accuracy</div></div>
        </div>
        <div className="text-center py-5">
          <div className="text-5xl font-medium mb-2" lang="ja">{practicePrefs.scriptMode==='hiragana'?current.reading:current.dict}</div>
          {practicePrefs.scriptMode!=='hiragana'&&current.dict!==current.reading&&<div className="text-stone-500" lang="ja">{current.reading}</div>}
          <div className="text-sm text-stone-400 italic mt-2">{current.meaning}</div>
          <div className="text-[11px] text-stone-400 mt-1">JLPT {getWordMeta(current).jlpt}{getWordMeta(current).lesson?` · Genki L${getWordMeta(current).lesson}`:''}</div>
        </div>
        <div className="grid sm:grid-cols-3 gap-2">
          {allowed.map(o=>(<button key={o.id} onClick={()=>choose(o.id)} disabled={!!result} className={`px-3 py-3 rounded-xl border text-sm font-medium transition ${result&&o.id===current.group?'bg-emerald-50 border-emerald-300 text-emerald-800':result&&o.id===result.chosen&&!result.ok?'bg-rose-50 border-rose-300 text-rose-800':'bg-white border-stone-200 hover:border-indigo-400 hover:bg-indigo-50'}`}>{o.label}</button>))}
        </div>
        {result&&(
          <div className={`mt-4 rounded-xl border p-4 ${result.ok?'bg-emerald-50 border-emerald-200':'bg-rose-50 border-rose-200'}`}>
            <div className={`font-medium text-sm ${result.ok?'text-emerald-800':'text-rose-800'}`}>{result.ok?'Correct.':'Not quite.'} <span className="font-normal">It is {CLASSIFY_OPTIONS.find(o=>o.id===current.group)?.label}.</span></div>
            <div className="text-sm text-stone-700 mt-2">{classifyHint(current)}</div>
            <button onClick={next} autoFocus className="w-full mt-3 py-2 bg-stone-800 hover:bg-stone-900 text-white rounded-xl text-sm font-medium">Next</button>
          </div>
        )}
      </div>
    </div>
  );
}

function MistakesView({state,setState,practicePrefs}){
  const mistakes=state.mistakes||[];
  const open=mistakes.filter(m=>!m.resolved);
  const[activeKey,setActiveKey]=useState(open[0]?.key||mistakes[0]?.key||null);
  const[answer,setAnswer]=useState('');
  const[result,setResult]=useState(null);
  useEffect(()=>{if(activeKey&&!mistakes.some(m=>m.key===activeKey))setActiveKey(open[0]?.key||mistakes[0]?.key||null);},[mistakes,open,activeKey]);
  const active=mistakes.find(m=>m.key===activeKey)||open[0]||mistakes[0]||null;
  function itemFromMistake(m){return{dict:m.dict,reading:m.reading,meaning:m.meaning,group:m.group};}
  function retest(m){setActiveKey(m.key);setAnswer('');setResult(null);}
  function submit(){
    if(!active||!answer.trim())return;
    const item=itemFromMistake(active);
    const expected=conjugateItem(item,active.type)||active.expected;
    const ok=toHiragana(answer)===expected;
    setResult({ok,expected,item});
    if(ok)setState({...state,mistakes:markMistakeResolved(state.mistakes,active.key),daily:bumpDaily(state.daily,true,practicePrefs.dailyGoal||10)});
  }
  const activeItem=active?itemFromMistake(active):null;
  const activeExpected=activeItem?conjugateItem(activeItem,active.type)||active.expected:'';
  return(
    <div className="grid lg:grid-cols-[320px_1fr] gap-4">
      <div className="bg-white rounded-2xl border border-stone-200 overflow-hidden">
        <div className="p-4 border-b border-stone-100 flex items-center justify-between">
          <div><h3 className="font-medium">Mistake history</h3><p className="text-xs text-stone-500">{open.length} unresolved / {mistakes.length} total</p></div>
          {!!mistakes.length&&<button onClick={()=>setState({...state,mistakes:mistakes.filter(m=>!m.resolved)})} className="text-xs text-stone-400 hover:text-rose-600">Clear resolved</button>}
        </div>
        {!mistakes.length?(
          <div className="p-8 text-center text-sm text-stone-500">Missed answers will appear here for one-tap retests.</div>
        ):(
          <div className="max-h-[560px] overflow-y-auto divide-y divide-stone-50">
            {mistakes.map(m=>(<button key={m.key} onClick={()=>retest(m)} className={`w-full text-left px-4 py-3 transition ${active?.key===m.key?'bg-indigo-50':'hover:bg-stone-50'}`}>
              <div className="flex items-center justify-between gap-2">
                <span className="font-medium text-stone-800" lang="ja">{m.dict}</span>
                <span className={`text-[11px] ${m.resolved?'text-emerald-600':'text-rose-600'}`}>{m.resolved?'resolved':`${m.count}x`}</span>
              </div>
              <div className="text-xs text-stone-500">{getTypeInfo(m.type).label}{m.promptType?` from ${promptFormLabel(itemFromMistake(m),m.promptType)}`:''}</div>
              <div className="text-xs text-stone-400 truncate">You wrote <span lang="ja">{m.userAnswer}</span>; expected <span lang="ja">{m.expected}</span></div>
            </button>))}
          </div>
        )}
      </div>
      <div className="bg-white rounded-2xl border border-stone-200 p-5">
        {!active?(
          <div className="text-center text-stone-500 py-16">No mistakes to retest yet.</div>
        ):(
          <div className="space-y-4">
            <div className="flex items-start justify-between gap-3">
              <div>
                <div className="text-xs uppercase tracking-wider text-indigo-600 font-medium">Retest missed card</div>
                <div className="text-4xl font-medium mt-2" lang="ja">{active.promptType?conjugateItem(activeItem,active.promptType):(practicePrefs.scriptMode==='hiragana'?active.reading:active.dict)}</div>
                {active.promptType&&<div className="text-xs text-stone-400 mt-1">Base: <span lang="ja">{active.dict}</span> · {promptFormLabel(activeItem,active.promptType)}</div>}
                <div className="text-sm text-stone-500 italic mt-2">{active.meaning}</div>
                <div className="text-xs text-stone-400 mt-1">Answer with {getTypeInfo(active.type).label}</div>
              </div>
              <button onClick={()=>speakJapanese(activeExpected)} className="p-2 border border-stone-200 hover:bg-stone-50 rounded-lg text-stone-500" title="Speak"><IconVolume className="w-4 h-4"/></button>
            </div>
            <div>
              <input value={answer} onChange={e=>{setAnswer(e.target.value);setResult(null);}} onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();submit();}}} placeholder="Type romaji or kana…" className="w-full px-4 py-3 text-xl text-center border-2 border-stone-200 rounded-xl focus:border-indigo-500 focus:outline-none" lang="ja" autoComplete="off" autoCorrect="off" spellCheck="false"/>
              {answer&&toHiragana(answer)!==answer&&<div className="mt-2 text-center text-sm text-stone-500" lang="ja">→ {toHiragana(answer)}</div>}
              <button onClick={submit} disabled={!answer.trim()} className="w-full mt-3 py-2.5 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-40 text-white rounded-xl font-medium">Retest</button>
            </div>
            {result&&(
              <div className={`rounded-xl border p-4 ${result.ok?'bg-emerald-50 border-emerald-200':'bg-rose-50 border-rose-200'}`}>
                <div className={`text-sm font-medium ${result.ok?'text-emerald-800':'text-rose-800'}`}>{result.ok?'Resolved.':'Still needs work.'}</div>
                <div className="text-xl mt-2" lang="ja">{activeExpected}</div>
                {!result.ok&&<div className="mt-3 text-sm text-stone-700">{explainItem(result.item,active.type).rule}</div>}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function ShadowView({state,setState,geminiKey,practicePrefs}){

  const[recordedUrl,setRecordedUrl]=useState('');

    if(!loop)nextLine();else playCurrent();

  async function startRecording(){
    setRecordErr('');setTranscript('');setAiFeedback('');

    try{
      setRecordedUrl(url=>{if(url)URL.revokeObjectURL(url);return '';});
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      streamRef.current=stream;
      chunksRef.current=[];
      const rec=new MediaRecorder(stream);
      recorderRef.current=rec;
      rec.ondataavailable=e=>{if(e.data.size)chunksRef.current.push(e.data);};
      rec.onstop=()=>{if(chunksRef.current.length){const blob=new Blob(chunksRef.current,{type:'audio/webm'});setRecordedUrl(URL.createObjectURL(blob));}stream.getTracks().forEach(t=>t.stop());if(streamRef.current===stream)streamRef.current=null;recorderRef.current=null;};
      const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
      if(SpeechRecognition){
        const sr=new SpeechRecognition();

        recognitionRef.current=sr;

      }
      rec.start();setRecording(true);
    }catch(e){
      streamRef.current?.getTracks().forEach(t=>t.stop());
      streamRef.current=null;recorderRef.current=null;setRecording(false);
      setRecordErr(e.message||'Could not start recording.');
    }
  }
  function stopRecordingSession(markStopped=true,saveClip=true){
    try{recognitionRef.current?.stop();}catch{}

    const stream=streamRef.current;
    if(rec&&rec.state!=='inactive'){
      if(!saveClip)rec.onstop=()=>{stream?.getTracks().forEach(t=>t.stop());};
      rec.stop();
    }else{
      stream?.getTracks().forEach(t=>t.stop());

    if(!saveClip){recorderRef.current=null;streamRef.current=null;}
    if(markStopped)setRecording(false);
  }
  function stopRecording(){

  async function getPronunciationFeedback(){

      const reply=await callGemini([{role:'user',parts:[{text:prompt}]}],geminiKey,700,0.35,AI_COACH_SYSTEM);

      if(!data||!Array.isArray(data.lines)||!data.lines.length)throw new Error('AI did not return a valid dialogue');
      setCustomScenario({id:'ai-'+Date.now(),title:data.title||'AI Dialogue',level:data.level||'Custom',focus:data.focus||'conversation',lines:data.lines.slice(0,6).map((l,i)=>({speaker:l.speaker||String.fromCharCode(65+i%2),ja:l.ja||'',en:l.en||''})).filter(l=>l.ja)});

        {customScenario&&<div className="p-3 bg-amber-50 border-t border-amber-100"><div className="text-xs uppercase tracking-wider text-amber-700 font-medium">AI dialogue</div><div className="font-medium text-sm text-stone-800 mt-1">{customScenario.title}</div></div>}

function formRows(item){
  const types=isAdjective(item)?ADJ_TYPES:CONJ_TYPES;
  return types.map(t=>({type:t,answer:conjugateItem(item,t.id),explanation:explainItem(item,t.id)}));
}
function searchWords(query,words){
  const q=query.trim().toLowerCase();
  if(!q)return words;
  const h=toHiragana(q);
  return words.filter(w=>{
    if(w.dict.includes(query)||w.reading.includes(h)||w.meaning.toLowerCase().includes(q)||GROUP_NAMES[w.group].toLowerCase().includes(q))return true;
    return formRows(w).some(r=>r.answer===h||r.answer.includes(h));
  });
}

function parseWordRows(text){
  return text.split(/\r?\n/).map(line=>line.trim()).filter(Boolean).map(line=>{
    const cols=line.split(/\t|,/).map(c=>c.trim()).filter(Boolean);
    if(cols.length<4)return null;
    const groupText=cols[3].toLowerCase();
    const group=normalizeGroup(cols[3])||(groupText.includes('i-adjective')||groupText.includes('i-adj')||cols[3].includes('い')?'i-adjective':groupText.includes('na-adjective')||groupText.includes('na-adj')||cols[3].includes('な')?'na-adjective':null);
    if(!group)return null;
    const reading=toHiragana(cols[1]);
    if(!isAllKana(reading))return null;
    return{dict:cols[0],reading,meaning:cols[2],group};
  }).filter(Boolean);
}
function addUniqueWord(list,word){return list.some(w=>w.dict===word.dict&&w.group===word.group)?list:[...list,word];}
function ListsView({words,customVerbs,setCustomVerbs,customAdjectives,setCustomAdjectives,wordLists,setWordLists,practicePrefs,setPracticePrefs}){
  const[name,setName]=useState('');
  const[activeId,setActiveId]=useState(wordLists[0]?.id||'');
  const[query,setQuery]=useState('');
  const[importText,setImportText]=useState('');
  const[msg,setMsg]=useState('');
  const active=wordLists.find(l=>l.id===activeId)||wordLists[0]||null;
  useEffect(()=>{if(!activeId&&wordLists[0])setActiveId(wordLists[0].id);if(activeId&&!wordLists.some(l=>l.id===activeId))setActiveId(wordLists[0]?.id||'');},[wordLists,activeId]);
  const activeKeys=new Set(active?.wordKeys||[]);
  const matches=useMemo(()=>searchWords(query,words).slice(0,120),[query,words]);
  const selectedIds=practicePrefs.wordListIds||[];
  function createList(){
    const n=name.trim()||`List ${wordLists.length+1}`;
    const l={id:'list-'+Date.now().toString(36),name:n,wordKeys:[]};
    setWordLists([...wordLists,l]);setActiveId(l.id);setName('');
  }
  function deleteList(id){
    setWordLists(wordLists.filter(l=>l.id!==id));
    setPracticePrefs({...practicePrefs,wordListIds:selectedIds.filter(x=>x!==id)});
  }
  function toggleActiveFilter(id){
    const next=selectedIds.includes(id)?selectedIds.filter(x=>x!==id):[...selectedIds,id];
    setPracticePrefs({...practicePrefs,wordListIds:next});
  }
  function toggleWord(word){
    if(!active)return;
    const key=wordKey(word);
    const next=activeKeys.has(key)?active.wordKeys.filter(k=>k!==key):[...(active.wordKeys||[]),key];
    setWordLists(wordLists.map(l=>l.id===active.id?{...l,wordKeys:next}:l));
  }
  function importRows(){
    if(!active)return;
    const rows=parseWordRows(importText);
    if(!rows.length){setMsg('No valid rows found. Use dict,reading,meaning,group.');return;}
    let verbs=customVerbs,adjs=customAdjectives,keys=new Set(active.wordKeys||[]);
    for(const r of rows){
      if(isAdjective(r))adjs=addUniqueWord(adjs,r);else verbs=addUniqueWord(verbs,r);
      keys.add(wordKey(r));
    }
    setCustomVerbs(verbs);setCustomAdjectives(adjs);
    setWordLists(wordLists.map(l=>l.id===active.id?{...l,wordKeys:[...keys]}:l));
    setImportText('');setMsg(`Imported ${rows.length} row${rows.length===1?'':'s'} into ${active.name}.`);
  }
  function importPack(pack){
    let list=wordLists.find(l=>l.id==='pack-'+pack.id);
    const id=list?.id||'pack-'+pack.id;
    let verbs=customVerbs,adjs=customAdjectives,keys=new Set(list?.wordKeys||[]);
    for(const w of pack.words){
      if(isAdjective(w))adjs=addUniqueWord(adjs,w);else verbs=addUniqueWord(verbs,w);
      keys.add(wordKey(w));
    }
    if(list)setWordLists(wordLists.map(l=>l.id===id?{...l,name:pack.name,wordKeys:[...keys]}:l));
    else setWordLists([...wordLists,{id,name:pack.name,wordKeys:[...keys]}]);
    setCustomVerbs(verbs);setCustomAdjectives(adjs);setActiveId(id);
    if(!selectedIds.includes(id))setPracticePrefs({...practicePrefs,wordListIds:[...selectedIds,id]});
    setMsg(`Imported ${pack.words.length} words from ${pack.name}.`);
  }
  return(
    <div className="grid lg:grid-cols-[280px_1fr] gap-4">
      <div className="bg-white rounded-2xl border border-stone-200 overflow-hidden">
        <div className="p-4 border-b border-stone-100">
          <h3 className="font-medium mb-3">Study lists</h3>
          <div className="flex gap-2"><input value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')createList();}} placeholder="New list name" className="min-w-0 flex-1 px-3 py-2 text-sm border border-stone-200 rounded-lg focus:border-indigo-500 focus:outline-none"/><button onClick={createList} className="px-3 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg"><IconPlus className="w-4 h-4"/></button></div>
        </div>
        <div className="divide-y divide-stone-50">
          {wordLists.length===0?<div className="p-6 text-sm text-stone-500">Create a list to scope drills or collect textbook vocabulary.</div>:wordLists.map(l=>(<div key={l.id} className={`p-3 ${active?.id===l.id?'bg-indigo-50':'bg-white'}`}>
            <button onClick={()=>setActiveId(l.id)} className="w-full text-left"><div className="font-medium text-stone-800">{l.name}</div><div className="text-xs text-stone-500">{(l.wordKeys||[]).length} words</div></button>
            <div className="flex gap-2 mt-2"><button onClick={()=>toggleActiveFilter(l.id)} className={`flex-1 px-2 py-1.5 rounded-lg text-xs border ${selectedIds.includes(l.id)?'bg-stone-800 text-white border-stone-800':'border-stone-200 hover:bg-stone-50'}`}>{selectedIds.includes(l.id)?'In drill':'Use in drill'}</button><button onClick={()=>deleteList(l.id)} className="px-2 py-1.5 border border-stone-200 hover:text-rose-600 rounded-lg text-xs">Delete</button></div>
          </div>))}
        </div>
      </div>
      <div className="space-y-4">
        <div className="bg-white rounded-2xl border border-stone-200 p-5">
          <h3 className="font-medium mb-1">Built-in packs</h3>
          <p className="text-xs text-stone-500 mb-3">Seed drills with curated JLPT-style packs, then edit them as normal lists.</p>
          <div className="grid sm:grid-cols-2 gap-2">
            {VOCAB_PACKS.map(pack=><div key={pack.id} className="border border-stone-200 rounded-xl p-3">
              <div className="flex items-start justify-between gap-2">
                <div><div className="font-medium text-sm">{pack.name}</div><div className="text-xs text-stone-500 mt-0.5">{pack.desc}</div><div className="text-[11px] text-stone-400 mt-1">{pack.words.length} words</div></div>
                <button onClick={()=>importPack(pack)} className="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-xs">Import</button>
              </div>
            </div>)}
          </div>
        </div>
        <div className="bg-white rounded-2xl border border-stone-200 p-5">
          <div className="flex items-start justify-between gap-3 mb-3">
            <div><h3 className="font-medium">{active?active.name:'No list selected'}</h3><p className="text-xs text-stone-500">Add starter/custom words, then enable lists as drill scopes.</p></div>
            {selectedIds.length>0&&<button onClick={()=>setPracticePrefs({...practicePrefs,wordListIds:[]})} className="text-xs text-stone-400 hover:text-stone-700">Clear list filter</button>}
          </div>
          <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search words or conjugated forms" className="w-full px-3 py-2 text-sm border border-stone-200 rounded-lg focus:border-indigo-500 focus:outline-none" autoCorrect="off" spellCheck="false"/>
          <div className="mt-3 max-h-72 overflow-y-auto grid sm:grid-cols-2 gap-2">
            {matches.map(w=><button key={wordKey(w)} disabled={!active} onClick={()=>toggleWord(w)} className={`text-left px-3 py-2 rounded-xl border transition ${activeKeys.has(wordKey(w))?'bg-emerald-50 border-emerald-200':'bg-white border-stone-200 hover:border-indigo-300'}`}>
              <div className="flex items-center justify-between gap-2"><span className="font-medium" lang="ja">{w.dict}</span><span className="text-[11px] text-stone-400">{isAdjective(w)?'adj':'verb'}</span></div>
              <div className="text-xs text-stone-500" lang="ja">{w.reading}</div><div className="text-xs text-stone-400 truncate">{w.meaning}</div>
            </button>)}
          </div>
        </div>
        <div className="bg-white rounded-2xl border border-stone-200 p-5">
          <h3 className="font-medium mb-1">Bulk import into list</h3>
          <p className="text-xs text-stone-500 mb-3">Paste CSV/TSV rows: dictionary, reading, meaning, group. Groups: ichidan, godan, suru, kuru, i-adjective, na-adjective.</p>
          <textarea value={importText} onChange={e=>{setImportText(e.target.value);setMsg('');}} placeholder={"始める,はじめる,to begin,ichidan\n有名,ゆうめい,famous,na-adjective"} className="w-full h-28 px-3 py-2 text-sm font-mono border border-stone-200 rounded-lg focus:border-indigo-500 focus:outline-none" autoCorrect="off" spellCheck="false"/>
          {msg&&<div className="mt-2 text-sm text-stone-600">{msg}</div>}
          <button onClick={importRows} disabled={!active||!importText.trim()} className="w-full mt-3 py-2 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-40 text-white rounded-xl font-medium">Import rows</button>
        </div>
      </div>
    </div>
  );
}
