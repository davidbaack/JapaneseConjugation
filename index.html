function getWordMeta(word){return{jlpt:'N3',lesson:null,...(WORD_META[word.dict]||{})};}
function wordKind(word){return isAdjective(word)?word.group:'verb';}
function wordKey(word){return`${word.group}:${word.dict}`;}
function filterWordsForPrefs(words,prefs=DEFAULT_PREFS,wordLists=[]){
  const levels=prefs.jlptLevels&&prefs.jlptLevels.length?prefs.jlptLevels:JLPT_LEVELS;
  const types=prefs.wordTypes&&prefs.wordTypes.length?prefs.wordTypes:WORD_TYPE_OPTIONS.map(o=>o.id);
  const lessonFilter=Array.isArray(prefs.genkiLessons)&&prefs.genkiLessons.length&&prefs.genkiLessons.length<GENKI_LESSONS.length?new Set(prefs.genkiLessons.map(Number)):null;
  const selectedLists=prefs.wordListIds&&prefs.wordListIds.length?prefs.wordListIds:[];
  const allowedKeys=selectedLists.length?new Set(wordLists.filter(l=>selectedLists.includes(l.id)).flatMap(l=>l.wordKeys||[])):null;
  return words.filter(w=>{const meta=getWordMeta(w);return levels.includes(meta.jlpt)&&types.includes(wordKind(w))&&(!lessonFilter||lessonFilter.has(meta.lesson))&&(!allowedKeys||allowedKeys.has(wordKey(w)));});
}

function toHiragana(s){
  if(!s)return'';
  s=s.toLowerCase().trim();
  let out='',i=0;
  while(i<s.length){
    const ch=s[i];
    if(ch.charCodeAt(0)>127){out+=ch;i++;continue;}
    if(/\s/.test(ch)){i++;continue;}
    if(ch==='n'){const nx=s[i+1];if(nx===undefined||nx==='n'||!/[aiueoy]/.test(nx)){out+='ん';i++;continue;}}
    if(i<s.length-1&&/[bcdfghjkmpqrstvwxyz]/.test(ch)&&s[i]===s[i+1]){out+='っ';i++;continue;}
    let matched=false;
    for(let len=3;len>=1;len--){const sub=s.slice(i,i+len);if(ROMAJI_MAP[sub]){out+=ROMAJI_MAP[sub];i+=len;matched=true;break;}}
    if(!matched){out+=ch;i++;}

}
const HIRAGANA_TO_ROMAJI={};
for(const [rom,kana] of Object.entries(ROMAJI_MAP)){if(!HIRAGANA_TO_ROMAJI[kana])HIRAGANA_TO_ROMAJI[kana]=rom;}

function kanaToRomaji(s){
  if(!s)return'';
  const hira=String(s).normalize('NFKC').replace(/[\u30A1-\u30F6]/g,ch=>String.fromCharCode(ch.charCodeAt(0)-0x60));
  let out='',i=0;
  while(i<hira.length){
    const ch=hira[i];
    if(ch==='っ'){
      const next=HIRAGANA_TO_ROMAJI[hira.slice(i+1,i+3)]||HIRAGANA_TO_ROMAJI[hira[i+1]]||'';
      out+=next.startsWith('ch')?'t':(next[0]||'');
      i++;continue;
    }
    const pair=hira.slice(i,i+2);
    if(HIRAGANA_TO_ROMAJI[pair]){out+=HIRAGANA_TO_ROMAJI[pair];i+=2;continue;}
    if(HIRAGANA_TO_ROMAJI[ch]){out+=HIRAGANA_TO_ROMAJI[ch];i++;continue;}
    out+=ch;i++;
  }
  return out;
}
function isAllKana(s){
  if(!s)return false;
  for(const ch of s){const c=ch.charCodeAt(0);if(!((c>=0x3040&&c<=0x309F)||(c>=0x30A0&&c<=0x30FF)))return false;}
  return true;

function explainAdjective(adj,type){
  const result=conjugateAdjective(adj,type);
  const stem=adjectiveStem(adj);
  const intro=`${adj.dict} (${adj.reading}) is ${GROUP_NAMES[adj.group]}.`;
  let rule='',derivation=result,note='';
  if(adj.group==='i-adjective'){
    const irregular=adj.irregular||adj.reading==='いい'||adj.reading==='かっこいい';
    const M={
      'adj-plain-present':['Dictionary form.',result],
      'adj-plain-past':['Drop い, add かった.',`${stem} + かった = ${result}`],
      'adj-plain-negative':['Drop い, add くない.',`${stem} + くない = ${result}`],
      'adj-plain-past-negative':['Drop い, add くなかった.',`${stem} + くなかった = ${result}`],
      'adj-polite-present':['Add です to the dictionary form.',`${adj.reading} + です = ${result}`],
      'adj-polite-past':['Make the plain past, then add です.',`${stem} + かった + です = ${result}`],
      'adj-polite-negative':['Make the plain negative, then add です.',`${stem} + くない + です = ${result}`],
      'adj-polite-past-negative':['Make the plain past negative, then add です.',`${stem} + くなかった + です = ${result}`],
      'adj-te-form':['Drop い, add くて.',`${stem} + くて = ${result}`],
      'adj-adverb':['Drop い, add く.',`${stem} + く = ${result}`],
      'adj-attributive':['Use the dictionary form before a noun.',result],
      'adj-conditional':['Drop い, add ければ.',`${stem} + ければ = ${result}`],
      'adj-tara':['Plain past + ら.',`${stem} + かった + ら = ${result}`],
      'adj-sou':['Drop い, add そう.',`${stem} + そう = ${result}`],
      'adj-sugiru':['Drop い, add すぎる.',`${stem} + すぎる = ${result}`],
      'adj-naru':['Drop い, add くなる.',`${stem} + くなる = ${result}`]
    };
    [rule,derivation]=M[type]||['',result];
    if(irregular)note='いい and かっこいい conjugate from よい, so the stem becomes よ.';
  }else{
    const s=adj.reading.replace(/な$/,'');
    const M={
      'adj-plain-present':['Add だ for the plain predicative form.',`${s} + だ = ${result}`],
      'adj-plain-past':['Add だった.',`${s} + だった = ${result}`],
      'adj-plain-negative':['Add ではない.',`${s} + ではない = ${result}`],
      'adj-plain-past-negative':['Add ではなかった.',`${s} + ではなかった = ${result}`],
      'adj-polite-present':['Add です.',`${s} + です = ${result}`],
      'adj-polite-past':['Add でした.',`${s} + でした = ${result}`],
      'adj-polite-negative':['Add ではありません.',`${s} + ではありません = ${result}`],
      'adj-polite-past-negative':['Add ではありませんでした.',`${s} + ではありませんでした = ${result}`],
      'adj-te-form':['Use で to connect clauses.',`${s} + で = ${result}`],
      'adj-adverb':['Add に for the adverbial form.',`${s} + に = ${result}`],
      'adj-attributive':['Add な before a noun.',`${s} + な = ${result}`],
      'adj-conditional':['Use なら for the common conditional.',`${s} + なら = ${result}`],
      'adj-tara':['Plain past + ら.',`${s} + だった + ら = ${result}`],
      'adj-sou':['Add そう.',`${s} + そう = ${result}`],
      'adj-sugiru':['Add すぎる.',`${s} + すぎる = ${result}`],
      'adj-naru':['Add になる.',`${s} + になる = ${result}`]
    };
    [rule,derivation]=M[type]||['',result];
  }

}
function explainItem(item,type){
  if(isAdjective(item))return explainAdjective(item,type);
  const e=explainConjugation(item,type);
  const common={
    'masu-stem':'Use the stem that appears before ます.',
    'polite-volitional':'Use the ます stem, then add ましょう.',
    'polite-te':'Use the ます stem, then add まして.',
    'polite-conditional-tara':'Use the polite past ました, then add ら.',
    'potential-negative':'Make the potential form, then make it negative.',
    'conditional-nara':'Use the dictionary form, then add なら.',
    'conjectural':'Use the dictionary form, then add だろう.',
    'passive-negative':'Make the passive form, then make it negative.',
    'causative-negative':'Make the causative form, then make it negative.',
    'request-kudasai':'Use the te-form, then add ください.',
    'negative-request':'Use the negative te-form, then add ください.',
    'permission':'Use the te-form, then add もいい.',
    'obligation':'Use the negative stem before い, then add ければならない.'
  };
  if(!e.rule&&common[type])e.rule=common[type];
  if(!e.rule&&type==='causative-passive')e.rule=item.group==='godan'?'Use the あ-row stem, then add せられる.':'Use the causative stem and add られる.';
  if(!e.rule&&type==='desiderative')e.rule=item.group==='godan'?'Use the い-row stem, then add たい.':'Use the verb stem, then add たい.';
  if(!e.rule&&type==='progressive')e.rule='Use the te-form, then add いる.';
  if(!e.rule&&type==='negative-te')e.rule='Use the plain negative form, then add で.';
  if(!e.rule&&type==='prohibition')e.rule='Use the dictionary form, then add な for a blunt prohibition.';
  return e;
}

function diagnose(verb,type,userAnswer){
  const got=toHiragana(userAnswer);
  if(!got)return'';
  for(const t of CONJ_TYPES){if(t.id===type)continue;if(conjugate(verb,t.id)===got)return`That's the ${t.label.toLowerCase()} form — wrong conjugation pattern.`;}
  for(const g of['ichidan','godan'].filter(g=>g!==verb.group)){try{const alt=conjugate({...verb,group:g},type);if(alt===got)return`You conjugated this as a ${g==='ichidan'?'る-verb':'う-verb'}, but ${verb.dict} is ${verb.group==='ichidan'?'ichidan':verb.group==='godan'?'godan':'irregular'}.`;}catch{}}
  return'';
}
function diagnoseItem(item,type,userAnswer){
  if(!isAdjective(item))return diagnose(item,type,userAnswer);
  const got=toHiragana(userAnswer);
  if(!got)return'';
  for(const t of ADJ_TYPES){if(t.id===type)continue;if(conjugateAdjective(item,t.id)===got)return`That's the ${t.label.toLowerCase()} form, but this card asks for ${getTypeInfo(type).label.toLowerCase()}.`;}
  const other=item.group==='i-adjective'?'na-adjective':'i-adjective';
  try{if(conjugateAdjective({...item,group:other},type)===got)return`You used the ${other==='i-adjective'?'い-adjective':'な-adjective'} pattern, but ${item.dict} is ${GROUP_NAMES[item.group]}.`;}catch{}
  return'';
}

const AI_SYSTEM=`You are a friendly Japanese language teacher helping a student who just got a verb conjugation wrong. The student can read hiragana and katakana but struggles with kanji. Always write Japanese in hiragana/katakana with romaji in brackets after it, e.g. たべた [tabeta]. Be warm, encouraging, and concise — 2 to 3 short paragraphs at most. Focus on the specific rule missed and give one extra example.`;
const AI_COACH_SYSTEM=`You are a concise Japanese conjugation and sentence coach. Analyze verbs and adjectives in context, identify conjugation mistakes, explain the rule, give a natural corrected sentence, and finish with one tiny practice prompt. Keep Japanese readable for learners by adding romaji after key forms.`;

const AI_FEEDBACK_LEVELS=[
  {id:'beginner',label:'Beginner',prompt:'Use plain English, short sentences, kana plus romaji for every key Japanese form, and no more than one new grammar term at a time.'},
  {id:'expert',label:'Expert JP',prompt:'Give compact, Japanese-heavy feedback. Use Japanese grammar terms when useful, include romaji only after the most important forms, and challenge the learner with one harder contrast.'}
];
const AI_GUIDE_TONES=[
  {id:'sensei',label:'Calm',prompt:'Sound like a patient teacher: warm, precise, and encouraging without being wordy.'},
  {id:'coach',label:'Coach',prompt:'Sound like an energetic study coach: upbeat, direct, and momentum-building.'},
  {id:'direct',label:'Direct',prompt:'Sound like a concise examiner: minimal praise, clear correction, and one exact next action.'}
];

function geminiText(d){
  const parts=d.candidates?.[0]?.content?.parts||[];
  return(parts.find(p=>!p.thought)||parts[0])?.text||'';
}
function normalizeGroup(g){
  if(!g)return null;
  const v=g.toLowerCase();
  if(v.includes('ichidan')||v.includes('ru-verb')||v.includes('group 2'))return'ichidan';
  if(v.includes('godan')||v.includes('u-verb')||v.includes('group 1'))return'godan';
  if(v.includes('suru'))return'suru';
  if(v.includes('kuru'))return'kuru';
  return null;
}
function extractJSON(text){
  for(let i=0;i<text.length;i++){
    if(text[i]!=='{')continue;
    let depth=0,inStr=false;
    for(let j=i;j<text.length;j++){
      const c=text[j];
      if(inStr){if(c==='\\')j++;else if(c==='"')inStr=false;}
      else if(c==='"')inStr=true;
      else if(c==='{')depth++;
      else if(c==='}'){if(!--depth){try{return JSON.parse(text.slice(i,j+1));}catch(e){break;}}}
    }
  }
  return null;
}

async function callGemini(contents,apiKey,maxTokens=600,temp=0.7,systemText=AI_SYSTEM){
  if(!apiKey)throw new Error('No Gemini API key — add it in Settings.');
  const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${encodeURIComponent(apiKey)}`,
    {method:'POST',headers:{'Content-Type':'application/json'},
     body:JSON.stringify({contents,systemInstruction:{parts:[{text:systemText}]},generationConfig:{maxOutputTokens:maxTokens,temperature:temp}})});
  const d=await r.json();
  if(!r.ok)throw new Error(d.error?.message||`HTTP ${r.status}`);
  return geminiText(d);
}
function aiSystemFromPrefs(prefs=DEFAULT_PREFS,base=AI_SYSTEM){
  const level=AI_FEEDBACK_LEVELS.find(o=>o.id===(prefs.aiFeedbackLevel||DEFAULT_PREFS.aiFeedbackLevel))||AI_FEEDBACK_LEVELS[0];
  const tone=AI_GUIDE_TONES.find(o=>o.id===(prefs.aiGuideTone||DEFAULT_PREFS.aiGuideTone))||AI_GUIDE_TONES[0];
  return `${base}\n\nFeedback depth: ${level.prompt}\nGuide voice: ${tone.prompt}`;
}

async function lookupVerbWithGemini(query,apiKey){
  if(!apiKey)throw new Error('No Gemini API key set');
  const prompt=`Look up this Japanese verb: "${query}"\n\nReturn ONLY a JSON object (no markdown, no extra text):\n{"dict":"kanji/kana dictionary form","reading":"hiragana only","meaning":"English meaning starting with to","group":"ichidan or godan or suru or kuru"}\n\nIf the input is English or romaji, find the most common Japanese verb for that meaning.`;
  const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${encodeURIComponent(apiKey)}`,
    {method:'POST',headers:{'Content-Type':'application/json'},
     body:JSON.stringify({contents:[{role:'user',parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:1024,temperature:0.1,thinkingConfig:{thinkingBudget:0}}})});
  const d=await r.json();
  if(!r.ok)throw new Error(d.error?.message||`HTTP ${r.status}`);
  const result=extractJSON(geminiText(d));
  if(result)result.group=normalizeGroup(result.group);
  if(!result||!result.dict||!result.reading||!result.meaning||!result.group)
    throw new Error('Unexpected AI response — try a different input');
  return result;
}

async function getSuggestedVerb(existingVerbs,apiKey){

  const d=await r.json();

function buildContext(verb,type,userAnswer,expected,explanation,prefs=DEFAULT_PREFS){
  const ti=getTypeInfo(type);
  const label=isAdjective(verb)?'Adjective':'Verb';
  const feedbackNote=(prefs.aiFeedbackLevel||DEFAULT_PREFS.aiFeedbackLevel)==='expert'?'Use the configured Expert JP feedback style; romaji only for the most important forms.':'Use the configured Beginner feedback style; show romaji for key forms.';
  return`I'm studying Japanese and just got this wrong.\n\n${label}: ${verb.dict} (${verb.reading}) — ${verb.meaning}\nType: ${GROUP_NAMES[verb.group]}\nTask: ${ti.label} (${ti.hint})\nMy answer: ${toHiragana(userAnswer)||'(blank)'}\nCorrect: ${expected}\n\nAuto-explanation: ${explanation.intro} ${explanation.rule}${explanation.derivation&&explanation.derivation!==expected?'\nStep: '+explanation.derivation:''}${explanation.note?'\nNote: '+explanation.note:''}\n\nHelp me understand why the answer is ${expected} and where I went wrong. ${feedbackNote}`;
}

function ChatPanel({verb,type,userAnswer,expected,explanation,geminiKey,practicePrefs=DEFAULT_PREFS}){
  const[apiHistory,setApiHistory]=useState([]);
  const[display,setDisplay]=useState([]);
  const[input,setInput]=useState('');
  const[loading,setLoading]=useState(true);
  const endRef=useRef(null);
  const context=useMemo(()=>buildContext(verb,type,userAnswer,expected,explanation,practicePrefs),[verb,type,userAnswer,expected,explanation,practicePrefs.aiFeedbackLevel]);
  const systemText=useMemo(()=>aiSystemFromPrefs(practicePrefs,AI_SYSTEM),[practicePrefs.aiFeedbackLevel,practicePrefs.aiGuideTone]);

  useEffect(()=>{
    const init=[{role:'user',content:context}];
    const geminiMsgs=init.map(m=>({role:m.role==='assistant'?'model':'user',parts:[{text:m.content}]}));
    callGemini(geminiMsgs,geminiKey,600,0.7,systemText)
      .then(reply=>{setApiHistory([...init,{role:'assistant',content:reply}]);setDisplay([{role:'assistant',content:reply}]);})
      .catch(e=>setDisplay([{role:'assistant',content:`Error: ${e.message}`}]))
      .finally(()=>setLoading(false));
  },[context,geminiKey,systemText]);

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'});},[display,loading]);

  async function send(){
    if(!input.trim()||loading)return;
    const txt=input;setInput('');
    const newDisplay=[...display,{role:'user',content:txt}];
    setDisplay(newDisplay);setLoading(true);
    const newApi=[...apiHistory,{role:'user',content:txt}];
    try{
      const geminiMsgs=newApi.map(m=>({role:m.role==='assistant'?'model':'user',parts:[{text:m.content}]}));
      const reply=await callGemini(geminiMsgs,geminiKey,600,0.7,systemText);
      setApiHistory([...newApi,{role:'assistant',content:reply}]);
      setDisplay([...newDisplay,{role:'assistant',content:reply}]);
    }catch(e){setDisplay([...newDisplay,{role:'assistant',content:`Error: ${e.message}`}]);}
    setLoading(false);
  }

  return(
    <div className="mt-3 pt-3 border-t border-rose-200">
      <div className="text-xs font-medium text-stone-500 mb-2 flex items-center gap-1.5"><IconChat className="w-3.5 h-3.5"/>Chat with Gemini</div>
      <div className="space-y-2 max-h-56 overflow-y-auto pb-1">
        {loading&&!display.length&&<div className="text-sm text-stone-400 italic px-3 py-2">Gemini is thinking…</div>}
        {display.map((m,i)=>(
          <div key={i} style={{whiteSpace:'pre-wrap'}}
            className={`text-sm px-3 py-2 rounded-lg leading-relaxed ${m.role==='assistant'?'bg-white border border-stone-200 text-stone-800':'bg-indigo-50 border border-indigo-100 text-indigo-900 ml-6 text-right'}`}>
            {m.content}
          </div>
        ))}
        {loading&&display.length>0&&<div className="text-sm text-stone-400 italic px-3">Gemini is thinking…</div>}
        <div ref={endRef}/>
      </div>
      <div className="flex gap-2 mt-2">
        <input type="text" value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();send();}}}
          placeholder="Ask a follow-up…" disabled={loading}
          autoCorrect="off" spellCheck="false"
          className="flex-1 px-3 py-1.5 text-sm border border-stone-200 rounded-lg focus:border-indigo-500 focus:outline-none disabled:opacity-50"/>
        <button onClick={send} disabled={loading||!input.trim()}
          className="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-40 text-white rounded-lg text-sm font-medium">Send</button>
      </div>
    </div>
  );
}

const DAY=86400000;
function localDateKey(offsetDays=0){const d=new Date(Date.now()+offsetDays*DAY);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function defaultState(){return{cards:{},verbStats:{},mistakes:[],shadow:{attempted:0,totalRating:0,byScenario:{}},ambient:{sessions:0,played:0,lastAt:null},game:{played:0,bestScore:0,bestCombo:0},onbin:{attempted:0,correct:0,hints:0,streak:0,bestStreak:0,byPattern:{}},meaning:{attempted:0,correct:0,byWord:{}},mock:{taken:0,bestPct:0,lastPct:0,lastScore:0,lastTotal:0,lastAt:null,bySkill:{}},enabledTypes:[...CONJ_TYPES.filter(t=>t.id!=='plain-present').map(t=>t.id),...ADJ_TYPES.filter(t=>t.id!=='adj-plain-present').map(t=>t.id)],session:{reviewed:0,correct:0},daily:{date:localDateKey(),count:0,goalHit:false,goalStreak:0,bestGoalStreak:0,currentAnswerStreak:0,bestAnswerStreak:0},classify:{attempted:0,correct:0,byGroup:{}}};}
function mergeState(saved,sessionOverride){
  const base=defaultState();
  const merged={...base,...(saved||{}),verbStats:(saved&&saved.verbStats)||{},mistakes:Array.isArray(saved&&saved.mistakes)?saved.mistakes:[],shadow:(saved&&saved.shadow)||base.shadow,ambient:(saved&&saved.ambient)||base.ambient,game:(saved&&saved.game)||base.game,onbin:(saved&&saved.onbin)||base.onbin,meaning:(saved&&saved.meaning)||base.meaning,mock:(saved&&saved.mock)||base.mock,daily:(saved&&saved.daily)||base.daily,classify:(saved&&saved.classify)||base.classify,session:sessionOverride||base.session};
  if(saved&&Array.isArray(saved.enabledTypes)&&!saved.enabledTypes.some(id=>id.startsWith('adj-'))){
    merged.enabledTypes=[...saved.enabledTypes,...base.enabledTypes.filter(id=>id.startsWith('adj-'))];
  }
  return merged;
}
function bumpDaily(daily,correct,dailyGoal){
  const today=localDateKey(),yesterday=localDateKey(-1);
  let d=daily||{};
  if(d.date!==today){
    const keepGoalStreak=d.date===yesterday&&d.goalHit;
    d={date:today,count:0,goalHit:false,goalStreak:keepGoalStreak?(d.goalStreak||0):0,bestGoalStreak:d.bestGoalStreak||0,currentAnswerStreak:0,bestAnswerStreak:d.bestAnswerStreak||0};
  }
  const count=(d.count||0)+1;
  const wasGoalHit=!!d.goalHit;
  const goalHit=count>=dailyGoal;
  const goalStreak=(d.goalStreak||0)+(!wasGoalHit&&goalHit?1:0);
  const currentAnswerStreak=correct?(d.currentAnswerStreak||0)+1:0;
  return{...d,count,goalHit,goalStreak,bestGoalStreak:Math.max(d.bestGoalStreak||0,goalStreak),currentAnswerStreak,bestAnswerStreak:Math.max(d.bestAnswerStreak||0,currentAnswerStreak)};
}
function recordMistake(mistakes,item,type,promptType,userAnswer,expected){
  const key=`${item.group}|${item.dict}|${type}|${promptType||'dictionary'}`;
  const now=Date.now();
  const prior=(mistakes||[]).find(m=>m.key===key);
  const fresh={key,dict:item.dict,reading:item.reading,meaning:item.meaning,group:item.group,type,promptType:promptType||null,userAnswer,expected,at:now,count:(prior?.count||0)+1,resolved:false};
  return[fresh,...(mistakes||[]).filter(m=>m.key!==key)].slice(0,50);
}
function markMistakeResolved(mistakes,key){
  return(mistakes||[]).map(m=>m.key===key?{...m,resolved:true,resolvedAt:Date.now()}:m);
}
function gradeCard(card,correct){
  const now=Date.now();
  if(!card)card={ease:2.5,interval:0,reps:0,nextReview:0,correct:0,incorrect:0,lastSeen:0};
  if(correct){let iv;if(card.reps===0)iv=1;else if(card.reps===1)iv=3;else iv=Math.ceil(card.interval*card.ease);return{ease:card.ease,reps:card.reps+1,interval:iv,nextReview:now+iv*DAY,correct:card.correct+1,incorrect:card.incorrect,lastSeen:now};}
  return{ease:Math.max(1.3,card.ease-0.2),reps:0,interval:0,nextReview:now+60000,correct:card.correct,incorrect:card.incorrect+1,lastSeen:now};
}
function ruleWeakScore(state,ruleId){
  const card=(state.cards||{})[ruleId]||{};
  const reviews=(card.correct||0)+(card.incorrect||0);
  const missRate=reviews?(card.incorrect||0)/reviews:0;
  const unresolved=(state.mistakes||[]).filter(m=>!m.resolved&&ruleId.endsWith(`|${m.type}`)).reduce((sum,m)=>sum+(m.count||1),0);
  const verbStats=Object.values(state.verbStats||{}).map(vs=>vs[ruleId]).filter(Boolean);
  const verbMisses=verbStats.reduce((sum,s)=>sum+(s.incorrect||0),0);
  return (card.incorrect||0)*2+missRate*4+unresolved*3+verbMisses;
}
function pickWeakWeighted(pool,state){
  const scored=pool.map(p=>({...p,weakScore:ruleWeakScore(state,p.rule.id)}));
  if(!scored.some(p=>p.weakScore>0))return null;
  const weights=scored.map(p=>1+p.weakScore*p.weakScore);
  let r=Math.random()*weights.reduce((a,b)=>a+b,0);
  for(let i=0;i<scored.length;i++){r-=weights[i];if(r<=0)return scored[i];}
  return scored[scored.length-1];
}
function selectNext(state,verbs,enabledTypes,lastRuleId,prefs=DEFAULT_PREFS){
  const now=Date.now(),pool=[];
  for(const rule of RULES){
    if(!enabledTypes.includes(rule.type))continue;
    const candidates=rule.verbFilter(verbs);
    if(!candidates.length)continue;
    pool.push({rule,candidates});
  }
  if(!pool.length)return null;
  const avail=pool.length>1?pool.filter(p=>p.rule.id!==lastRuleId):pool;
  const due=avail.filter(p=>{const c=state.cards[p.rule.id];return c&&c.nextReview<=now;});
  const fresh=avail.filter(p=>!state.cards[p.rule.id]);
  const future=avail.filter(p=>{const c=state.cards[p.rule.id];return c&&c.nextReview>now;});
  let chosen;
  if((prefs.practiceFocus||'balanced')==='weak'){
    const weakPool=[...due,...future,...fresh];
    chosen=pickWeakWeighted(weakPool,state);
  }
  if(!chosen){
    if(due.length){due.sort((a,b)=>state.cards[a.rule.id].nextReview-state.cards[b.rule.id].nextReview);const sl=due.slice(0,Math.min(5,due.length));chosen=sl[Math.floor(Math.random()*sl.length)];}
    else if(fresh.length){chosen=fresh[Math.floor(Math.random()*fresh.length)];}
    else{future.sort((a,b)=>state.cards[a.rule.id].nextReview-state.cards[b.rule.id].nextReview);chosen=future[0];}
  }
  if(!chosen)return null;
  const verb=pickVerb(chosen.candidates,chosen.rule.id,state.verbStats);
  return{id:chosen.rule.id,verb,type:chosen.rule.type,card:state.cards[chosen.rule.id],ruleLabel:chosen.rule.label};
}
function pickVerb(candidates,ruleId,verbStats){
  const vs=verbStats||{};
  const withS=candidates.map(v=>{const s=(vs[v.dict]||{})[ruleId]||{seen:0,incorrect:0};return{v,seen:s.seen,incorrect:s.incorrect};});
  const unseen=withS.filter(x=>x.seen===0);
  if(unseen.length)return unseen[Math.floor(Math.random()*unseen.length)].v;
  const weights=withS.map(x=>x.incorrect+1);
  const total=weights.reduce((a,b)=>a+b,0);
  let r=Math.random()*total;
  for(let i=0;i<withS.length;i++){r-=weights[i];if(r<=0)return withS[i].v;}
  return withS[withS.length-1].v;
}
function fmtInterval(d){if(!d)return'new';if(d<1)return'<1d';if(d<30)return Math.round(d)+'d';if(d<365)return Math.round(d/30)+'mo';return(d/365).toFixed(1)+'y';}

// ============================================================================
const RULES=(()=>{
  const rules=[];
  const short={ichidan:'る-verb',godan:'う-verb',suru:'する',kuru:'来る'};
  for(const g of['ichidan','godan','suru','kuru']){
    for(const t of CONJ_TYPES){
      const ikuEx=g==='godan'&&(t.id==='plain-past'||t.id==='te-form');
      rules.push({
        id:`${g}|${t.id}`,group:g,type:t.id,label:short[g],
        verbFilter:(verbs)=>verbs.filter(v=>v.group===g&&(!ikuEx||!v.reading.endsWith('いく'))),
      });
    }
  }
  for(const tid of['plain-past','te-form']){
    rules.push({
      id:`exception-いく|${tid}`,group:'godan',type:tid,label:'行く (exception)',
      verbFilter:(verbs)=>verbs.filter(v=>v.reading.endsWith('いく')),
    });
  }
  const adjShort={'i-adjective':'い-adj','na-adjective':'な-adj'};
  for(const g of['i-adjective','na-adjective']){
    for(const t of ADJ_TYPES){
      rules.push({
        id:`${g}|${t.id}`,group:g,type:t.id,label:adjShort[g],
        verbFilter:(words)=>words.filter(w=>w.group===g),
      });
    }
  }
  return rules;
})();

async function cloudFetch(cfg){const c=cleanCfg(cfg);const r=await fetch(`${c.url}/rest/v1/srs_state?id=eq.${encodeURIComponent(c.syncId)}&select=data,updated_at`,{headers:{apikey:c.anonKey,Authorization:`Bearer ${c.anonKey}`}});if(!r.ok){const t=await r.text().catch(()=>'');throw new Error(`HTTP ${r.status}${t?': '+t.slice(0,120):''}`);}const rows=await r.json();return rows[0]||null;}

function App(){
  const[tab,setTab]=useState('study');
  const[state,setState]=useState(defaultState);
  const[customVerbs,setCustomVerbs]=useState([]);
  const[customAdjectives,setCustomAdjectives]=useState([]);
  const[wordLists,setWordLists]=useState([]);
  const[practicePrefs,setPracticePrefs]=useState(DEFAULT_PREFS);
  const[syncConfig,setSyncConfig]=useState(DEFAULT_SYNC);
  const[syncStatus,setSyncStatus]=useState({kind:'idle',message:'',at:null});
  const[geminiKey,setGeminiKey]=useState('');
  const[speechVoices,setSpeechVoices]=useState([]);
  const[systemTheme,setSystemTheme]=useState(getSystemTheme);
  const[hydrated,setHydrated]=useState(false);
  const pushTimer=useRef(null);
  const lastSyncedAtRef=useRef(0);

  useEffect(()=>{
    const local=loadAll();
    let cfg=DEFAULT_SYNC;
    if(local){
      if(local.state)setState(mergeState(local.state,{reviewed:0,correct:0}));
      if(Array.isArray(local.customVerbs))setCustomVerbs(local.customVerbs);
      if(Array.isArray(local.customAdjectives))setCustomAdjectives(local.customAdjectives);
      if(Array.isArray(local.wordLists))setWordLists(local.wordLists);
      if(local.practicePrefs)setPracticePrefs(mergePracticePrefs(local.practicePrefs));
      if(local.syncConfig){cfg={...DEFAULT_SYNC,...local.syncConfig};setSyncConfig(cfg);}
      if(typeof local.lastSyncedAt==='number')lastSyncedAtRef.current=local.lastSyncedAt;
      if(local.geminiKey)setGeminiKey(local.geminiKey);
    }
    if(cfg.enabled&&syncReady(cfg)){
      setSyncStatus({kind:'syncing',message:'Checking cloud…',at:null});
      cloudFetch(cfg).then(cloud=>{
        if(cloud&&cloud.data){
          const cloudAt=cloud.updated_at?new Date(cloud.updated_at).getTime():0;
          if(cloudAt>lastSyncedAtRef.current){
            if(cloud.data.state)setState(mergeState(cloud.data.state,{reviewed:0,correct:0}));
            if(Array.isArray(cloud.data.customVerbs))setCustomVerbs(cloud.data.customVerbs);
            if(Array.isArray(cloud.data.customAdjectives))setCustomAdjectives(cloud.data.customAdjectives);
            if(Array.isArray(cloud.data.wordLists))setWordLists(cloud.data.wordLists);
            if(cloud.data.practicePrefs)setPracticePrefs(mergePracticePrefs(cloud.data.practicePrefs));
            lastSyncedAtRef.current=cloudAt;setSyncStatus({kind:'ok',message:'Restored from cloud',at:cloudAt});
          }else{setSyncStatus({kind:'ok',message:'Up to date',at:lastSyncedAtRef.current});}
        }else{setSyncStatus({kind:'ok',message:'New cloud row — will upload',at:null});}
      }).catch(e=>setSyncStatus({kind:'error',message:e.message||'Cloud unreachable',at:null}));
    }
    setHydrated(true);
  },[]);

  useEffect(()=>{
    if(!hydrated)return;
    saveAll(state,customVerbs,customAdjectives,wordLists,syncConfig,lastSyncedAtRef.current,geminiKey,practicePrefs);
    if(syncConfig.enabled&&syncReady(syncConfig)){
      if(pushTimer.current)clearTimeout(pushTimer.current);
      pushTimer.current=setTimeout(async()=>{
        setSyncStatus(s=>({...s,kind:'syncing',message:'Saving to cloud…'}));
        try{await cloudUpsert(syncConfig,{state,customVerbs,customAdjectives,wordLists,practicePrefs});const now=Date.now();lastSyncedAtRef.current=now;saveAll(state,customVerbs,customAdjectives,wordLists,syncConfig,now,geminiKey,practicePrefs);setSyncStatus({kind:'ok',message:'Saved to cloud',at:now});}
        catch(e){setSyncStatus({kind:'error',message:e.message||'Push failed',at:null});}

function getJapaneseVoices(){
  if(typeof window==='undefined'||!window.speechSynthesis?.getVoices)return[];
  const voices=window.speechSynthesis.getVoices()||[];
  return voices.filter(v=>/^ja([-_]|$)/i.test(v.lang||'')||/Japanese|Kyoko|Otoya|Haruka|Ichiro|Sayaka|Hattori/i.test(v.name||''));
}
function pickSpeechVoice(voiceURI=''){
  const voices=getJapaneseVoices();
  return voices.find(v=>v.voiceURI===voiceURI)||voices.find(v=>/^ja/i.test(v.lang||''))||voices[0]||null;
}
function speakJapanese(text,rate=0.9,voiceURI='',onEnd=null){
  if(typeof window==='undefined'||!window.speechSynthesis||!text)return;
  if(typeof SpeechSynthesisUtterance==='undefined')return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  const voice=pickSpeechVoice(voiceURI);
  u.lang='ja-JP';u.rate=rate;if(voice)u.voice=voice;
  if(typeof onEnd==='function'){u.onend=onEnd;u.onerror=onEnd;}
  window.speechSynthesis.speak(u);
}
function normalizeJapaneseText(s){return(s||'').normalize('NFKC').replace(/[、。！？\s'"「」『』（）()]/g,'').toLowerCase();}
function resolveDisplayScripts(prefs=DEFAULT_PREFS){
  const ds=prefs.displayScripts;
  if(ds&&(ds.kanji||ds.kana||ds.romaji))return{kanji:!!ds.kanji,kana:!!ds.kana,romaji:!!ds.romaji};
  if(prefs.scriptMode==='hiragana')return{kanji:false,kana:true,romaji:false};
  if(prefs.scriptMode==='romaji')return{kanji:false,kana:false,romaji:true};
  if(prefs.scriptMode==='all')return{kanji:true,kana:true,romaji:true};
  return{kanji:true,kana:true,romaji:false};
}
function scriptModeFromDisplay(ds){
  if(ds.kanji&&ds.kana&&ds.romaji)return'all';
  if(!ds.kanji&&ds.kana&&!ds.romaji)return'hiragana';
  if(!ds.kanji&&!ds.kana&&ds.romaji)return'romaji';
  return'kanji';
}
function mergePracticePrefs(prefs){
  const source=prefs||{};
  const displayScripts=source.displayScripts?{...DEFAULT_PREFS.displayScripts,...source.displayScripts}:resolveDisplayScripts(source);
  return{...DEFAULT_PREFS,...source,displayScripts};
}
function formDisplay(kana,prefs=DEFAULT_PREFS){
  const ds=resolveDisplayScripts(prefs);
  const rom=kanaToRomaji(kana);
  const main=ds.kana||!ds.romaji?kana:rom;
  const sub=ds.romaji&&main!==rom?rom:'';
  return{main,sub,lang:main===rom?'en':'ja'};
}
function promptDisplay(item,promptType,prefs=DEFAULT_PREFS){
  const ds=resolveDisplayScripts(prefs);
  const kana=promptType?conjugateItem(item,promptType):item.reading;
  const kanji=promptType?null:item.dict;
  const rom=kanaToRomaji(kana);
  const main=ds.kanji&&kanji?kanji:(ds.kana||!ds.romaji?kana:rom);
  const ruby=!!prefs.furigana&&ds.kanji&&ds.kana&&kanji&&main===kanji&&kanji!==kana?kana:'';
  const sub=[];
  if(ds.kanji&&kanji&&main!==kanji)sub.push(kanji);
  if(ds.kana&&main!==kana&&!ruby)sub.push(kana);
  if(ds.romaji&&main!==rom)sub.push(rom);
  return{main,sub:sub.join(' · '),ruby,lang:main===rom?'en':'ja'};
}
function ScriptDisplay({view,className='',subClassName='text-sm text-stone-500 mt-1'}){
  if(!view)return null;
  return(<>
    <div className={className} lang={view.lang}>{view.ruby?<ruby>{view.main}<rt>{view.ruby}</rt></ruby>:view.main}</div>
    {view.sub&&<div className={subClassName}>{view.sub}</div>}
  </>);
}
function kanaCoachCells(expected,input,revealed=0){
  const target=Array.from(expected||'');
  const typed=Array.from(toHiragana(input||''));
  return target.map((expectedKana,i)=>{
    const got=typed[i]||'';
    const hinted=!got&&i<revealed;
    return{expected:expectedKana,shown:got||(hinted?expectedKana:''),state:got?(got===expectedKana?'correct':'wrong'):(hinted?'hint':'empty')};
  });
}
function editDistance(a,b){
  a=normalizeJapaneseText(a);b=normalizeJapaneseText(b);
  const dp=Array.from({length:a.length+1},()=>Array(b.length+1).fill(0));
  for(let i=0;i<=a.length;i++)dp[i][0]=i;
  for(let j=0;j<=b.length;j++)dp[0][j]=j;
  for(let i=1;i<=a.length;i++)for(let j=1;j<=b.length;j++)dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  return dp[a.length][b.length];
}
function speechSimilarity(target,heard){
  const a=normalizeJapaneseText(target),b=normalizeJapaneseText(heard);
  if(!a||!b)return null;
  return Math.max(0,Math.round((1-editDistance(a,b)/Math.max(a.length,b.length))*100));
}
function shuffled(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function makeChoices(current,verbs){
  const expected=conjugateItem(current.verb,current.type);
  const types=isAdjective(current.verb)?ADJ_TYPES:CONJ_TYPES;
  const set=new Set([expected]);
  for(const t of shuffled(types)){const v=conjugateItem(current.verb,t.id);if(v&&v!==expected)set.add(v);if(set.size>=4)break;}
  for(const v of shuffled(verbs.filter(v=>v.group===current.verb.group))){const x=conjugateItem(v,current.type);if(x&&x!==expected)set.add(x);if(set.size>=4)break;}
  return shuffled([...set].slice(0,4));
}

function RushView({state,setState,verbs,practicePrefs=DEFAULT_PREFS,wordLists=[]}){
  const gameWords=useMemo(()=>filterWordsForPrefs(verbs,practicePrefs,wordLists),[verbs,practicePrefs,wordLists]);
  const eligible=useMemo(()=>gameWords.filter(w=>compatibleTypes(w).some(t=>state.enabledTypes.includes(t.id))),[gameWords,state.enabledTypes]);
  const game=state.game||defaultState().game;
  const[active,setActive]=useState(false);
  const[paused,setPaused]=useState(false);
  const[round,setRound]=useState(null);
  const[answer,setAnswer]=useState('');
  const[score,setScore]=useState(0);
  const[combo,setCombo]=useState(0);
  const[cleared,setCleared]=useState(0);
  const[wave,setWave]=useState(1);
  const[deadline,setDeadline]=useState(0);
  const[timeLeft,setTimeLeft]=useState(0);
  const[feedback,setFeedback]=useState(null);
  const[recent,setRecent]=useState([]);
  const advanceRef=useRef(null);
  const resolvingRef=useRef(false);
  useEffect(()=>()=>{if(advanceRef.current)clearTimeout(advanceRef.current);},[]);
  useEffect(()=>{
    if(!active||paused||!round)return;
    const id=setInterval(()=>{
      const left=Math.max(0,deadline-Date.now());
      setTimeLeft(left);
      if(left<=0)resolveRound(false,'timeout');
    },100);
    return()=>clearInterval(id);
  },[active,paused,round,deadline]);
  function buildRound(){
    if(!eligible.length)return null;
    const item=shuffled(eligible)[0];
    const types=compatibleTypes(item).filter(t=>state.enabledTypes.includes(t.id));
    if(!types.length)return null;
    const type=shuffled(types)[0];
    const promptType=pickPromptType(item,type.id,practicePrefs);
    const prompt=promptDisplay(item,promptType,practicePrefs);
    return{item,type,promptType,prompt,expected:conjugateItem(item,type.id),key:`${item.dict}-${type.id}-${Date.now()}-${Math.random()}`};
  }
  function launchRound(nextCleared=cleared){
    const next=buildRound();
    if(!next){setActive(false);setRound(null);setFeedback({kind:'bad',title:'No cards available',detail:'Current filters have no enabled conjugation cards.'});return;}
    const nextWave=1+Math.floor(nextCleared/5);
    const limit=Math.max(3600,8500-Math.min(nextWave-1,9)*520);
    resolvingRef.current=false;
    setWave(nextWave);setRound({...next,limit});setAnswer('');setFeedback(null);setDeadline(Date.now()+limit);setTimeLeft(limit);
  }
  function startGame(){
    if(!eligible.length){setFeedback({kind:'bad',title:'No cards available',detail:'Current filters have no enabled conjugation cards.'});return;}
    if(advanceRef.current)clearTimeout(advanceRef.current);
    setScore(0);setCombo(0);setCleared(0);setRecent([]);setPaused(false);setActive(true);
    setState(s=>{const prev=s.game||defaultState().game;return{...s,game:{...prev,played:(prev.played||0)+1}};});
    launchRound(0);
  }
  function endGame(){
    if(advanceRef.current)clearTimeout(advanceRef.current);
    setActive(false);setPaused(false);setRound(null);setFeedback(null);setAnswer('');
  }
  function matchingRule(item,typeId){return RULES.find(r=>r.type===typeId&&r.verbFilter([item]).length);}
  function recordRushAttempt(current,ok,raw,nextScore,nextCombo){
    setState(s=>{
      const rule=matchingRule(current.item,current.type.id);
      const rid=rule?.id||`${current.item.group}-${current.type.id}`;
      const dict=current.item.dict;
      const prevVS=(s.verbStats?.[dict]?.[rid])||{seen:0,incorrect:0};
      const prevGame=s.game||defaultState().game;
      return{...s,
        cards:{...s.cards,[rid]:gradeCard(s.cards[rid],ok)},
        verbStats:{...(s.verbStats||{}),[dict]:{...(s.verbStats?.[dict]||{}),[rid]:{seen:prevVS.seen+1,incorrect:prevVS.incorrect+(ok?0:1)}}},
        mistakes:ok?s.mistakes:recordMistake(s.mistakes,current.item,current.type.id,current.promptType,toHiragana(raw),current.expected),
        session:{reviewed:s.session.reviewed+1,correct:s.session.correct+(ok?1:0)},
        daily:ok?bumpDaily(s.daily,true,practicePrefs.dailyGoal||10):s.daily,
        game:{...prevGame,bestScore:Math.max(prevGame.bestScore||0,nextScore),bestCombo:Math.max(prevGame.bestCombo||0,nextCombo)}
      };
    });
  }
  function resolveRound(ok,reason='answer'){
    if(resolvingRef.current)return;
    if(!round)return;
    resolvingRef.current=true;
    const current=round;
    const raw=answer.trim();
    setRound(null);
    if(ok){
      const left=Math.max(0,deadline-Date.now());
      const nextCombo=combo+1;
      const gained=100+Math.round((left/current.limit)*90)+nextCombo*12+wave*5;
      const nextScore=score+gained;
      const nextCleared=cleared+1;
      setScore(nextScore);setCombo(nextCombo);setCleared(nextCleared);
      setFeedback({kind:'ok',title:`+${gained}`,detail:`${current.expected} · combo ${nextCombo}`});
      setRecent(r=>[{ok:true,prompt:current.prompt.main,type:current.type.label,expected:current.expected,answer:toHiragana(raw)},...r].slice(0,5));
      recordRushAttempt(current,true,raw,nextScore,nextCombo);
      advanceRef.current=setTimeout(()=>active&&launchRound(nextCleared),520);
    }else{
      setCombo(0);
      setFeedback({kind:'bad',title:reason==='timeout'?'Time':'Miss',detail:`${current.expected} · ${current.type.label}`});
      setRecent(r=>[{ok:false,prompt:current.prompt.main,type:current.type.label,expected:current.expected,answer:raw?toHiragana(raw):'--'},...r].slice(0,5));
      recordRushAttempt(current,false,raw,score,0);
      advanceRef.current=setTimeout(()=>active&&launchRound(cleared),900);
    }
  }
  function submit(){
    if(!round)return;
    const ok=toHiragana(answer)===round.expected;
    resolveRound(ok,ok?'answer':'wrong');
  }
  const pct=round?Math.max(0,Math.min(100,Math.round((timeLeft/round.limit)*100))):0;
  const fall=round?Math.round((1-timeLeft/round.limit)*126):0;
  const promptLabel=round?(round.promptType?getTypeInfo(round.promptType).label:'Dictionary form'):'';
  return(
    <div className="space-y-4">
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
        <div className="bg-white rounded-xl border border-stone-200 p-4"><div className="text-2xl font-semibold tabular-nums">{score}</div><div className="text-xs text-stone-500">Score</div></div>
        <div className="bg-white rounded-xl border border-stone-200 p-4"><div className="text-2xl font-semibold tabular-nums">{combo}</div><div className="text-xs text-stone-500">Combo</div></div>
        <div className="bg-white rounded-xl border border-stone-200 p-4"><div className="text-2xl font-semibold tabular-nums">{wave}</div><div className="text-xs text-stone-500">Wave</div></div>
        <div className="bg-white rounded-xl border border-stone-200 p-4"><div className="text-2xl font-semibold tabular-nums">{game.bestScore||0}</div><div className="text-xs text-stone-500">Best</div></div>
      </div>
      <div className="grid lg:grid-cols-[1fr_260px] gap-4">
        <div className="bg-white rounded-2xl border border-stone-200 p-5">
          <div className="flex items-center justify-between gap-3 mb-4">
            <div><h3 className="font-medium flex items-center gap-2"><IconSpark className="w-4 h-4 text-amber-500"/>Kotoba Rush</h3><p className="text-xs text-stone-500">{eligible.length} filtered cards · best combo {game.bestCombo||0}</p></div>
            <div className="flex gap-2">
              {!active?<button onClick={startGame} className="px-3 py-2 bg-stone-800 hover:bg-stone-900 text-white rounded-lg text-sm font-medium">Start</button>:<button onClick={()=>setPaused(!paused)} className="px-3 py-2 border border-stone-200 hover:bg-stone-50 rounded-lg text-sm">{paused?'Resume':'Pause'}</button>}
              {active&&<button onClick={endGame} className="px-3 py-2 border border-stone-200 hover:bg-stone-50 rounded-lg text-sm">End</button>}
            </div>
          </div>
          <div className="h-2 bg-stone-100 rounded-full overflow-hidden mb-4"><div className={`h-full transition-all ${pct>35?'bg-emerald-500':pct>15?'bg-amber-500':'bg-rose-500'}`} style={{width:pct+'%'}}/></div>
          <div className="relative h-80 overflow-hidden rounded-2xl bg-stone-900 border border-stone-800 text-white">
            <div className="absolute inset-x-5 bottom-10 h-px bg-rose-400/70"/>
            {round&&(
              <div className="absolute left-5 right-5 transition-transform duration-100" style={{transform:`translateY(${fall}px)`}}>
                <div className="rounded-2xl bg-white text-stone-900 shadow-xl p-5 border border-stone-200">
                  <div className="flex items-center justify-between gap-3 text-xs text-stone-500 mb-3"><span>{promptLabel} → {round.type.label}</span><span>Wave {wave}</span></div>
                  <ScriptDisplay view={round.prompt} className="text-3xl sm:text-4xl font-semibold leading-relaxed" subClassName="mt-1 text-sm text-stone-500"/>
                  <div className="mt-2 text-sm text-stone-500">{round.item.meaning}</div>
                  <div className="mt-1 text-xs text-stone-400">{GROUP_NAMES[round.item.group]}</div>
                </div>
              </div>
            )}
            {!round&&(
              <div className="absolute inset-0 flex items-center justify-center p-6 text-center">
                {feedback?<div className={`rounded-2xl px-5 py-4 border ${feedback.kind==='ok'?'bg-emerald-50 text-emerald-800 border-emerald-200':'bg-rose-50 text-rose-800 border-rose-200'}`}><div className="text-2xl font-semibold">{feedback.title}</div><div className="text-sm mt-1">{feedback.detail}</div></div>:<div><div className="text-3xl font-semibold">Kotoba Rush</div><div className="text-sm text-stone-300 mt-2">Score {game.bestScore||0} to beat.</div></div>}
              </div>
            )}
          </div>
          <div className="mt-4 grid sm:grid-cols-[1fr_auto] gap-2">
            <input value={answer} onChange={e=>setAnswer(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();submit();}}} disabled={!round||paused} placeholder="Type answer" lang="ja" autoComplete="off" autoCorrect="off" spellCheck="false" className="px-4 py-3 text-xl border-2 border-stone-200 rounded-xl focus:border-indigo-500 focus:outline-none disabled:bg-stone-50"/>
            <button onClick={submit} disabled={!round||paused} className="px-5 py-3 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-40 text-white rounded-xl font-medium">Submit</button>
          </div>
          {answer&&round&&toHiragana(answer)!==answer&&<div className="mt-2 text-center text-sm text-stone-500" lang="ja">→ {toHiragana(answer)}</div>}
        </div>
        <div className="bg-white rounded-2xl border border-stone-200 p-5">
          <h3 className="font-medium mb-3">Rush log</h3>
          {!recent.length?<div className="text-sm text-stone-500 py-8 text-center">No attempts yet.</div>:<div className="space-y-2">{recent.map((r,i)=><div key={i} className={`rounded-xl border px-3 py-2 ${r.ok?'border-emerald-200 bg-emerald-50':'border-rose-200 bg-rose-50'}`}><div className="flex items-center justify-between gap-2"><span className="text-xs text-stone-500">{r.type}</span><span className={`text-xs font-semibold ${r.ok?'text-emerald-700':'text-rose-700'}`}>{r.ok?'OK':'MISS'}</span></div><div className="mt-1 text-sm" lang="ja">{r.prompt} → {r.expected}</div><div className="text-xs text-stone-500 mt-1">You: <span lang="ja">{r.answer}</span></div></div>)}</div>}
        </div>
      </div>
    </div>
  );
}

function choiceListForForms(item,type,words){
  const expected=conjugateItem(item,type);
  const set=new Set([expected]);
  for(const t of shuffled(compatibleTypes(item))){const v=conjugateItem(item,t.id);if(v&&v!==expected)set.add(v);if(set.size>=4)break;}
  for(const w of shuffled(words.filter(w=>w.group===item.group))){const v=conjugateItem(w,type);if(v&&v!==expected)set.add(v);if(set.size>=4)break;}
  return shuffled([...set].slice(0,4)).map(v=>({key:v,label:v,lang:'ja',kind:'form'}));
}
function choiceListForMeaning(item,words){
  const seen=new Set([item.meaning]);
  const choices=[{key:item.meaning,label:item.meaning,kind:'text'}];
  for(const w of shuffled(words)){if(!w.meaning||seen.has(w.meaning))continue;seen.add(w.meaning);choices.push({key:w.meaning,label:w.meaning,kind:'text'});if(choices.length>=4)break;}
  return shuffled(choices);
}
function choiceListForWord(item,words){
  const key=wordKey(item),seen=new Set([key]);
  const choices=[{key,label:item.dict,sub:item.dict!==item.reading?item.reading:'',lang:'ja',kind:'word'}];
  for(const w of shuffled(words)){const k=wordKey(w);if(seen.has(k))continue;seen.add(k);choices.push({key:k,label:w.dict,sub:w.dict!==w.reading?w.reading:'',lang:'ja',kind:'word'});if(choices.length>=4)break;}
  return shuffled(choices);
}
function choiceListForGroup(item,words){
  const present=new Set(words.map(w=>w.group));
  const opts=CLASSIFY_OPTIONS.filter(o=>present.has(o.id)||o.id===item.group);
  return opts.map(o=>({key:o.id,label:o.label,sub:o.hint,kind:'text'}));
}
function buildMockQuestions(words,state,practicePrefs=DEFAULT_PREFS,wordLists=[],count=12){
  const filtered=filterWordsForPrefs(words,practicePrefs,wordLists);
  const enabled=state.enabledTypes&&state.enabledTypes.length?state.enabledTypes:ALL_CARD_TYPES.map(t=>t.id);
  const conjWords=filtered.filter(w=>compatibleTypes(w).some(t=>enabled.includes(t.id)));
  const kinds=[];
  if(conjWords.length)kinds.push('conjugation');
  if(filtered.length>=2)kinds.push('meaning','recognition','classify');
  const questions=[];
  for(let i=0;i<count&&kinds.length;i++){
    const kind=shuffled(kinds)[0];
    const pool=kind==='conjugation'?conjWords:filtered;
    const item=shuffled(pool)[0];
    if(!item)continue;
    if(kind==='conjugation'){
      const types=compatibleTypes(item).filter(t=>enabled.includes(t.id));
      const type=shuffled(types)[0];
      const answer=conjugateItem(item,type.id);
      questions.push({id:`mock-${i}-${kind}-${wordKey(item)}-${type.id}`,kind,skill:'Conjugation',item,type:type.id,answerKey:answer,answerLabel:answer,choices:choiceListForForms(item,type.id,filtered),prompt:'Choose the requested conjugated form.',note:explainItem(item,type.id).rule||getTypeInfo(type.id).hint});
    }else if(kind==='meaning'){
      questions.push({id:`mock-${i}-${kind}-${wordKey(item)}`,kind,skill:'Vocabulary meaning',item,answerKey:item.meaning,answerLabel:item.meaning,choices:choiceListForMeaning(item,filtered),prompt:'Choose the English meaning.',note:`${item.dict} means ${item.meaning}.`});
    }else if(kind==='recognition'){
      questions.push({id:`mock-${i}-${kind}-${wordKey(item)}`,kind,skill:'English to Japanese',item,answerKey:wordKey(item),answerLabel:item.dict,choices:choiceListForWord(item,filtered),prompt:'Choose the Japanese word.',note:`${item.meaning} is ${item.dict}${item.dict!==item.reading?` (${item.reading})`:''}.`});
    }else{
      questions.push({id:`mock-${i}-${kind}-${wordKey(item)}`,kind,skill:'Word classification',item,answerKey:item.group,answerLabel:CLASSIFY_OPTIONS.find(o=>o.id===item.group)?.label||item.group,choices:choiceListForGroup(item,filtered),prompt:'Choose the word type.',note:classifyHint(item)});
    }
  }
  return questions;
}
function mockSkillBreakdown(questions,answers){
  const by={};
  for(const q of questions){
    const s=by[q.skill]||{attempted:0,correct:0};
    s.attempted++;if(answers[q.id]===q.answerKey)s.correct++;
    by[q.skill]=s;
  }
  return by;
}
function MockTestView({state,setState,words,practicePrefs=DEFAULT_PREFS,wordLists=[]}){
  const stats=state.mock||defaultState().mock;
  const[phase,setPhase]=useState('intro');
  const[questions,setQuestions]=useState([]);
  const[index,setIndex]=useState(0);
  const[answers,setAnswers]=useState({});
  const[result,setResult]=useState(null);
  const filtered=useMemo(()=>filterWordsForPrefs(words,practicePrefs,wordLists),[words,practicePrefs,wordLists]);
  const current=questions[index]||null;
  const selected=current&&Object.prototype.hasOwnProperty.call(answers,current.id)?answers[current.id]:null;
  const currentCorrect=!!current&&selected===current.answerKey;
  const answeredCount=Object.keys(answers).length;
  function start(){
    const qs=buildMockQuestions(words,state,practicePrefs,wordLists,12);
    setQuestions(qs);setAnswers({});setIndex(0);setResult(null);setPhase(qs.length?'taking':'intro');
  }
  function choose(key){if(!current||selected!==null)return;setAnswers({...answers,[current.id]:key});}
  function finish(nextAnswers=answers){
    const breakdown=mockSkillBreakdown(questions,nextAnswers);
    const correct=questions.filter(q=>nextAnswers[q.id]===q.answerKey).length;
    const pct=questions.length?Math.round(correct/questions.length*100):0;
    let mistakes=state.mistakes||[];
    for(const q of questions){
      if(q.kind!=='conjugation'||nextAnswers[q.id]===q.answerKey)continue;
      const picked=q.choices.find(c=>c.key===nextAnswers[q.id]);
      mistakes=recordMistake(mistakes,q.item,q.type,null,picked?.label||'',q.answerKey);
    }
    const prior=state.mock||defaultState().mock;
    const bySkill={...(prior.bySkill||{})};
    for(const [skill,s] of Object.entries(breakdown)){
      const prev=bySkill[skill]||{attempted:0,correct:0};
      bySkill[skill]={attempted:prev.attempted+s.attempted,correct:prev.correct+s.correct,lastPct:s.attempted?Math.round(s.correct/s.attempted*100):0};
    }
    setState({...state,mistakes,mock:{...prior,taken:(prior.taken||0)+1,bestPct:Math.max(prior.bestPct||0,pct),lastPct:pct,lastScore:correct,lastTotal:questions.length,lastAt:Date.now(),bySkill}});
    setResult({correct,total:questions.length,pct,breakdown});
    setPhase('results');
  }

    if(!current)return;
    if(index>=questions.length-1)finish();

        </div>

          {selected!==null&&(
            <div className={`mt-4 rounded-xl border p-4 ${currentCorrect?'bg-emerald-50 border-emerald-200':'bg-rose-50 border-rose-200'}`}>

  const drillVerbs=useMemo(()=>filterWordsForPrefs(verbs,practicePrefs,wordLists).filter(v=>!isAdjective(v)),[verbs,practicePrefs,wordLists]);

  useEffect(()=>{if(!current&&drillVerbs.length)next(drillVerbs);},[current,drillVerbs,target]);

      </div>

            <div><h3 className="font-medium flex items-center gap-2"><IconSpark className="w-4 h-4 text-indigo-600"/>Te/Ta Ending Lab</h3><p className="text-xs text-stone-500">Rapid sound-change drill for て-form and plain past endings.</p></div>
            <div className="flex gap-2">{[{id:'te-form',label:'て'},{id:'plain-past',label:'た'}].map(o=><button key={o.id} onClick={()=>{setTarget(o.id);setCurrent(null);setResult(null);}} className={`px-3 py-2 rounded-lg text-sm border ${target===o.id?'bg-stone-800 text-white border-stone-800':'border-stone-200 hover:bg-stone-50'}`}>{o.label}</button>)}</div>

function srsStatsFor(state,verbs){
  const now=Date.now();let totalReviews=0,totalCorrect=0,due=0,learning=0,mastered=0,fresh=0,total=0;const leeches=[];
  for(const rule of RULES){
    if(!state.enabledTypes.includes(rule.type))continue;
    if(!rule.verbFilter(verbs).length)continue;
    total++;
    const c=state.cards[rule.id];
    if(!c){fresh++;continue;}
    totalReviews+=c.correct+c.incorrect;totalCorrect+=c.correct;
    if(c.nextReview<=now)due++;
    if(c.interval>=30)mastered++;else learning++;
    if(c.incorrect>=3&&c.incorrect>c.correct*0.5)leeches.push({id:rule.id,rule,card:c});
  }
  leeches.sort((a,b)=>b.card.incorrect-a.card.incorrect);
  return{totalReviews,totalCorrect,acc:totalReviews>0?Math.round((totalCorrect/totalReviews)*100):0,due,learning,mastered,fresh,leeches:leeches.slice(0,10),total};
}
function pct(correct,attempted){return attempted?Math.round(correct/attempted*100):0;}
function skillRadarScores(state,verbs){
  const srs=srsStatsFor(state,verbs);
  const meaning=state.meaning||defaultState().meaning;
  const classify=state.classify||defaultState().classify;
  const mock=state.mock||defaultState().mock;
  const daily=state.daily||defaultState().daily;
  const retention=srs.total?Math.round((srs.mastered/srs.total)*100):0;
  const consistency=Math.min(100,Math.round((daily.goalStreak||0)*12+(daily.currentAnswerStreak||0)*3+(daily.count||0)));
  const mockReadiness=mock.lastTotal?pct(mock.lastScore||0,mock.lastTotal||0):0;
  return[
    {id:'conjugation',label:'Conjugation',score:srs.totalReviews?srs.acc:0,detail:`${srs.totalCorrect}/${srs.totalReviews||0} reviews`},
    {id:'retention',label:'Retention',score:retention,detail:`${srs.mastered}/${srs.total||0} rules mastered`},
    {id:'vocabulary',label:'Meaning',score:pct(meaning.correct||0,meaning.attempted||0),detail:`${meaning.correct||0}/${meaning.attempted||0} meaning checks`},
    {id:'classification',label:'Classification',score:pct(classify.correct||0,classify.attempted||0),detail:`${classify.correct||0}/${classify.attempted||0} group checks`},
    {id:'mock',label:'Mock readiness',score:mockReadiness,detail:mock.lastTotal?`${mock.lastScore||0}/${mock.lastTotal} last mock`:'No mock yet'},
    {id:'consistency',label:'Consistency',score:consistency,detail:`${daily.count||0} today · ${daily.goalStreak||0} day streak`}
  ];
}

          </div>
          {!geminiKey&&<div className="mt-3 text-xs text-stone-400 text-center">Add a Gemini key in Settings for a personalized 7-day plan.</div>}

        </div>
        <div className="bg-white rounded-2xl border border-stone-200 p-5">
          <h3 className="font-medium mb-3">Lifetime accuracy</h3>
          <div className="text-4xl font-semibold tabular-nums">{stats.acc}%</div>
          <div className="h-2 bg-stone-100 rounded-full overflow-hidden mt-3"><div className="h-full bg-emerald-500 transition-all" style={{width:stats.acc+'%'}}/></div>
          <div className="text-xs text-stone-500 mt-2">{stats.totalCorrect} correct / {stats.totalReviews} reviews / {stats.total} rules</div>

function SRSLevelView({state,verbs}){
  const enabledTypes=state.enabledTypes.length>0?state.enabledTypes:ALL_CARD_TYPES.map(t=>t.id);

  const ruleLevel=useMemo(()=>{const m={};for(const r of RULES)m[r.id]=getCardLevel(state.cards[r.id]);return m;},[state]);

  const levelCounts=useMemo(()=>{
    const c=[0,0,0,0,0,0];
    for(const r of RULES){if(!enabledTypes.includes(r.type))continue;if(!r.verbFilter(verbs).length)continue;c[ruleLevel[r.id]]++;}
    return c;
  },[ruleLevel,enabledTypes,verbs]);
  const totalCards=levelCounts.reduce((s,c)=>s+c,0)||1;

  const byType=useMemo(()=>ALL_CARD_TYPES
    .filter(t=>enabledTypes.includes(t.id))
    .map(t=>({typeObj:t,rules:RULES.filter(r=>r.type===t.id&&r.verbFilter(verbs).length>0)}))

  const COL_KEYS=['ichidan','godan','suru','kuru','exception-いく','i-adjective','na-adjective'];

        <div className="grid grid-cols-3 gap-2 mb-4">
          {SRS_LEVELS.map((l,i)=>(
            <div key={l.id} className={`rounded-xl border p-3 ${l.bg} ${l.border}`}>
              <div className={`text-2xl font-bold ${l.text}`}>{levelCounts[i]}</div>
              <div className={`text-xs font-semibold mt-0.5 ${l.text}`}>{l.name}</div>
              <div className="text-xs text-stone-400 mt-0.5 leading-tight hidden sm:block">{l.sub}</div>
            </div>
          ))}
        </div>
        <div className="h-2.5 bg-stone-100 rounded-full overflow-hidden flex">
          {SRS_LEVELS.map((l,i)=>levelCounts[i]>0?(<div key={l.id} className={`h-full ${l.dot} transition-all`} style={{width:(levelCounts[i]/totalCards*100)+'%'}}/>):null)}
        </div>
        <div className="flex gap-3 mt-2 flex-wrap">
          {SRS_LEVELS.map((l,i)=>levelCounts[i]>0?(<div key={l.id} className="flex items-center gap-1"><div className={`w-2 h-2 rounded-sm ${l.dot}`}/><span className="text-xs text-stone-500">{l.name}</span></div>):null)}
        </div>
      </div>

      <div className="bg-white rounded-2xl border border-stone-200 overflow-hidden">
        <div className="flex items-center px-4 py-2 border-b border-stone-100 bg-stone-50">
          <div className="flex-1 text-xs text-stone-400 font-medium">Conjugation type</div>
          {COL_HEADS.map(h=>(<div key={h} className="w-14 text-center text-xs text-stone-400 font-medium flex-shrink-0" lang="ja">{h}</div>))}
        </div>
        <div className="divide-y divide-stone-50">
          {byType.map(({typeObj,rules})=>(
            <div key={typeObj.id} className="flex items-center px-4 py-2.5">
              <div className="flex-1 min-w-0 pr-2">
                <div className="text-sm text-stone-700 truncate">{typeObj.label}</div>
                {typeObj.sub&&<div className="text-xs text-stone-400" lang="ja">{typeObj.sub}</div>}
              </div>
              {COL_KEYS.map(col=>{
                const rid=col==='exception-いく'?`exception-いく|${typeObj.id}`:`${col}|${typeObj.id}`;
                const rule=rules.find(r=>r.id===rid);
                if(!rule)return(<div key={col} className="w-14 flex justify-center flex-shrink-0"><span className="w-10 h-6 rounded-md bg-stone-50 border border-stone-100 inline-block"/></div>);
                const lDef=SRS_LEVELS[ruleLevel[rule.id]];
                return(
                  <div key={col} className="w-14 flex justify-center flex-shrink-0">
                    <span title={`${typeObj.label} · ${rule.label} — ${lDef.name}`}
                      className={`text-xs font-semibold px-1.5 py-0.5 rounded-md border ${lDef.bg} ${lDef.text} ${lDef.border}`}
                      lang="ja">{COL_HEADS[COL_KEYS.indexOf(col)]}</span>
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>

      <div className="bg-white rounded-2xl border border-stone-200 p-4">
        <div className="text-xs font-semibold text-stone-400 mb-2 uppercase tracking-wider">Level guide</div>
        <div className="space-y-1.5">
          {SRS_LEVELS.map(l=>(
            <div key={l.id} className="flex items-center gap-2.5">
              <div className={`w-3 h-3 rounded-sm flex-shrink-0 ${l.dot}`}/>
              <span className={`text-xs font-semibold w-16 flex-shrink-0 ${l.text}`}>{l.name}</span>
              <span className="text-xs text-stone-400">{l.sub}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

const CLASSIFY_OPTIONS=[
  {id:'ichidan',label:'る-verb',hint:'Drop る and attach endings directly.'},
  {id:'godan',label:'う-verb',hint:'The final kana shifts across あ/い/え/お rows.'},
  {id:'suru',label:'する',hint:'Irregular する pattern.'},
  {id:'kuru',label:'来る',hint:'Irregular 来る pattern.'},
  {id:'i-adjective',label:'い-adjective',hint:'Usually ends in い and conjugates like 高い → 高かった.'},
  {id:'na-adjective',label:'な-adjective',hint:'Takes な before nouns and uses だ/です as a predicate.'},
];
function classifyHint(word){
  if(word.group==='ichidan')return `${word.reading} is ichidan: remove る to make forms like ${conjugate(word,'polite-present')}.`;
  if(word.group==='godan')return `${word.reading} is godan: the final ${word.reading.slice(-1)} shifts rows, as in ${conjugate(word,'plain-negative')}.`;
  if(word.group==='suru')return 'する is irregular: する, した, しない, して, できる.';
  if(word.group==='kuru')return '来る is irregular: くる, きた, こない, きて.';
  if(word.group==='i-adjective')return `${word.reading} conjugates as an い-adjective: ${conjugateAdjective(word,'adj-plain-past')}, ${conjugateAdjective(word,'adj-plain-negative')}.`;
  return `${word.reading} is a な-adjective: ${conjugateAdjective(word,'adj-attributive')} + noun, or ${conjugateAdjective(word,'adj-polite-present')}.`;
}
function meaningChoiceWords(current,words){
  const seen=new Set([`${current.group}|${current.dict}`]);
  const choices=[current];
  for(const w of shuffled(words)){
    const key=`${w.group}|${w.dict}`;
    if(seen.has(key))continue;
    seen.add(key);choices.push(w);
    if(choices.length>=4)break;
  }
  return shuffled(choices);
}
function MeaningView({state,setState,words,practicePrefs,wordLists=[],geminiKey}){
  const filtered=useMemo(()=>filterWordsForPrefs(words,practicePrefs,wordLists),[words,practicePrefs,wordLists]);
  const[mode,setMode]=useState('jp-en');
  const[current,setCurrent]=useState(null);
  const[result,setResult]=useState(null);
  const[aiTip,setAiTip]=useState('');
  const[aiLoading,setAiLoading]=useState(false);
  const[aiErr,setAiErr]=useState('');
  const aiRequestRef=useRef(0);
  const choices=useMemo(()=>current?meaningChoiceWords(current,filtered):[],[current,filtered]);
  useEffect(()=>{if(!current&&filtered.length)setCurrent(filtered[Math.floor(Math.random()*filtered.length)]);},[current,filtered]);
  useEffect(()=>{if(current&&filtered.length&&!filtered.some(w=>w.dict===current.dict&&w.group===current.group)){setCurrent(null);setResult(null);}},[filtered,current]);
  useEffect(()=>{setResult(null);setAiTip('');setAiErr('');aiRequestRef.current++;setAiLoading(false);},[current,mode]);
  if(!filtered.length)return(<div className="bg-white rounded-2xl border border-stone-200 p-8 text-center text-stone-500">No words match the current filters.</div>);
  if(!current)return null;
  const stats=state.meaning||defaultState().meaning;
  const acc=stats.attempted?Math.round(stats.correct/stats.attempted*100):0;
  const currentView=promptDisplay(current,null,practicePrefs);
  function choose(choice){
    if(result)return;
    const ok=choice.dict===current.dict&&choice.group===current.group;
    const key=`${current.group}|${current.dict}|${mode}`;
    const prev=stats.byWord?.[key]||{attempted:0,correct:0};
    setState({...state,meaning:{attempted:(stats.attempted||0)+1,correct:(stats.correct||0)+(ok?1:0),byWord:{...(stats.byWord||{}),[key]:{attempted:prev.attempted+1,correct:prev.correct+(ok?1:0),lastAt:Date.now()}}},daily:bumpDaily(state.daily,ok,practicePrefs.dailyGoal||10)});
    setResult({ok,choice});
  }
  function next(){
    setResult(null);setAiTip('');setAiErr('');aiRequestRef.current++;setAiLoading(false);
    const pool=filtered.length>1?filtered.filter(w=>w.dict!==current.dict||w.group!==current.group):filtered;
    setCurrent(pool[Math.floor(Math.random()*pool.length)]);
  }
  async function generateMeaningHook(){
    if(!geminiKey||!current)return;
    const requestId=++aiRequestRef.current;
    setAiLoading(true);setAiTip('');setAiErr('');
    try{
      const promptText=`Create one short memory hook for this Japanese vocabulary item.\nWord: ${current.dict} (${current.reading})\nMeaning: ${current.meaning}\nType: ${GROUP_NAMES[current.group]||current.group}\nKeep it under 45 words. Include a usage nuance or contrast only if it helps the learner remember the meaning.`;
      const reply=await callGemini([{role:'user',parts:[{text:promptText}]}],geminiKey,350,0.45,aiSystemFromPrefs(practicePrefs,AI_COACH_SYSTEM));
      if(aiRequestRef.current===requestId)setAiTip(reply.trim());
    }catch(e){if(aiRequestRef.current===requestId)setAiErr(e.message);}
    if(aiRequestRef.current===requestId)setAiLoading(false);
  }
  return(
    <div className="space-y-4">
      <div className="bg-white rounded-2xl border border-stone-200 p-5">
        <div className="flex items-start justify-between gap-3 mb-4">
          <div><h3 className="font-medium">Meaning drill</h3><p className="text-xs text-stone-500">Reinforce vocabulary while you practice conjugation words.</p></div>
          <div className="text-xs text-stone-500 text-right"><div>{stats.correct}/{stats.attempted}</div><div>{acc}% accuracy</div></div>
        </div>
        <div className="grid grid-cols-2 gap-2 mb-4">{[{id:'jp-en',label:'JP -> meaning'},{id:'en-jp',label:'Meaning -> JP'}].map(o=><button key={o.id} onClick={()=>{setMode(o.id);setResult(null);}} className={`px-3 py-2 rounded-lg text-sm border transition ${mode===o.id?'bg-stone-800 text-white border-stone-800':'bg-white border-stone-200 hover:border-stone-300'}`}>{o.label}</button>)}</div>
        <div className="text-center py-5 rounded-2xl bg-stone-50 border border-stone-200">
          {mode==='jp-en'?(
            <>
              <ScriptDisplay view={currentView} className="text-5xl font-medium mb-2" subClassName="text-stone-500"/>
              <button onClick={()=>speakJapanese(current.reading,0.9,practicePrefs.voiceURI)} className="mt-2 px-3 py-2 border border-stone-200 hover:bg-white rounded-lg text-sm text-stone-600 inline-flex items-center gap-1.5"><IconVolume className="w-4 h-4"/>Speak</button>
            </>
          ):(
            <div className="text-3xl sm:text-4xl font-semibold text-stone-800 px-4">{current.meaning}</div>
          )}
          <div className="text-[11px] text-stone-400 mt-3">JLPT {getWordMeta(current).jlpt}{getWordMeta(current).lesson?` · Genki L${getWordMeta(current).lesson}`:''}</div>
        </div>
        <div className="grid sm:grid-cols-2 gap-2 mt-4">
          {choices.map(c=>{
            const isCorrect=c.dict===current.dict&&c.group===current.group;
            const chosen=result&&result.choice.dict===c.dict&&result.choice.group===c.group;
            const cls=result&&isCorrect?'bg-emerald-50 border-emerald-300 text-emerald-800':result&&chosen&&!result.ok?'bg-rose-50 border-rose-300 text-rose-800':'bg-white border-stone-200 hover:border-indigo-400 hover:bg-indigo-50';
            return mode==='jp-en'
              ? <button key={`${c.group}|${c.dict}`} onClick={()=>choose(c)} disabled={!!result} className={`min-h-14 px-3 py-3 rounded-xl border text-sm font-medium transition ${cls}`}>{c.meaning}</button>
              : <button key={`${c.group}|${c.dict}`} onClick={()=>choose(c)} disabled={!!result} className={`min-h-14 px-3 py-3 rounded-xl border transition ${cls}`}><ScriptDisplay view={promptDisplay(c,null,practicePrefs)} className="text-xl font-medium" subClassName="text-xs text-stone-500 mt-1"/></button>;
          })}
        </div>
        {result&&(
          <div className={`mt-4 rounded-xl border p-4 ${result.ok?'bg-emerald-50 border-emerald-200':'bg-rose-50 border-rose-200'}`}>
            <div className={`text-sm font-medium ${result.ok?'text-emerald-800':'text-rose-800'}`}>{result.ok?'Correct.':'Not quite.'}</div>
            <div className="mt-2 flex items-baseline justify-center gap-2 flex-wrap"><span className="text-2xl font-medium" lang="ja">{current.dict}</span>{current.dict!==current.reading&&<span className="text-sm text-stone-500" lang="ja">{current.reading}</span>}<span className="text-sm text-stone-500 italic">{current.meaning}</span></div>
            <div className="mt-3 flex flex-wrap gap-2">
              <button onClick={generateMeaningHook} disabled={!geminiKey||aiLoading} className="flex-1 min-w-[9rem] py-2 px-3 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-40 text-white rounded-xl text-sm font-medium inline-flex items-center justify-center gap-1.5"><IconSpark className="w-4 h-4"/>{aiLoading?'Thinking...':'AI memory hook'}</button>
              <button onClick={next} autoFocus className="flex-1 min-w-[7rem] py-2 px-3 bg-stone-800 hover:bg-stone-900 text-white rounded-xl text-sm font-medium">Next</button>
            </div>
            {!geminiKey&&<div className="mt-2 text-xs text-stone-400 text-center">Add a Gemini key in Settings for memory hooks.</div>}
            {aiErr&&<div className="mt-2 text-sm text-rose-600">{aiErr}</div>}
            {aiTip&&<div className="mt-3 rounded-xl border border-indigo-100 bg-indigo-50 px-3 py-2 text-sm text-indigo-900 leading-relaxed">{aiTip}</div>}
          </div>
        )}
      </div>
    </div>
  );
}
function ClassificationView({state,setState,words,practicePrefs,wordLists=[]}){
  const filtered=useMemo(()=>filterWordsForPrefs(words,practicePrefs,wordLists),[words,practicePrefs,wordLists]);
  const[current,setCurrent]=useState(null);
  const[result,setResult]=useState(null);
  useEffect(()=>{if(!current&&filtered.length)setCurrent(filtered[Math.floor(Math.random()*filtered.length)]);},[current,filtered]);
  useEffect(()=>{if(current&&filtered.length&&!filtered.some(w=>w.dict===current.dict&&w.group===current.group)){setCurrent(null);setResult(null);}},[filtered,current]);
  if(!filtered.length)return(<div className="bg-white rounded-2xl border border-stone-200 p-8 text-center text-stone-500">No words match the current filters.</div>);

  const allowed=CLASSIFY_OPTIONS.filter(o=>filtered.some(w=>w.group===o.id)||o.id===current.group);
  const stats=state.classify||defaultState().classify;
  function choose(group){
    if(result)return;
    const ok=group===current.group;
    const prev=stats.byGroup?.[current.group]||{attempted:0,correct:0};
    setState({...state,classify:{attempted:(stats.attempted||0)+1,correct:(stats.correct||0)+(ok?1:0),byGroup:{...(stats.byGroup||{}),[current.group]:{attempted:prev.attempted+1,correct:prev.correct+(ok?1:0)}}},daily:bumpDaily(state.daily,ok,practicePrefs.dailyGoal||10)});
    setResult({ok,chosen:group});
  }
  function next(){
    setResult(null);
    const pool=filtered.length>1?filtered.filter(w=>w.dict!==current.dict||w.group!==current.group):filtered;
    setCurrent(pool[Math.floor(Math.random()*pool.length)]);
  }
  const acc=stats.attempted?Math.round(stats.correct/stats.attempted*100):0;
  const currentView=promptDisplay(current,null,practicePrefs);

        <div className="grid sm:grid-cols-3 gap-2">

        </div>

function MistakesView({state,setState,practicePrefs}){
  const mistakes=state.mistakes||[];
  const open=mistakes.filter(m=>!m.resolved);
  const[activeKey,setActiveKey]=useState(open[0]?.key||mistakes[0]?.key||null);
  const[answer,setAnswer]=useState('');
  const[result,setResult]=useState(null);
  useEffect(()=>{if(activeKey&&!mistakes.some(m=>m.key===activeKey))setActiveKey(open[0]?.key||mistakes[0]?.key||null);},[mistakes,open,activeKey]);
  const active=mistakes.find(m=>m.key===activeKey)||open[0]||mistakes[0]||null;
  function itemFromMistake(m){return{dict:m.dict,reading:m.reading,meaning:m.meaning,group:m.group};}
  function retest(m){setActiveKey(m.key);setAnswer('');setResult(null);}
  function submit(){
    if(!active||!answer.trim())return;
    const item=itemFromMistake(active);
    const expected=conjugateItem(item,active.type)||active.expected;
    const ok=toHiragana(answer)===expected;
    setResult({ok,expected,item});
    if(ok)setState({...state,mistakes:markMistakeResolved(state.mistakes,active.key),daily:bumpDaily(state.daily,true,practicePrefs.dailyGoal||10)});
  }
  const activeItem=active?itemFromMistake(active):null;
  const activeExpected=activeItem?conjugateItem(activeItem,active.type)||active.expected:'';
  const activePromptView=activeItem?promptDisplay(activeItem,active.promptType,practicePrefs):null;
  const activeExpectedView=activeExpected?formDisplay(activeExpected,practicePrefs):null;
  return(
    <div className="grid lg:grid-cols-[320px_1fr] gap-4">

        <div className="p-4 border-b border-stone-100 flex items-center justify-between">

        {!mistakes.length?(
          <div className="p-8 text-center text-sm text-stone-500">Missed answers will appear here for one-tap retests.</div>
        ):(
          <div className="max-h-[560px] overflow-y-auto divide-y divide-stone-50">
            {mistakes.map(m=>(<button key={m.key} onClick={()=>retest(m)} className={`w-full text-left px-4 py-3 transition ${active?.key===m.key?'bg-indigo-50':'hover:bg-stone-50'}`}>
              <div className="flex items-center justify-between gap-2">
                <span className="font-medium text-stone-800" lang="ja">{m.dict}</span>
                <span className={`text-[11px] ${m.resolved?'text-emerald-600':'text-rose-600'}`}>{m.resolved?'resolved':`${m.count}x`}</span>
              </div>
              <div className="text-xs text-stone-500">{getTypeInfo(m.type).label}{m.promptType?` from ${promptFormLabel(itemFromMistake(m),m.promptType)}`:''}</div>
              <div className="text-xs text-stone-400 truncate">You wrote <span lang="ja">{m.userAnswer}</span>; expected <span lang="ja">{m.expected}</span></div>
            </button>))}
          </div>
        )}
      </div>
      <div className="bg-white rounded-2xl border border-stone-200 p-5">
        {!active?(
          <div className="text-center text-stone-500 py-16">No mistakes to retest yet.</div>
        ):(
          <div className="space-y-4">
            <div className="flex items-start justify-between gap-3">
              <div>
                <div className="text-xs uppercase tracking-wider text-indigo-600 font-medium">Retest missed card</div>
                <ScriptDisplay view={activePromptView} className="text-4xl font-medium mt-2" subClassName="text-stone-500 mt-1"/>
                {active.promptType&&<div className="text-xs text-stone-400 mt-1">Base: <span lang="ja">{active.dict}</span> · {promptFormLabel(activeItem,active.promptType)}</div>}
                <div className="text-sm text-stone-500 italic mt-2">{active.meaning}</div>
                <div className="text-xs text-stone-400 mt-1">Answer with {getTypeInfo(active.type).label}</div>
              </div>
              <button onClick={()=>speakJapanese(activeExpected,0.9,practicePrefs.voiceURI)} className="p-2 border border-stone-200 hover:bg-stone-50 rounded-lg text-stone-500" title="Speak"><IconVolume className="w-4 h-4"/></button>
            </div>
            <div>
              <input value={answer} onChange={e=>{setAnswer(e.target.value);setResult(null);}} onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();submit();}}} placeholder="Type romaji or kana…" className="w-full px-4 py-3 text-xl text-center border-2 border-stone-200 rounded-xl focus:border-indigo-500 focus:outline-none" lang="ja" autoComplete="off" autoCorrect="off" spellCheck="false"/>
              {answer&&toHiragana(answer)!==answer&&<div className="mt-2 text-center text-sm text-stone-500" lang="ja">→ {toHiragana(answer)}</div>}
              <button onClick={submit} disabled={!answer.trim()} className="w-full mt-3 py-2.5 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-40 text-white rounded-xl font-medium">Retest</button>
            </div>
            {result&&(
              <div className={`rounded-xl border p-4 ${result.ok?'bg-emerald-50 border-emerald-200':'bg-rose-50 border-rose-200'}`}>
                <div className={`text-sm font-medium ${result.ok?'text-emerald-800':'text-rose-800'}`}>{result.ok?'Resolved.':'Still needs work.'}</div>
                <ScriptDisplay view={activeExpectedView} className="text-xl mt-2" subClassName="text-xs text-stone-500 mt-1"/>
                {!result.ok&&<div className="mt-3 text-sm text-stone-700">{explainItem(result.item,active.type).rule}</div>}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function buildAmbientDeck(words,state,practicePrefs=DEFAULT_PREFS,wordLists=[],mode='smart',count=18){
  const filtered=filterWordsForPrefs(words,practicePrefs,wordLists);
  const enabled=state.enabledTypes&&state.enabledTypes.length?state.enabledTypes:ALL_CARD_TYPES.map(t=>t.id);
  const cards=[];
  for(const rule of RULES){
    if(!enabled.includes(rule.type))continue;
    const pool=rule.verbFilter(filtered);
    if(!pool.length)continue;
    const item=shuffled(pool)[0];
    const form=conjugateItem(item,rule.type);
    if(!form)continue;
    const card=state.cards?.[rule.id];
    const due=card&&card.nextReview<=Date.now();
    const fresh=!card;
    const weak=ruleWeakScore(state,rule.id);
    const score=mode==='all'?Math.random():weak*3+(due?4:0)+(fresh?1:0)+(card?.incorrect||0);
    cards.push({id:`${rule.id}|${wordKey(item)}`,item,type:rule.type,ruleLabel:rule.label,form,example:contextSentenceFor(item,rule.type),score,due,fresh,weak});
  }
  const sorted=mode==='all'?shuffled(cards):cards.sort((a,b)=>b.score-a.score||a.ruleLabel.localeCompare(b.ruleLabel));
  return sorted.slice(0,count);
}
function AmbientReviewPanel({state,setState,words,practicePrefs=DEFAULT_PREFS,wordLists=[]}){
