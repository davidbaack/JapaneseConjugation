const ROMAJI_MAP={
  kya:'きゃ',kyu:'きゅ',kyo:'きょ',gya:'ぎゃ',gyu:'ぎゅ',gyo:'ぎょ',
  sha:'しゃ',shu:'しゅ',sho:'しょ',shi:'し',cha:'ちゃ',chu:'ちゅ',cho:'ちょ',chi:'ち',tsu:'つ',
  nya:'にゃ',nyu:'にゅ',nyo:'にょ',hya:'ひゃ',hyu:'ひゅ',hyo:'ひょ',
  bya:'びゃ',byu:'びゅ',byo:'びょ',pya:'ぴゃ',pyu:'ぴゅ',pyo:'ぴょ',
  mya:'みゃ',myu:'みゅ',myo:'みょ',rya:'りゃ',ryu:'りゅ',ryo:'りょ',
  ja:'じゃ',ju:'じゅ',jo:'じょ',ji:'じ',
  ka:'か',ki:'き',ku:'く',ke:'け',ko:'こ',ga:'が',gi:'ぎ',gu:'ぐ',ge:'げ',go:'ご',
  sa:'さ',su:'す',se:'せ',so:'そ',si:'し',za:'ざ',zu:'ず',ze:'ぜ',zo:'ぞ',zi:'じ',
  ta:'た',te:'て',to:'と',ti:'ち',tu:'つ',da:'だ',di:'ぢ',du:'づ',de:'で',do:'ど',
  na:'な',ni:'に',nu:'ぬ',ne:'ね',no:'の',ha:'は',hi:'ひ',fu:'ふ',he:'へ',ho:'ほ',hu:'ふ',
  ba:'ば',bi:'び',bu:'ぶ',be:'べ',bo:'ぼ',pa:'ぱ',pi:'ぴ',pu:'ぷ',pe:'ぺ',po:'ぽ',
  ma:'ま',mi:'み',mu:'む',me:'め',mo:'も',ya:'や',yu:'ゆ',yo:'よ',
  ra:'ら',ri:'り',ru:'る',re:'れ',ro:'ろ',wa:'わ',wo:'を',
  a:'あ',i:'い',u:'う',e:'え',o:'お',
};
function toHiragana(s){
  if(!s)return'';
  s=s.toLowerCase().trim();
  let out='',i=0;
  while(i<s.length){
    const ch=s[i];
    if(ch.charCodeAt(0)>127){out+=ch;i++;continue;}
    if(/\s/.test(ch)){i++;continue;}
    if(ch==='n'){const nx=s[i+1];if(nx===undefined||nx==='n'||!/[aiueoy]/.test(nx)){out+='ん';i++;continue;}}
    if(i<s.length-1&&/[bcdfghjkmpqrstvwxyz]/.test(ch)&&s[i]===s[i+1]){out+='っ';i++;continue;}
    let matched=false;
    for(let len=3;len>=1;len--){const sub=s.slice(i,i+len);if(ROMAJI_MAP[sub]){out+=ROMAJI_MAP[sub];i+=len;matched=true;break;}}
    if(!matched){out+=ch;i++;}
  }
  return out;
}
function isAllKana(s){
  if(!s)return false;
  for(const ch of s){const c=ch.charCodeAt(0);if(!((c>=0x3040&&c<=0x309F)||(c>=0x30A0&&c<=0x30FF)))return false;}
  return true;
}

// ============================================================================
// CONJUGATION ENGINE
// ============================================================================
const A_ROW={う:'わ',く:'か',ぐ:'が',す:'さ',つ:'た',ぬ:'な',ぶ:'ば',む:'ま',る:'ら'};
const I_ROW={う:'い',く:'き',ぐ:'ぎ',す:'し',つ:'ち',ぬ:'に',ぶ:'び',む:'み',る:'り'};
const E_ROW={う:'え',く:'け',ぐ:'げ',す:'せ',つ:'て',ぬ:'ね',ぶ:'べ',む:'め',る:'れ'};
const O_ROW={う:'お',く:'こ',ぐ:'ご',す:'そ',つ:'と',ぬ:'の',ぶ:'ぼ',む:'も',る:'ろ'};
const PAST_END={く:'いた',ぐ:'いだ',す:'した',つ:'った',う:'った',る:'った',ぬ:'んだ',ぶ:'んだ',む:'んだ'};
const TE_END={く:'いて',ぐ:'いで',す:'して',つ:'って',う:'って',る:'って',ぬ:'んで',ぶ:'んで',む:'んで'};

function conjugate(verb,type){
  const{reading,group}=verb;
  if(group==='ichidan'){
    const stem=reading.slice(0,-1);
    const te=stem+'て',neg=stem+'ない',past=stem+'た';
    const M={
      'plain-present':reading,'plain-past':past,'plain-negative':neg,'plain-past-negative':stem+'なかった',
      'polite-present':stem+'ます','polite-past':stem+'ました','polite-negative':stem+'ません','polite-past-negative':stem+'ませんでした',
      'te-form':te,'potential':stem+'られる','volitional':stem+'よう','conditional-tara':past+'ら','conditional-ba':stem+'れば',
      'imperative':stem+'ろ','passive':stem+'られる','causative':stem+'させる','causative-passive':stem+'させられる',
      'desiderative':stem+'たい','progressive':te+'いる','negative-te':neg+'で','prohibition':reading+'な'
    };
    return M[type]||'';
  }
  if(group==='godan'){
    const stem=reading.slice(0,-1),last=reading.slice(-1);
    let pastEnd=PAST_END[last],teEnd=TE_END[last];
    if(reading==='いく'||reading.endsWith('いく')){pastEnd='った';teEnd='って';}
    const neg=reading==='ある'?'ない':stem+A_ROW[last]+'ない';
    const pastNeg=reading==='ある'?'なかった':stem+A_ROW[last]+'なかった';
    const te=stem+teEnd,past=stem+pastEnd;
    const M={
      'plain-present':reading,'plain-past':past,'plain-negative':neg,'plain-past-negative':pastNeg,
      'polite-present':stem+I_ROW[last]+'ます','polite-past':stem+I_ROW[last]+'ました','polite-negative':stem+I_ROW[last]+'ません','polite-past-negative':stem+I_ROW[last]+'ませんでした',
      'te-form':te,'potential':stem+E_ROW[last]+'る','volitional':stem+O_ROW[last]+'う','conditional-tara':past+'ら','conditional-ba':stem+E_ROW[last]+'ば',
      'imperative':stem+E_ROW[last],'passive':stem+A_ROW[last]+'れる','causative':stem+A_ROW[last]+'せる','causative-passive':stem+A_ROW[last]+'せられる',
      'desiderative':stem+I_ROW[last]+'たい','progressive':te+'いる','negative-te':neg+'で','prohibition':reading+'な'
    };
    return M[type]||'';
  }
  if(group==='suru'){
    const stem=reading.endsWith('する')?reading.slice(0,-2):'';
    const M={
      'plain-present':'する','plain-past':'した','plain-negative':'しない','plain-past-negative':'しなかった',
      'polite-present':'します','polite-past':'しました','polite-negative':'しません','polite-past-negative':'しませんでした',
      'te-form':'して','potential':'できる','volitional':'しよう','conditional-tara':'したら','conditional-ba':'すれば',
      'imperative':'しろ','passive':'される','causative':'させる','causative-passive':'させられる',
      'desiderative':'したい','progressive':'している','negative-te':'しないで','prohibition':'するな'
    };
    return stem+(M[type]||'');
  }
  if(group==='kuru'){
    const stem=reading.endsWith('くる')?reading.slice(0,-2):'';
    const M={
      'plain-present':'くる','plain-past':'きた','plain-negative':'こない','plain-past-negative':'こなかった',
      'polite-present':'きます','polite-past':'きました','polite-negative':'きません','polite-past-negative':'きませんでした',
      'te-form':'きて','potential':'こられる','volitional':'こよう','conditional-tara':'きたら','conditional-ba':'くれば',
      'imperative':'こい','passive':'こられる','causative':'こさせる','causative-passive':'こさせられる',
      'desiderative':'きたい','progressive':'きている','negative-te':'こないで','prohibition':'くるな'
    };
    return stem+(M[type]||'');
  }
  return'';
}

function adjectiveStem(adj){
  const reading=adj.reading;
  if(adj.irregular||reading==='いい'||reading==='かっこいい')return reading.slice(0,-2)+'よ';
  return reading.endsWith('い')?reading.slice(0,-1):reading;
}
function conjugateAdjective(adj,type){
  const{reading,group}=adj;
  if(group==='i-adjective'){
    const stem=adjectiveStem(adj);
    const past=stem+'かった',neg=stem+'くない',pastNeg=stem+'くなかった';
    const M={
      'adj-plain-present':reading,'adj-plain-past':past,'adj-plain-negative':neg,'adj-plain-past-negative':pastNeg,
      'adj-polite-present':reading+'です','adj-polite-past':past+'です','adj-polite-negative':neg+'です','adj-polite-past-negative':pastNeg+'です',
      'adj-te-form':stem+'くて','adj-adverb':stem+'く','adj-attributive':reading,'adj-conditional':stem+'ければ',
      'adj-tara':past+'ら','adj-sou':stem+'そう','adj-sugiru':stem+'すぎる','adj-naru':stem+'くなる'
    };
    return M[type]||'';
  }
  if(group==='na-adjective'){
    const stem=reading.replace(/な$/,'');
    const M={
      'adj-plain-present':stem+'だ','adj-plain-past':stem+'だった','adj-plain-negative':stem+'ではない','adj-plain-past-negative':stem+'ではなかった',
      'adj-polite-present':stem+'です','adj-polite-past':stem+'でした','adj-polite-negative':stem+'ではありません','adj-polite-past-negative':stem+'ではありませんでした',
      'adj-te-form':stem+'で','adj-adverb':stem+'に','adj-attributive':stem+'な','adj-conditional':stem+'なら',
      'adj-tara':stem+'だったら','adj-sou':stem+'そう','adj-sugiru':stem+'すぎる','adj-naru':stem+'になる'
    };
    return M[type]||'';
  }
  return'';
}
function conjugateItem(item,type){return item.group==='i-adjective'||item.group==='na-adjective'?conjugateAdjective(item,type):conjugate(item,type);}
function isAdjective(item){return item.group==='i-adjective'||item.group==='na-adjective';}

// ============================================================================
// EXPLANATION ENGINE
// ============================================================================
const GROUP_NAMES={ichidan:'an ichidan verb (る-verb / Group 2)',godan:'a godan verb (う-verb / Group 1)',suru:'irregular (the verb する, Group 3)',kuru:'irregular (the verb 来る, Group 3)','i-adjective':'an い-adjective','na-adjective':'a な-adjective'};

function explainConjugation(verb,type){
  const{reading,group,dict}=verb;
  const result=conjugate(verb,type);
  const stem=reading.slice(0,-1),last=reading.slice(-1);
  const intro=`${dict} (${reading}) is ${GROUP_NAMES[group]}.`;
  let rule='',derivation=result,note='';

function explainAdjective(adj,type){

  if(adj.group==='i-adjective'){

    const M={
      'adj-plain-present':['Dictionary form.',result],

      'adj-plain-negative':['Drop い, add くない.',`${stem} + くない = ${result}`],
      'adj-plain-past-negative':['Drop い, add くなかった.',`${stem} + くなかった = ${result}`],
      'adj-polite-present':['Add です to the dictionary form.',`${adj.reading} + です = ${result}`],
      'adj-polite-past':['Make the plain past, then add です.',`${stem} + かった + です = ${result}`],
      'adj-polite-negative':['Make the plain negative, then add です.',`${stem} + くない + です = ${result}`],
      'adj-polite-past-negative':['Make the plain past negative, then add です.',`${stem} + くなかった + です = ${result}`],
      'adj-te-form':['Drop い, add くて.',`${stem} + くて = ${result}`],
      'adj-adverb':['Drop い, add く.',`${stem} + く = ${result}`],
      'adj-attributive':['Use the dictionary form before a noun.',result],
      'adj-conditional':['Drop い, add ければ.',`${stem} + ければ = ${result}`],
      'adj-tara':['Plain past + ら.',`${stem} + かった + ら = ${result}`],
      'adj-sou':['Drop い, add そう.',`${stem} + そう = ${result}`],
      'adj-sugiru':['Drop い, add すぎる.',`${stem} + すぎる = ${result}`],
      'adj-naru':['Drop い, add くなる.',`${stem} + くなる = ${result}`]

    [rule,derivation]=M[type]||['',result];
    if(irregular)note='いい and かっこいい conjugate from よい, so the stem becomes よ.';
  }else{
    const s=adj.reading.replace(/な$/,'');

      'adj-te-form':['Use で to connect clauses.',`${s} + で = ${result}`],
      'adj-adverb':['Add に for the adverbial form.',`${s} + に = ${result}`],
      'adj-attributive':['Add な before a noun.',`${s} + な = ${result}`],
      'adj-conditional':['Use なら for the common conditional.',`${s} + なら = ${result}`],
      'adj-tara':['Plain past + ら.',`${s} + だった + ら = ${result}`],
      'adj-sou':['Add そう.',`${s} + そう = ${result}`],
      'adj-sugiru':['Add すぎる.',`${s} + すぎる = ${result}`],
      'adj-naru':['Add になる.',`${s} + になる = ${result}`]

function explainItem(item,type){
  if(isAdjective(item))return explainAdjective(item,type);
  const e=explainConjugation(item,type);
  if(!e.rule&&type==='causative-passive')e.rule=item.group==='godan'?'Use the あ-row stem, then add せられる.':'Use the causative stem and add られる.';
  if(!e.rule&&type==='desiderative')e.rule=item.group==='godan'?'Use the い-row stem, then add たい.':'Use the verb stem, then add たい.';
  if(!e.rule&&type==='progressive')e.rule='Use the te-form, then add いる.';
  if(!e.rule&&type==='negative-te')e.rule='Use the plain negative form, then add で.';
  if(!e.rule&&type==='prohibition')e.rule='Use the dictionary form, then add な for a blunt prohibition.';
  return e;
}

function diagnose(verb,type,userAnswer){
  const got=toHiragana(userAnswer);
  if(!got)return'';
  for(const t of CONJ_TYPES){if(t.id===type)continue;if(conjugate(verb,t.id)===got)return`That's the ${t.label.toLowerCase()} form — wrong conjugation pattern.`;}
  for(const g of['ichidan','godan'].filter(g=>g!==verb.group)){try{const alt=conjugate({...verb,group:g},type);if(alt===got)return`You conjugated this as a ${g==='ichidan'?'る-verb':'う-verb'}, but ${verb.dict} is ${verb.group==='ichidan'?'ichidan':verb.group==='godan'?'godan':'irregular'}.`;}catch{}}
  return'';
}
function diagnoseItem(item,type,userAnswer){
  if(!isAdjective(item))return diagnose(item,type,userAnswer);
  const got=toHiragana(userAnswer);
  if(!got)return'';
  for(const t of ADJ_TYPES){if(t.id===type)continue;if(conjugateAdjective(item,t.id)===got)return`That's the ${t.label.toLowerCase()} form, but this card asks for ${getTypeInfo(type).label.toLowerCase()}.`;}
  const other=item.group==='i-adjective'?'na-adjective':'i-adjective';
  try{if(conjugateAdjective({...item,group:other},type)===got)return`You used the ${other==='i-adjective'?'い-adjective':'な-adjective'} pattern, but ${item.dict} is ${GROUP_NAMES[item.group]}.`;}catch{}
  return'';
}

const AI_SYSTEM=`You are a friendly Japanese language teacher helping a student who just got a verb conjugation wrong. The student can read hiragana and katakana but struggles with kanji. Always write Japanese in hiragana/katakana with romaji in brackets after it, e.g. たべた [tabeta]. Be warm, encouraging, and concise — 2 to 3 short paragraphs at most. Focus on the specific rule missed and give one extra example.`;
const AI_COACH_SYSTEM=`You are a concise Japanese conjugation and sentence coach. Analyze verbs and adjectives in context, identify conjugation mistakes, explain the rule, give a natural corrected sentence, and finish with one tiny practice prompt. Keep Japanese readable for learners by adding romaji after key forms.`;

function geminiText(d){
  const parts=d.candidates?.[0]?.content?.parts||[];
  return(parts.find(p=>!p.thought)||parts[0])?.text||'';
}
function normalizeGroup(g){
  if(!g)return null;
  const v=g.toLowerCase();
  if(v.includes('ichidan')||v.includes('ru-verb')||v.includes('group 2'))return'ichidan';
  if(v.includes('godan')||v.includes('u-verb')||v.includes('group 1'))return'godan';
  if(v.includes('suru'))return'suru';
  if(v.includes('kuru'))return'kuru';
  return null;
}
function extractJSON(text){
  for(let i=0;i<text.length;i++){
    if(text[i]!=='{')continue;
    let depth=0,inStr=false;
    for(let j=i;j<text.length;j++){
      const c=text[j];
      if(inStr){if(c==='\\')j++;else if(c==='"')inStr=false;}
      else if(c==='"')inStr=true;
      else if(c==='{')depth++;
      else if(c==='}'){if(!--depth){try{return JSON.parse(text.slice(i,j+1));}catch(e){break;}}}
    }
  }
  return null;
}

async function callGemini(contents,apiKey,maxTokens=600,temp=0.7,systemText=AI_SYSTEM){
  if(!apiKey)throw new Error('No Gemini API key — add it in Settings.');
  const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${encodeURIComponent(apiKey)}`,
    {method:'POST',headers:{'Content-Type':'application/json'},
     body:JSON.stringify({contents,systemInstruction:{parts:[{text:systemText}]},generationConfig:{maxOutputTokens:maxTokens,temperature:temp}})});
  const d=await r.json();
  if(!r.ok)throw new Error(d.error?.message||`HTTP ${r.status}`);
  return geminiText(d);
}

async function lookupVerbWithGemini(query,apiKey){
  if(!apiKey)throw new Error('No Gemini API key set');
  const prompt=`Look up this Japanese verb: "${query}"\n\nReturn ONLY a JSON object (no markdown, no extra text):\n{"dict":"kanji/kana dictionary form","reading":"hiragana only","meaning":"English meaning starting with to","group":"ichidan or godan or suru or kuru"}\n\nIf the input is English or romaji, find the most common Japanese verb for that meaning.`;
  const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${encodeURIComponent(apiKey)}`,
    {method:'POST',headers:{'Content-Type':'application/json'},
     body:JSON.stringify({contents:[{role:'user',parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:1024,temperature:0.1,thinkingConfig:{thinkingBudget:0}}})});
  const d=await r.json();
  if(!r.ok)throw new Error(d.error?.message||`HTTP ${r.status}`);
  const result=extractJSON(geminiText(d));
  if(result)result.group=normalizeGroup(result.group);
  if(!result||!result.dict||!result.reading||!result.meaning||!result.group)
    throw new Error('Unexpected AI response — try a different input');
  return result;
}

async function getSuggestedVerb(existingVerbs,apiKey){
  if(!apiKey)throw new Error('No Gemini API key set');
  const list=existingVerbs.map(v=>`${v.dict} (${v.reading}) — ${v.meaning} [${v.group}]`).join('\n');
  const prompt=`I'm learning Japanese verb conjugation with an SRS app. Here are the ${existingVerbs.length} verbs I'm already studying:\n\n${list}\n\nBased on my current vocabulary, suggest ONE new verb to add next. Consider JLPT frequency, useful patterns I haven't covered, and what learners at this level typically need. Do NOT suggest any verb already in my list.\n\nReturn ONLY a JSON object (no markdown):\n{"dict":"e.g. 始める","reading":"e.g. はじめる","meaning":"e.g. to begin","group":"ichidan or godan or suru or kuru","reason":"One sentence explaining why this is a good next verb for me."}`;
  const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${encodeURIComponent(apiKey)}`,
    {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{role:'user',parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:1024,temperature:0.9,thinkingConfig:{thinkingBudget:0}}})});
  const d=await r.json();
  if(!r.ok)throw new Error(d.error?.message||`HTTP ${r.status}`);
  const result=extractJSON(geminiText(d));
  if(result)result.group=normalizeGroup(result.group);

function buildContext(verb,type,userAnswer,expected,explanation){
  const ti=getTypeInfo(type);
  const label=isAdjective(verb)?'Adjective':'Verb';
  return`I'm studying Japanese and just got this wrong.\n\n${label}: ${verb.dict} (${verb.reading}) — ${verb.meaning}\nType: ${GROUP_NAMES[verb.group]}\nTask: ${ti.label} (${ti.hint})\nMy answer: ${toHiragana(userAnswer)||'(blank)'}\nCorrect: ${expected}\n\nAuto-explanation: ${explanation.intro} ${explanation.rule}${explanation.derivation&&explanation.derivation!==expected?'\nStep: '+explanation.derivation:''}${explanation.note?'\nNote: '+explanation.note:''}\n\nHelp me understand why the answer is ${expected} and where I went wrong. Always show romaji.`;
}

function ChatPanel({verb,type,userAnswer,expected,explanation,geminiKey}){
  const[apiHistory,setApiHistory]=useState([]);
  const[display,setDisplay]=useState([]);
  const[input,setInput]=useState('');
  const[loading,setLoading]=useState(true);
  const endRef=useRef(null);
  const context=useMemo(()=>buildContext(verb,type,userAnswer,expected,explanation),[]);

  useEffect(()=>{
    const init=[{role:'user',content:context}];
    const geminiMsgs=init.map(m=>({role:m.role==='assistant'?'model':'user',parts:[{text:m.content}]}));
    callGemini(geminiMsgs,geminiKey)
      .then(reply=>{setApiHistory([...init,{role:'assistant',content:reply}]);setDisplay([{role:'assistant',content:reply}]);})
      .catch(e=>setDisplay([{role:'assistant',content:`Error: ${e.message}`}]))
      .finally(()=>setLoading(false));
  },[]);

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'});},[display,loading]);

  async function send(){
    if(!input.trim()||loading)return;
    const txt=input;setInput('');
    const newDisplay=[...display,{role:'user',content:txt}];
    setDisplay(newDisplay);setLoading(true);
    const newApi=[...apiHistory,{role:'user',content:txt}];
    try{
      const geminiMsgs=newApi.map(m=>({role:m.role==='assistant'?'model':'user',parts:[{text:m.content}]}));
      const reply=await callGemini(geminiMsgs,geminiKey);
      setApiHistory([...newApi,{role:'assistant',content:reply}]);
      setDisplay([...newDisplay,{role:'assistant',content:reply}]);
    }catch(e){setDisplay([...newDisplay,{role:'assistant',content:`Error: ${e.message}`}]);}
    setLoading(false);
  }

  return(
    <div className="mt-3 pt-3 border-t border-rose-200">
      <div className="text-xs font-medium text-stone-500 mb-2 flex items-center gap-1.5"><IconChat className="w-3.5 h-3.5"/>Chat with Gemini</div>
      <div className="space-y-2 max-h-56 overflow-y-auto pb-1">
        {loading&&!display.length&&<div className="text-sm text-stone-400 italic px-3 py-2">Gemini is thinking…</div>}
        {display.map((m,i)=>(
          <div key={i} style={{whiteSpace:'pre-wrap'}}
            className={`text-sm px-3 py-2 rounded-lg leading-relaxed ${m.role==='assistant'?'bg-white border border-stone-200 text-stone-800':'bg-indigo-50 border border-indigo-100 text-indigo-900 ml-6 text-right'}`}>
            {m.content}
          </div>
        ))}
        {loading&&display.length>0&&<div className="text-sm text-stone-400 italic px-3">Gemini is thinking…</div>}
        <div ref={endRef}/>
      </div>
      <div className="flex gap-2 mt-2">
        <input type="text" value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();send();}}}
          placeholder="Ask a follow-up…" disabled={loading}
          autoCorrect="off" spellCheck="false"
          className="flex-1 px-3 py-1.5 text-sm border border-stone-200 rounded-lg focus:border-indigo-500 focus:outline-none disabled:opacity-50"/>
        <button onClick={send} disabled={loading||!input.trim()}
          className="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-40 text-white rounded-lg text-sm font-medium">Send</button>
      </div>
    </div>
  );
}

const DAY=86400000;
function localDateKey(offsetDays=0){const d=new Date(Date.now()+offsetDays*DAY);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function defaultState(){return{cards:{},verbStats:{},enabledTypes:[...CONJ_TYPES.filter(t=>t.id!=='plain-present').map(t=>t.id),...ADJ_TYPES.filter(t=>t.id!=='adj-plain-present').map(t=>t.id)],session:{reviewed:0,correct:0},daily:{date:localDateKey(),count:0,goalHit:false,goalStreak:0,bestGoalStreak:0,currentAnswerStreak:0,bestAnswerStreak:0}};}
function mergeState(saved,sessionOverride){
  const base=defaultState();
  const merged={...base,...(saved||{}),verbStats:(saved&&saved.verbStats)||{},daily:(saved&&saved.daily)||base.daily,session:sessionOverride||base.session};
  if(saved&&Array.isArray(saved.enabledTypes)&&!saved.enabledTypes.some(id=>id.startsWith('adj-'))){
    merged.enabledTypes=[...saved.enabledTypes,...base.enabledTypes.filter(id=>id.startsWith('adj-'))];
  }
  return merged;
}
function bumpDaily(daily,correct,dailyGoal){
  const today=localDateKey(),yesterday=localDateKey(-1);
  let d=daily||{};
  if(d.date!==today){
    const keepGoalStreak=d.date===yesterday&&d.goalHit;
    d={date:today,count:0,goalHit:false,goalStreak:keepGoalStreak?(d.goalStreak||0):0,bestGoalStreak:d.bestGoalStreak||0,currentAnswerStreak:0,bestAnswerStreak:d.bestAnswerStreak||0};
  }
  const count=(d.count||0)+1;
  const wasGoalHit=!!d.goalHit;
  const goalHit=count>=dailyGoal;
  const goalStreak=(d.goalStreak||0)+(!wasGoalHit&&goalHit?1:0);
  const currentAnswerStreak=correct?(d.currentAnswerStreak||0)+1:0;
  return{...d,count,goalHit,goalStreak,bestGoalStreak:Math.max(d.bestGoalStreak||0,goalStreak),currentAnswerStreak,bestAnswerStreak:Math.max(d.bestAnswerStreak||0,currentAnswerStreak)};
}
function gradeCard(card,correct){
  const now=Date.now();
  if(!card)card={ease:2.5,interval:0,reps:0,nextReview:0,correct:0,incorrect:0,lastSeen:0};
  if(correct){let iv;if(card.reps===0)iv=1;else if(card.reps===1)iv=3;else iv=Math.ceil(card.interval*card.ease);return{ease:card.ease,reps:card.reps+1,interval:iv,nextReview:now+iv*DAY,correct:card.correct+1,incorrect:card.incorrect,lastSeen:now};}
  return{ease:Math.max(1.3,card.ease-0.2),reps:0,interval:0,nextReview:now+60000,correct:card.correct,incorrect:card.incorrect+1,lastSeen:now};
}
function selectNext(state,verbs,enabledTypes,lastRuleId){
  const now=Date.now(),pool=[];
  for(const rule of RULES){
    if(!enabledTypes.includes(rule.type))continue;
    const candidates=rule.verbFilter(verbs);
    if(!candidates.length)continue;
    pool.push({rule,candidates});
  }
  if(!pool.length)return null;
  const avail=pool.length>1?pool.filter(p=>p.rule.id!==lastRuleId):pool;
  const due=avail.filter(p=>{const c=state.cards[p.rule.id];return c&&c.nextReview<=now;});
  const fresh=avail.filter(p=>!state.cards[p.rule.id]);
  const future=avail.filter(p=>{const c=state.cards[p.rule.id];return c&&c.nextReview>now;});
  let chosen;
  if(due.length){due.sort((a,b)=>state.cards[a.rule.id].nextReview-state.cards[b.rule.id].nextReview);const sl=due.slice(0,Math.min(5,due.length));chosen=sl[Math.floor(Math.random()*sl.length)];}
  else if(fresh.length){chosen=fresh[Math.floor(Math.random()*fresh.length)];}
  else{future.sort((a,b)=>state.cards[a.rule.id].nextReview-state.cards[b.rule.id].nextReview);chosen=future[0];}
  if(!chosen)return null;
  const verb=pickVerb(chosen.candidates,chosen.rule.id,state.verbStats);
  return{id:chosen.rule.id,verb,type:chosen.rule.type,card:state.cards[chosen.rule.id],ruleLabel:chosen.rule.label};
}
function pickVerb(candidates,ruleId,verbStats){
  const vs=verbStats||{};
  const withS=candidates.map(v=>{const s=(vs[v.dict]||{})[ruleId]||{seen:0,incorrect:0};return{v,seen:s.seen,incorrect:s.incorrect};});
  const unseen=withS.filter(x=>x.seen===0);
  if(unseen.length)return unseen[Math.floor(Math.random()*unseen.length)].v;
  const weights=withS.map(x=>x.incorrect+1);
  const total=weights.reduce((a,b)=>a+b,0);
  let r=Math.random()*total;
  for(let i=0;i<withS.length;i++){r-=weights[i];if(r<=0)return withS[i].v;}
  return withS[withS.length-1].v;
}
function fmtInterval(d){if(!d)return'new';if(d<1)return'<1d';if(d<30)return Math.round(d)+'d';if(d<365)return Math.round(d/30)+'mo';return(d/365).toFixed(1)+'y';}

// RULE TAXONOMY
// ============================================================================
const RULES=(()=>{
  const rules=[];
  const short={ichidan:'る-verb',godan:'う-verb',suru:'する',kuru:'来る'};
  for(const g of['ichidan','godan','suru','kuru']){
    for(const t of CONJ_TYPES){
      const ikuEx=g==='godan'&&(t.id==='plain-past'||t.id==='te-form');
      rules.push({
        id:`${g}|${t.id}`,group:g,type:t.id,label:short[g],
        verbFilter:(verbs)=>verbs.filter(v=>v.group===g&&(!ikuEx||!v.reading.endsWith('いく'))),
      });
    }
  }
  for(const tid of['plain-past','te-form']){
    rules.push({
      id:`exception-いく|${tid}`,group:'godan',type:tid,label:'行く (exception)',
      verbFilter:(verbs)=>verbs.filter(v=>v.reading.endsWith('いく')),
    });
  }
  const adjShort={'i-adjective':'い-adj','na-adjective':'な-adj'};
  for(const g of['i-adjective','na-adjective']){
    for(const t of ADJ_TYPES){
      rules.push({
        id:`${g}|${t.id}`,group:g,type:t.id,label:adjShort[g],
        verbFilter:(words)=>words.filter(w=>w.group===g),
      });
    }
  }
  return rules;
})();

const STORAGE_KEY='jp-verb-srs-v2';

const DEFAULT_PREFS={answerMode:'input',autoSpeak:false,dailyGoal:10,scriptMode:'kanji'};

function loadAll(){try{const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return null;return JSON.parse(raw);}catch{return null;}}
function saveAll(state,customVerbs,customAdjectives,syncConfig,lastSyncedAt,geminiKey='',practicePrefs=DEFAULT_PREFS){

}

function cleanCfg(cfg){return{...cfg,url:(cfg.url||'').trim().replace(/\/+$/,''),anonKey:(cfg.anonKey||'').trim(),syncId:(cfg.syncId||'').trim()};}
function syncReady(cfg){return!!(cfg&&cfg.url&&cfg.anonKey&&cfg.syncId);}
async function cloudFetch(cfg){const c=cleanCfg(cfg);const r=await fetch(`${c.url}/rest/v1/srs_state?id=eq.${encodeURIComponent(c.syncId)}&select=data,updated_at`,{headers:{apikey:c.anonKey,Authorization:`Bearer ${c.anonKey}`}});if(!r.ok){const t=await r.text().catch(()=>'');throw new Error(`HTTP ${r.status}${t?': '+t.slice(0,120):''}`);}const rows=await r.json();return rows[0]||null;}
async function cloudUpsert(cfg,payload){const c=cleanCfg(cfg);const r=await fetch(`${c.url}/rest/v1/srs_state`,{method:'POST',headers:{apikey:c.anonKey,Authorization:`Bearer ${c.anonKey}`,'Content-Type':'application/json',Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({id:c.syncId,data:payload,updated_at:new Date().toISOString()})});if(!r.ok){const t=await r.text().catch(()=>'');throw new Error(`HTTP ${r.status}${t?': '+t.slice(0,120):''}`);}};

function App(){
  const[tab,setTab]=useState('study');
  const[state,setState]=useState(defaultState);

  const[customAdjectives,setCustomAdjectives]=useState([]);
  const[practicePrefs,setPracticePrefs]=useState(DEFAULT_PREFS);
  const[syncConfig,setSyncConfig]=useState(DEFAULT_SYNC);
  const[syncStatus,setSyncStatus]=useState({kind:'idle',message:'',at:null});
  const[geminiKey,setGeminiKey]=useState('');
  const[hydrated,setHydrated]=useState(false);
  const pushTimer=useRef(null);
  const lastSyncedAtRef=useRef(0);

  useEffect(()=>{
    const local=loadAll();
    let cfg=DEFAULT_SYNC;
    if(local){
      if(local.state)setState(mergeState(local.state,{reviewed:0,correct:0}));
      if(Array.isArray(local.customVerbs))setCustomVerbs(local.customVerbs);
      if(Array.isArray(local.customAdjectives))setCustomAdjectives(local.customAdjectives);
      if(local.practicePrefs)setPracticePrefs({...DEFAULT_PREFS,...local.practicePrefs});
      if(local.syncConfig){cfg={...DEFAULT_SYNC,...local.syncConfig};setSyncConfig(cfg);}
      if(typeof local.lastSyncedAt==='number')lastSyncedAtRef.current=local.lastSyncedAt;
      if(local.geminiKey)setGeminiKey(local.geminiKey);
    }
    if(cfg.enabled&&syncReady(cfg)){
      setSyncStatus({kind:'syncing',message:'Checking cloud…',at:null});
      cloudFetch(cfg).then(cloud=>{
        if(cloud&&cloud.data){
          const cloudAt=cloud.updated_at?new Date(cloud.updated_at).getTime():0;
          if(cloudAt>lastSyncedAtRef.current){
            if(cloud.data.state)setState(mergeState(cloud.data.state,{reviewed:0,correct:0}));
            if(Array.isArray(cloud.data.customVerbs))setCustomVerbs(cloud.data.customVerbs);
            if(Array.isArray(cloud.data.customAdjectives))setCustomAdjectives(cloud.data.customAdjectives);
            if(cloud.data.practicePrefs)setPracticePrefs({...DEFAULT_PREFS,...cloud.data.practicePrefs});
            lastSyncedAtRef.current=cloudAt;setSyncStatus({kind:'ok',message:'Restored from cloud',at:cloudAt});
          }else{setSyncStatus({kind:'ok',message:'Up to date',at:lastSyncedAtRef.current});}
        }else{setSyncStatus({kind:'ok',message:'New cloud row — will upload',at:null});}
      }).catch(e=>setSyncStatus({kind:'error',message:e.message||'Cloud unreachable',at:null}));
    }
    setHydrated(true);
  },[]);

  useEffect(()=>{
    if(!hydrated)return;
    saveAll(state,customVerbs,customAdjectives,syncConfig,lastSyncedAtRef.current,geminiKey,practicePrefs);
    if(syncConfig.enabled&&syncReady(syncConfig)){
      if(pushTimer.current)clearTimeout(pushTimer.current);
      pushTimer.current=setTimeout(async()=>{
        setSyncStatus(s=>({...s,kind:'syncing',message:'Saving to cloud…'}));
        try{await cloudUpsert(syncConfig,{state,customVerbs,customAdjectives,practicePrefs});const now=Date.now();lastSyncedAtRef.current=now;saveAll(state,customVerbs,customAdjectives,syncConfig,now,geminiKey,practicePrefs);setSyncStatus({kind:'ok',message:'Saved to cloud',at:now});}
        catch(e){setSyncStatus({kind:'error',message:e.message||'Push failed',at:null});}
      },2000);
    }
  },[state,customVerbs,customAdjectives,syncConfig,geminiKey,practicePrefs,hydrated]);

  async function syncNow(){
    if(!syncReady(syncConfig))return;
    setSyncStatus({kind:'syncing',message:'Syncing…',at:null});
    try{
      const cloud=await cloudFetch(syncConfig);
      const cloudAt=cloud&&cloud.updated_at?new Date(cloud.updated_at).getTime():0;
      if(cloud&&cloud.data&&cloudAt>lastSyncedAtRef.current){
        if(cloud.data.state)setState(mergeState(cloud.data.state,state.session));
        if(Array.isArray(cloud.data.customVerbs))setCustomVerbs(cloud.data.customVerbs);
        if(Array.isArray(cloud.data.customAdjectives))setCustomAdjectives(cloud.data.customAdjectives);
        if(cloud.data.practicePrefs)setPracticePrefs({...DEFAULT_PREFS,...cloud.data.practicePrefs});
        lastSyncedAtRef.current=cloudAt;setSyncStatus({kind:'ok',message:'Pulled from cloud',at:cloudAt});
      }else{
        await cloudUpsert(syncConfig,{state,customVerbs,customAdjectives,practicePrefs});const now=Date.now();lastSyncedAtRef.current=now;setSyncStatus({kind:'ok',message:'Pushed to cloud',at:now});
      }
    }catch(e){setSyncStatus({kind:'error',message:e.message||'Sync failed',at:null});}
  }

  const allVerbs=useMemo(()=>[...STARTER_VERBS,...customVerbs],[customVerbs]);
  const allAdjectives=useMemo(()=>[...STARTER_ADJECTIVES,...customAdjectives],[customAdjectives]);
  const allWords=useMemo(()=>[...allVerbs,...allAdjectives],[allVerbs,allAdjectives]);
  const daily=state.daily||defaultState().daily;
  const dailyPct=Math.min(100,Math.round((daily.count/(practicePrefs.dailyGoal||10))*100));

  return(
    <div className="min-h-screen bg-stone-50 text-stone-800" style={{fontFamily:'-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif'}}>
      <div className="max-w-4xl mx-auto px-4 py-3 sm:py-6">
        <header className="mb-4 sm:mb-6 flex items-center justify-between">
          <div><h1 className="text-xl font-semibold tracking-tight">動詞と形容詞 <span className="text-stone-400 font-normal">·</span> Conjugation Dojo</h1><p className="text-xs text-stone-500 mt-0.5">Spaced repetition, reference tables, and AI coaching</p></div>
          <div className="text-xs text-stone-500 text-right">
            <div>{state.session.correct}/{state.session.reviewed} this session</div>
            <div className="mt-1 flex items-center justify-end gap-2"><span>{daily.count}/{practicePrefs.dailyGoal} today</span><span className="inline-block w-14 h-1.5 bg-stone-200 rounded-full overflow-hidden"><span className="block h-full bg-indigo-500" style={{width:dailyPct+'%'}}/></span></div>
            {!!daily.goalStreak&&<div className="text-amber-600 mt-0.5">{daily.goalStreak} day goal streak</div>}
            {syncConfig.enabled&&(<div className={`flex items-center justify-end gap-1 mt-0.5 ${syncStatus.kind==='error'?'text-rose-500':syncStatus.kind==='syncing'?'text-amber-500':'text-emerald-600'}`}><IconCloud className="w-3 h-3"/><span>{syncStatus.kind==='syncing'?'syncing':syncStatus.kind==='error'?'sync error':'synced'}</span></div>)}
          </div>
        </header>
        <nav className="grid grid-cols-3 sm:grid-cols-7 gap-1 mb-4 sm:mb-6 p-1 bg-white rounded-xl border border-stone-200">
          {['study','reference','coach','stats','levels','verbs','settings'].map(t=>(
            <button key={t} onClick={()=>setTab(t)} className={`flex-1 py-2 px-3 rounded-lg text-sm transition capitalize ${tab===t?'bg-stone-800 text-white':'text-stone-600 hover:bg-stone-100'}`}>{t}</button>
          ))}
        </nav>
        {tab==='study'&&<StudyView state={state} setState={setState} verbs={allWords} geminiKey={geminiKey} practicePrefs={practicePrefs}/>}
        {tab==='reference'&&<ReferenceView verbs={allVerbs} adjectives={allAdjectives} geminiKey={geminiKey}/>}
        {tab==='coach'&&<CoachView geminiKey={geminiKey}/>}
        {tab==='stats'&&<StatsView state={state} verbs={allWords}/>}
        {tab==='levels'&&<SRSLevelView state={state} verbs={allWords}/>}
        {tab==='verbs'&&<VerbsView customVerbs={customVerbs} setCustomVerbs={setCustomVerbs} geminiKey={geminiKey} state={state}/>}
        {tab==='settings'&&<SettingsView state={state} setState={setState} customVerbs={customVerbs} setCustomVerbs={setCustomVerbs} customAdjectives={customAdjectives} setCustomAdjectives={setCustomAdjectives} syncConfig={syncConfig} setSyncConfig={setSyncConfig} syncStatus={syncStatus} syncNow={syncNow} geminiKey={geminiKey} setGeminiKey={setGeminiKey} practicePrefs={practicePrefs} setPracticePrefs={setPracticePrefs}/>}
      </div>
    </div>
  );
}

function speakJapanese(text){
  if(!window.speechSynthesis||!text)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ja-JP';u.rate=0.9;
  window.speechSynthesis.speak(u);
}
function shuffled(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function makeChoices(current,verbs){
  const expected=conjugateItem(current.verb,current.type);
  const types=isAdjective(current.verb)?ADJ_TYPES:CONJ_TYPES;
  const set=new Set([expected]);
  for(const t of shuffled(types)){const v=conjugateItem(current.verb,t.id);if(v&&v!==expected)set.add(v);if(set.size>=4)break;}
  for(const v of shuffled(verbs.filter(v=>v.group===current.verb.group))){const x=conjugateItem(v,current.type);if(x&&x!==expected)set.add(x);if(set.size>=4)break;}
  return shuffled([...set].slice(0,4));
}
function StudyView({state,setState,verbs,geminiKey,practicePrefs=DEFAULT_PREFS}){

  useEffect(()=>{if(current===null){setCurrent(selectNext(state,verbs,enabledTypes,null));}},[current]);
  useEffect(()=>{if(phase==='answering'&&inputRef.current)inputRef.current.focus();},[current,phase]);
  useEffect(()=>{if(current&&phase==='reviewing'&&practicePrefs.autoSpeak)speakJapanese(conjugateItem(current.verb,current.type));},[current,phase,practicePrefs.autoSpeak]);

  if(!current)return(<div className="bg-white rounded-2xl border border-stone-200 p-12 text-center"><p className="text-stone-600 mb-2">No cards available</p><p className="text-xs text-stone-400">Enable conjugation types in Settings.</p></div>);

  const diagnostic=phase==='reviewing'&&!wasCorrect?diagnoseItem(current.verb,current.type,answer):'';
  const choices=makeChoices(current,verbs);

    setState({...state,cards:{...state.cards,[rid]:gradeCard(state.cards[rid],ok)},verbStats:newVerbStats,session:{reviewed:state.session.reviewed+1,correct:state.session.correct+(ok?1:0)},daily:bumpDaily(state.daily,ok,practicePrefs.dailyGoal||10)});

function StatsView({state,verbs}){
  const stats=useMemo(()=>{const now=Date.now();let totalReviews=0,totalCorrect=0,due=0,learning=0,mastered=0,fresh=0,total=0;const leeches=[];for(const rule of RULES){if(!state.enabledTypes.includes(rule.type))continue;if(!rule.verbFilter(verbs).length)continue;total++;const c=state.cards[rule.id];if(!c){fresh++;continue;}totalReviews+=c.correct+c.incorrect;totalCorrect+=c.correct;if(c.nextReview<=now)due++;if(c.interval>=30)mastered++;else learning++;if(c.incorrect>=3&&c.incorrect>c.correct*0.5)leeches.push({id:rule.id,rule,card:c});}leeches.sort((a,b)=>b.card.incorrect-a.card.incorrect);return{totalReviews,totalCorrect,acc:totalReviews>0?Math.round((totalCorrect/totalReviews)*100):0,due,learning,mastered,fresh,leeches:leeches.slice(0,10),total};},[state,verbs]);
  const Stat=({label,value})=>(<div className="bg-white rounded-xl border border-stone-200 p-4"><div className="text-2xl font-semibold text-stone-800">{value}</div><div className="text-xs text-stone-500 mt-0.5">{label}</div></div>);
  return(<div className="space-y-4"><div className="grid grid-cols-2 sm:grid-cols-4 gap-3"><Stat label="Due now" value={stats.due}/><Stat label="Learning" value={stats.learning}/><Stat label="Mastered" value={stats.mastered}/><Stat label="New" value={stats.fresh}/></div><div className="bg-white rounded-2xl border border-stone-200 p-5"><div className="flex items-baseline justify-between mb-2"><h3 className="font-medium">Lifetime accuracy</h3><span className="text-2xl font-semibold text-stone-800">{stats.acc}%</span></div><div className="h-2 bg-stone-100 rounded-full overflow-hidden"><div className="h-full bg-emerald-500 transition-all" style={{width:stats.acc+'%'}}/></div><div className="text-xs text-stone-500 mt-2">{stats.totalCorrect} correct / {stats.totalReviews} reviews / {stats.total} rules</div></div><div className="bg-white rounded-2xl border border-stone-200 p-5"><h3 className="font-medium mb-3 flex items-center gap-2"><IconFlame className="w-4 h-4 text-rose-500"/>Leeches</h3>{stats.leeches.length===0?<p className="text-sm text-stone-500">No leeches yet!</p>:<ul className="space-y-2">{stats.leeches.map(l=>(<li key={l.id} className="flex items-center justify-between py-1.5 px-2 hover:bg-stone-50 rounded-lg"><div><span className="font-medium text-stone-700">{l.rule.label}</span><span className="text-xs text-stone-400 ml-2">{TYPE_LABEL[l.rule.type]}</span></div><div className="text-xs text-rose-600">{l.card.incorrect} miss{l.card.incorrect===1?'':'es'}</div></li>))}</ul>}</div></div>);
}

function SRSLevelView({state,verbs}){
  const enabledTypes=state.enabledTypes.length>0?state.enabledTypes:ALL_CARD_TYPES.map(t=>t.id);

  const ruleLevel=useMemo(()=>{const m={};for(const r of RULES)m[r.id]=getCardLevel(state.cards[r.id]);return m;},[state]);

  const levelCounts=useMemo(()=>{
    const c=[0,0,0,0,0,0];
    for(const r of RULES){if(!enabledTypes.includes(r.type))continue;if(!r.verbFilter(verbs).length)continue;c[ruleLevel[r.id]]++;}
    return c;
  },[ruleLevel,enabledTypes,verbs]);
  const totalCards=levelCounts.reduce((s,c)=>s+c,0)||1;

  const byType=useMemo(()=>ALL_CARD_TYPES
    .filter(t=>enabledTypes.includes(t.id))
    .map(t=>({typeObj:t,rules:RULES.filter(r=>r.type===t.id&&r.verbFilter(verbs).length>0)}))
    .filter(row=>row.rules.length>0)
  ,[enabledTypes,verbs]);

  const COL_KEYS=['ichidan','godan','suru','kuru','exception-いく','i-adjective','na-adjective'];
  const COL_HEADS=['る','う','する','来る','行く','い形','な形'];

  return(
    <div className="space-y-4">
      <div className="bg-white rounded-2xl border border-stone-200 p-5">

        <div className="grid grid-cols-3 gap-2 mb-4">
          {SRS_LEVELS.map((l,i)=>(
            <div key={l.id} className={`rounded-xl border p-3 ${l.bg} ${l.border}`}>
              <div className={`text-2xl font-bold ${l.text}`}>{levelCounts[i]}</div>
              <div className={`text-xs font-semibold mt-0.5 ${l.text}`}>{l.name}</div>
              <div className="text-xs text-stone-400 mt-0.5 leading-tight hidden sm:block">{l.sub}</div>
            </div>
          ))}
        </div>
        <div className="h-2.5 bg-stone-100 rounded-full overflow-hidden flex">
          {SRS_LEVELS.map((l,i)=>levelCounts[i]>0?(<div key={l.id} className={`h-full ${l.dot} transition-all`} style={{width:(levelCounts[i]/totalCards*100)+'%'}}/>):null)}
        </div>
        <div className="flex gap-3 mt-2 flex-wrap">
          {SRS_LEVELS.map((l,i)=>levelCounts[i]>0?(<div key={l.id} className="flex items-center gap-1"><div className={`w-2 h-2 rounded-sm ${l.dot}`}/><span className="text-xs text-stone-500">{l.name}</span></div>):null)}
        </div>
      </div>

      <div className="bg-white rounded-2xl border border-stone-200 overflow-hidden">
        <div className="flex items-center px-4 py-2 border-b border-stone-100 bg-stone-50">
          <div className="flex-1 text-xs text-stone-400 font-medium">Conjugation type</div>
          {COL_HEADS.map(h=>(<div key={h} className="w-14 text-center text-xs text-stone-400 font-medium flex-shrink-0" lang="ja">{h}</div>))}
        </div>
        <div className="divide-y divide-stone-50">
          {byType.map(({typeObj,rules})=>(
            <div key={typeObj.id} className="flex items-center px-4 py-2.5">
              <div className="flex-1 min-w-0 pr-2">
                <div className="text-sm text-stone-700 truncate">{typeObj.label}</div>
                {typeObj.sub&&<div className="text-xs text-stone-400" lang="ja">{typeObj.sub}</div>}
              </div>
              {COL_KEYS.map(col=>{
                const rid=col==='exception-いく'?`exception-いく|${typeObj.id}`:`${col}|${typeObj.id}`;
                const rule=rules.find(r=>r.id===rid);
                if(!rule)return(<div key={col} className="w-14 flex justify-center flex-shrink-0"><span className="w-10 h-6 rounded-md bg-stone-50 border border-stone-100 inline-block"/></div>);
                const lDef=SRS_LEVELS[ruleLevel[rule.id]];
                return(
                  <div key={col} className="w-14 flex justify-center flex-shrink-0">
                    <span title={`${typeObj.label} · ${rule.label} — ${lDef.name}`}
                      className={`text-xs font-semibold px-1.5 py-0.5 rounded-md border ${lDef.bg} ${lDef.text} ${lDef.border}`}
                      lang="ja">{COL_HEADS[COL_KEYS.indexOf(col)]}</span>

                );

          ))}
        </div>
      </div>

      <div className="bg-white rounded-2xl border border-stone-200 p-4">
        <div className="text-xs font-semibold text-stone-400 mb-2 uppercase tracking-wider">Level guide</div>
        <div className="space-y-1.5">

            <div key={l.id} className="flex items-center gap-2.5">
              <div className={`w-3 h-3 rounded-sm flex-shrink-0 ${l.dot}`}/>
              <span className={`text-xs font-semibold w-16 flex-shrink-0 ${l.text}`}>{l.name}</span>
              <span className="text-xs text-stone-400">{l.sub}</span>

          ))}

      </div>
    </div>
  );
}

function formRows(item){
  const types=isAdjective(item)?ADJ_TYPES:CONJ_TYPES;
  return types.map(t=>({type:t,answer:conjugateItem(item,t.id),explanation:explainItem(item,t.id)}));
}
function searchWords(query,words){
  const q=query.trim().toLowerCase();
  if(!q)return words;
  const h=toHiragana(q);
  return words.filter(w=>{
    if(w.dict.includes(query)||w.reading.includes(h)||w.meaning.toLowerCase().includes(q)||GROUP_NAMES[w.group].toLowerCase().includes(q))return true;
    return formRows(w).some(r=>r.answer===h||r.answer.includes(h));
  });
}

function VerbsView({customVerbs,setCustomVerbs,geminiKey,state}){
  const[showAdd,setShowAdd]=useState(false);
  const[query,setQuery]=useState('');
  const[addPhase,setAddPhase]=useState('idle');
  const[suggestion,setSuggestion]=useState(null);
  const[addError,setAddError]=useState('');
  const[mf,setMf]=useState({dict:'',reading:'',meaning:'',group:'ichidan'});
  const[mErr,setMErr]=useState('');
  const[verbSugg,setVerbSugg]=useState(null);
  const[suggLoading,setSuggLoading]=useState(false);
  const[suggErr,setSuggErr]=useState('');
  const suggGen=useRef(0);

  const allVerbs=useMemo(()=>[...STARTER_VERBS,...customVerbs],[customVerbs]);

  async function fetchSugg(verbs){
    const gen=++suggGen.current;
    const vlist=verbs||allVerbs;
    setSuggLoading(true);setSuggErr('');setVerbSugg(null);
    try{
      const r=await getSuggestedVerb(vlist,geminiKey);
      if(gen!==suggGen.current)return;
      if(vlist.some(v=>v.dict===r.dict)){setSuggErr('Suggestion was already in your list — try again');return;}
      setVerbSugg(r);
    }
    catch(e){if(gen===suggGen.current)setSuggErr(e.message);}
    finally{if(gen===suggGen.current)setSuggLoading(false);}
  }

  useEffect(()=>{if(geminiKey)fetchSugg();},[geminiKey]);

  function resetAdd(){setShowAdd(false);setQuery('');setAddPhase('idle');setSuggestion(null);setAddError('');setMf({dict:'',reading:'',meaning:'',group:'ichidan'});setMErr('');}

  async function lookup(){
    if(!query.trim()||addPhase==='loading')return;
    setAddPhase('loading');setAddError('');
    try{const r=await lookupVerbWithGemini(query,geminiKey);setSuggestion(r);setAddPhase('confirming');}
    catch(e){setAddPhase('error');setAddError(e.message);}
  }

  function doAdd(verb){
    if([...STARTER_VERBS,...customVerbs].some(v=>v.dict===verb.dict)){setAddError(`${verb.dict} is already in your list`);setAddPhase('error');return;}
    const newCustom=[...customVerbs,verb];
    setCustomVerbs(newCustom);
    resetAdd();
    if(geminiKey)fetchSugg([...STARTER_VERBS,...newCustom]);
  }

  function addManual(){
    setMErr('');
    if(!mf.dict.trim()||!mf.reading.trim()||!mf.meaning.trim()){setMErr('All fields required');return;}
    const reading=toHiragana(mf.reading);
    if(!isAllKana(reading)){setMErr('Reading must be hiragana');return;}
    if(mf.group==='ichidan'&&!reading.endsWith('る')){setMErr('Ichidan must end in る');return;}
    if(mf.group==='godan'&&!/[うくぐすつぬぶむる]$/.test(reading)){setMErr('Godan must end in う/く/ぐ/す/つ/ぬ/ぶ/む/る');return;}
    doAdd({dict:mf.dict.trim(),reading,meaning:mf.meaning.trim(),group:mf.group});
  }

  const groupLabel={ichidan:'る-verb',godan:'う-verb',suru:'irregular',kuru:'irregular'};
  const groupLong={ichidan:'る-verb (ichidan / Group 2)',godan:'う-verb (godan / Group 1)',suru:'irregular する (Group 3)',kuru:'irregular 来る (Group 3)'};

  return(<div className="space-y-4">
    <div className="flex justify-between items-center">
      <div className="text-sm text-stone-600">{STARTER_VERBS.length} starter + {customVerbs.length} custom = {STARTER_VERBS.length+customVerbs.length} verbs</div>
      <button onClick={()=>setShowAdd(!showAdd)} className="flex items-center gap-1.5 px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm transition"><IconPlus className="w-4 h-4"/>Add verb</button>
    </div>

    {geminiKey&&(
      <div className="bg-indigo-50 border border-indigo-200 rounded-2xl p-4">
        <div className="flex items-center justify-between mb-2">
          <div className="text-xs uppercase tracking-wider text-indigo-600 font-medium">💡 Suggested next verb</div>
          <button onClick={()=>fetchSugg()} disabled={suggLoading} className="text-xs text-indigo-500 hover:text-indigo-700 disabled:opacity-50 transition">
            {suggLoading?'…':'Suggest another ↻'}
          </button>
        </div>
        {suggLoading&&!verbSugg&&<div className="text-sm text-indigo-400 italic">Finding a good next verb for you…</div>}
        {suggErr&&<div className="text-sm text-rose-600">{suggErr}</div>}
        {verbSugg&&!suggLoading&&(
          <div className="flex items-start justify-between gap-3">
            <div className="flex-1 min-w-0">
              <div className="flex items-baseline gap-2 flex-wrap">
                <span className="text-2xl font-medium" lang="ja">{verbSugg.dict}</span>
                {verbSugg.dict!==verbSugg.reading&&<span className="text-sm text-indigo-600" lang="ja">{verbSugg.reading}</span>}
              </div>
              <div className="text-sm text-stone-600 italic">{verbSugg.meaning}</div>
              <div className="text-xs text-stone-500 mt-1 leading-relaxed">{verbSugg.reason}</div>
            </div>
            <button onClick={()=>doAdd(verbSugg)} className="flex-shrink-0 px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-medium">Add</button>
          </div>
        )}
      </div>
    )}

    {showAdd&&(<div className="bg-white rounded-2xl border border-stone-200 p-5">
      <h3 className="font-medium mb-3">Add a verb</h3>
      {geminiKey?(
        addPhase!=='confirming'?(
          <div className="space-y-2">
            <div className="flex gap-2">
              <input type="text" value={query}
                onChange={e=>{setQuery(e.target.value);if(addPhase==='error'){setAddPhase('idle');setAddError('');}}}
                onKeyDown={e=>{if(e.key==='Enter')lookup();}}
                placeholder="食べる, taberu, to eat, swim…"
                disabled={addPhase==='loading'}
                autoCorrect="off" autoCapitalize="off" spellCheck="false"
                className="flex-1 px-3 py-2 border border-stone-200 rounded-lg focus:border-indigo-500 focus:outline-none disabled:opacity-50"/>
              <button onClick={lookup} disabled={!query.trim()||addPhase==='loading'}
                className="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-40 text-white rounded-lg text-sm font-medium min-w-16">
                {addPhase==='loading'?'…':'Look up'}
              </button>
            </div>
            {addError&&<div className="text-sm text-rose-600">{addError}</div>}
          </div>
        ):(
          <div className="space-y-3">
            <p className="text-sm text-stone-600">Is this the right verb?</p>
            <div className="bg-stone-50 border border-stone-200 rounded-xl p-4">
              <div className="text-3xl font-medium mb-1" lang="ja">{suggestion.dict}</div>
              {suggestion.dict!==suggestion.reading&&<div className="text-base text-stone-500 mb-1" lang="ja">{suggestion.reading}</div>}
              <div className="text-sm text-stone-500 italic">{suggestion.meaning}</div>
              <div className="text-xs text-stone-400 mt-1">{groupLong[suggestion.group]}</div>
            </div>
            <div className="flex gap-2">
              <button onClick={()=>doAdd(suggestion)} className="flex-1 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-medium">Add verb</button>
              <button onClick={()=>{setAddPhase('idle');setSuggestion(null);setQuery('');}} className="px-3 py-2 border border-stone-200 hover:bg-stone-50 rounded-lg text-sm">Try again</button>
            </div>
          </div>
        )
      ):(
        <div className="space-y-3">
          <p className="text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2">Add a Gemini API key in Settings for AI lookup and suggestions.</p>
          <div className="grid grid-cols-2 gap-3">
            <div><label className="text-xs text-stone-500 block mb-1">Dictionary form</label><input type="text" value={mf.dict} onChange={e=>setMf({...mf,dict:e.target.value})} placeholder="食べる" lang="ja" className="w-full px-3 py-2 border border-stone-200 rounded-lg focus:border-indigo-500 focus:outline-none"/></div>
            <div><label className="text-xs text-stone-500 block mb-1">Reading (kana/romaji)</label><input type="text" value={mf.reading} onChange={e=>setMf({...mf,reading:e.target.value})} placeholder="taberu" lang="ja" className="w-full px-3 py-2 border border-stone-200 rounded-lg focus:border-indigo-500 focus:outline-none"/></div>
          </div>
          <div><label className="text-xs text-stone-500 block mb-1">Meaning</label><input type="text" value={mf.meaning} onChange={e=>setMf({...mf,meaning:e.target.value})} placeholder="to eat" className="w-full px-3 py-2 border border-stone-200 rounded-lg focus:border-indigo-500 focus:outline-none"/></div>
          <div><label className="text-xs text-stone-500 block mb-1">Group</label><div className="flex gap-2">{[{id:'ichidan',label:'る-verb'},{id:'godan',label:'う-verb'},{id:'suru',label:'suru'}].map(g=>(<button key={g.id} onClick={()=>setMf({...mf,group:g.id})} className={`flex-1 px-3 py-2 rounded-lg text-sm border transition ${mf.group===g.id?'bg-stone-800 text-white border-stone-800':'bg-white border-stone-200 hover:border-stone-300'}`}>{g.label}</button>))}</div></div>
          {mErr&&<div className="text-sm text-rose-600">{mErr}</div>}
          <button onClick={addManual} className="w-full py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-medium text-sm">Add</button>
        </div>
      )}
      <button onClick={resetAdd} className="mt-3 text-xs text-stone-400 hover:text-stone-600 block">Cancel</button>
    </div>)}

    <div className="bg-white rounded-2xl border border-stone-200 overflow-hidden"><table className="w-full text-sm"><thead className="bg-stone-50 text-stone-500 text-xs uppercase tracking-wider"><tr><th className="px-4 py-2 text-left font-medium">Verb</th><th className="px-4 py-2 text-left font-medium">Reading</th><th className="px-4 py-2 text-left font-medium hidden sm:table-cell">Meaning</th><th className="px-4 py-2 text-left font-medium">Group</th><th className="px-4 py-2"></th></tr></thead><tbody>{[...STARTER_VERBS,...customVerbs].map((v,i)=>{const vvs=state?.verbStats?.[v.dict]||{};const totalSeen=Object.values(vvs).reduce((s,x)=>s+x.seen,0);const totalIncorrect=Object.values(vvs).reduce((s,x)=>s+x.incorrect,0);const acc=totalSeen>0?Math.round((totalSeen-totalIncorrect)/totalSeen*100):null;return(<tr key={v.dict} className="border-t border-stone-100"><td className="px-4 py-2 font-medium" lang="ja">{v.dict}</td><td className="px-4 py-2 text-stone-600" lang="ja">{v.reading}</td><td className="px-4 py-2 text-stone-500 hidden sm:table-cell">{v.meaning}</td><td className="px-4 py-2 text-xs"><div className="text-stone-500">{groupLabel[v.group]}</div>{acc!==null&&<div className={`mt-0.5 ${acc>=80?'text-emerald-600':acc>=50?'text-amber-600':'text-rose-600'}`}>{totalSeen} seen · {acc}%</div>}</td><td className="px-4 py-2 text-right">{i>=STARTER_VERBS.length&&<button onClick={()=>setCustomVerbs(customVerbs.filter(c=>c.dict!==v.dict))} className="text-stone-400 hover:text-rose-600 transition"><IconTrash className="w-4 h-4"/></button>}</td></tr>);})}</tbody></table></div>
  </div>);
}

// ============================================================================
// SETTINGS VIEW
// ============================================================================
function SettingsView({state,setState,customVerbs,setCustomVerbs,customAdjectives,setCustomAdjectives,syncConfig,setSyncConfig,syncStatus,syncNow,geminiKey,setGeminiKey,practicePrefs,setPracticePrefs}){
  const[confirmReset,setConfirmReset]=useState(false);
  const[exportOpen,setExportOpen]=useState(false);
  const[importOpen,setImportOpen]=useState(false);
  const[importText,setImportText]=useState('');
  const[importErr,setImportErr]=useState('');
  const[msg,setMsg]=useState('');
  const[copyOk,setCopyOk]=useState(false);
  const[syncForm,setSyncForm]=useState({url:syncConfig.url,anonKey:syncConfig.anonKey,syncId:syncConfig.syncId});
  const[localGeminiKey,setLocalGeminiKey]=useState(geminiKey);
  const[geminiMsg,setGeminiMsg]=useState('');

  useEffect(()=>setSyncForm({url:syncConfig.url,anonKey:syncConfig.anonKey,syncId:syncConfig.syncId}),[syncConfig.url,syncConfig.anonKey,syncConfig.syncId]);
  useEffect(()=>setLocalGeminiKey(geminiKey),[geminiKey]);

  const formReady=!!(syncForm.url.trim()&&syncForm.anonKey.trim()&&syncForm.syncId.trim());
  function saveCfg(enabled){setSyncConfig({url:syncForm.url.trim().replace(/\/+$/,''),anonKey:syncForm.anonKey.trim(),syncId:syncForm.syncId.trim(),enabled:enabled!==undefined?enabled:syncConfig.enabled});}
  const exportData=useMemo(()=>JSON.stringify({format:'jp-verb-srs',version:3,exportedAt:new Date().toISOString(),state:{cards:state.cards,enabledTypes:state.enabledTypes,verbStats:state.verbStats||{},daily:state.daily},customVerbs,customAdjectives,practicePrefs}),[state,customVerbs,customAdjectives,practicePrefs]);
  function toggle(id){const has=state.enabledTypes.includes(id);setState({...state,enabledTypes:has?state.enabledTypes.filter(t=>t!==id):[...state.enabledTypes,id]});}
  function reset(){setState({...defaultState(),enabledTypes:state.enabledTypes});setConfirmReset(false);}
  async function copyExport(){try{if(navigator.clipboard?.writeText){await navigator.clipboard.writeText(exportData);setCopyOk(true);setTimeout(()=>setCopyOk(false),2000);}}catch{}}
  function doImport(){setImportErr('');try{const data=JSON.parse(importText.trim());if(data.format!=='jp-verb-srs')throw new Error("doesn't look like a verb-drill backup");if(!data.state||typeof data.state.cards!=='object')throw new Error('missing card data');setState(mergeState(data.state,{reviewed:0,correct:0}));if(Array.isArray(data.customVerbs))setCustomVerbs(data.customVerbs);if(Array.isArray(data.customAdjectives))setCustomAdjectives(data.customAdjectives);if(data.practicePrefs)setPracticePrefs({...DEFAULT_PREFS,...data.practicePrefs});setImportText('');setImportOpen(false);setMsg('Restored!');setTimeout(()=>setMsg(''),3000);}catch(e){setImportErr('Invalid: '+(e.message||'parse failed'));}}
  const statusColor=syncStatus.kind==='error'?'text-rose-700 bg-rose-50 border-rose-200':syncStatus.kind==='syncing'?'text-amber-700 bg-amber-50 border-amber-200':syncStatus.kind==='ok'?'text-emerald-700 bg-emerald-50 border-emerald-200':'text-stone-600 bg-stone-50 border-stone-200';

  return(<div className="space-y-4">
    <div className="bg-white rounded-2xl border border-stone-200 p-5">
      <h3 className="font-medium mb-3">Practice mode</h3>
      <div className="grid sm:grid-cols-2 gap-3">
        <div>
          <label className="text-xs text-stone-500 block mb-1">Answer mode</label>
          <div className="flex gap-2">{[{id:'input',label:'Free input'},{id:'choice',label:'Multiple choice'}].map(o=>(<button key={o.id} onClick={()=>setPracticePrefs({...practicePrefs,answerMode:o.id})} className={`flex-1 px-3 py-2 rounded-lg text-sm border transition ${practicePrefs.answerMode===o.id?'bg-stone-800 text-white border-stone-800':'bg-white border-stone-200 hover:border-stone-300'}`}>{o.label}</button>))}</div>
        </div>
        <div>
          <label className="text-xs text-stone-500 block mb-1">Script</label>
          <div className="flex gap-2">{[{id:'kanji',label:'Kanji + kana'},{id:'hiragana',label:'Hiragana'}].map(o=>(<button key={o.id} onClick={()=>setPracticePrefs({...practicePrefs,scriptMode:o.id})} className={`flex-1 px-3 py-2 rounded-lg text-sm border transition ${practicePrefs.scriptMode===o.id?'bg-stone-800 text-white border-stone-800':'bg-white border-stone-200 hover:border-stone-300'}`}>{o.label}</button>))}</div>
        </div>
        <div>
          <label className="text-xs text-stone-500 block mb-1">Daily goal</label>
          <input type="number" min="1" max="200" value={practicePrefs.dailyGoal} onChange={e=>setPracticePrefs({...practicePrefs,dailyGoal:Math.max(1,Number(e.target.value)||10)})} className="w-full px-3 py-2 border border-stone-200 rounded-lg focus:border-indigo-500 focus:outline-none"/>
        </div>
        <div className="flex items-end">
          <button onClick={()=>setPracticePrefs({...practicePrefs,autoSpeak:!practicePrefs.autoSpeak})} className={`w-full px-3 py-2 rounded-lg text-sm border transition ${practicePrefs.autoSpeak?'bg-indigo-600 text-white border-indigo-600':'bg-white border-stone-200 hover:border-stone-300'}`}><IconVolume className="w-4 h-4 inline-block mr-1.5"/>Speak answers</button>
        </div>
      </div>
    </div>
    <div className="bg-white rounded-2xl border border-stone-200 p-5"><h3 className="font-medium mb-1">Conjugation types in scope</h3><p className="text-xs text-stone-500 mb-4">Toggle which conjugations to drill.</p><div className="space-y-2">{ALL_CARD_TYPES.map(t=>{const on=state.enabledTypes.includes(t.id);return(<div key={t.id} className="flex items-center justify-between py-2 px-3 rounded-lg hover:bg-stone-50"><div><div className="text-sm font-medium">{t.label}</div><div className="text-xs text-stone-500">{t.sub&&(t.sub+' · ')}{t.hint}</div></div><button onClick={()=>toggle(t.id)} className={`relative w-10 h-6 rounded-full transition flex-shrink-0 ${on?'bg-indigo-600':'bg-stone-300'}`}><span className={`absolute top-0.5 left-0.5 w-5 h-5 bg-white rounded-full transition ${on?'translate-x-4':''}`}/></button></div>);})}</div></div>

    <div className="bg-white rounded-2xl border border-stone-200 p-5">
      <h3 className="font-medium mb-1 flex items-center gap-2"><IconChat className="w-4 h-4 text-indigo-600"/>AI Chat (Gemini)</h3>
      <p className="text-xs text-stone-500 mb-3">Powers "Ask Gemini why" after wrong answers, and AI verb lookup. Free key at <span className="text-indigo-600 font-medium">aistudio.google.com</span></p>
      <div><label className="text-xs text-stone-500 block mb-1">Gemini API key</label>
        <input type="password" value={localGeminiKey} onChange={e=>setLocalGeminiKey(e.target.value)} placeholder="AIza..." autoCorrect="off" autoCapitalize="off" spellCheck="false"
          className="w-full px-3 py-2 text-sm font-mono border border-stone-200 rounded-lg focus:border-indigo-500 focus:outline-none"/></div>
      <div className="flex gap-2 mt-3">
        <button onClick={()=>{setGeminiKey(localGeminiKey.trim());setGeminiMsg('Saved!');setTimeout(()=>setGeminiMsg(''),2000);}} disabled={!localGeminiKey.trim()}
          className="flex-1 py-2 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-40 text-white rounded-lg text-sm font-medium">Save key</button>
        {geminiKey&&<button onClick={()=>{setGeminiKey('');setLocalGeminiKey('');}} className="px-3 py-2 border border-stone-200 hover:bg-stone-50 rounded-lg text-sm">Clear</button>}
      </div>
      {geminiMsg&&<div className="mt-2 text-sm text-emerald-700">{geminiMsg}</div>}
      {geminiKey&&!geminiMsg&&<div className="mt-2 text-xs text-emerald-700">✓ Key saved — AI features active</div>}
    </div>

    <div className="bg-white rounded-2xl border border-stone-200 p-5"><h3 className="font-medium mb-1 flex items-center gap-2"><IconCloud className="w-4 h-4 text-indigo-600"/>Cloud sync (Supabase)</h3><p className="text-xs text-stone-500 mb-3">Same values on every device to stay in sync.</p>{(syncStatus.message||syncConfig.enabled)&&(<div className={`mb-3 text-xs rounded-lg border px-3 py-2 ${statusColor}`}><div className="flex items-center justify-between"><span>{syncStatus.message||(syncConfig.enabled?'Enabled':'Disabled')}</span>{syncStatus.at&&<span>{new Date(syncStatus.at).toLocaleTimeString()}</span>}</div></div>)}<div className="space-y-2"><div><label className="text-xs text-stone-500 block mb-1">Project URL</label><input type="text" value={syncForm.url} onChange={e=>setSyncForm({...syncForm,url:e.target.value})} placeholder="https://xxxxx.supabase.co" autoCorrect="off" autoCapitalize="off" spellCheck="false" className="w-full px-3 py-2 text-sm font-mono border border-stone-200 rounded-lg focus:border-indigo-500 focus:outline-none"/></div><div><label className="text-xs text-stone-500 block mb-1">anon / public key</label><input type="password" value={syncForm.anonKey} onChange={e=>setSyncForm({...syncForm,anonKey:e.target.value})} placeholder="eyJ..." autoCorrect="off" autoCapitalize="off" spellCheck="false" className="w-full px-3 py-2 text-sm font-mono border border-stone-200 rounded-lg focus:border-indigo-500 focus:outline-none"/></div><div><label className="text-xs text-stone-500 block mb-1">Sync ID <span className="text-stone-400 font-normal">(same on every device)</span></label><input type="text" value={syncForm.syncId} onChange={e=>setSyncForm({...syncForm,syncId:e.target.value})} placeholder="my-japan-2026-xyz" autoCorrect="off" autoCapitalize="off" spellCheck="false" className="w-full px-3 py-2 text-sm font-mono border border-stone-200 rounded-lg focus:border-indigo-500 focus:outline-none"/></div></div><div className="flex gap-2 mt-3">{!syncConfig.enabled?(<button onClick={()=>saveCfg(true)} disabled={!formReady} className="flex-1 py-2 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-40 text-white rounded-lg text-sm font-medium">Enable sync</button>):(<><button onClick={()=>{saveCfg(true);syncNow();}} disabled={!formReady} className="flex-1 py-2 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-40 text-white rounded-lg text-sm font-medium">Sync now</button><button onClick={()=>saveCfg(false)} className="px-3 py-2 border border-stone-200 hover:bg-stone-50 rounded-lg text-sm">Disable</button></>)}</div></div>

    <div className="bg-white rounded-2xl border border-stone-200 p-5"><h3 className="font-medium mb-1">Backup & restore</h3><p className="text-xs text-stone-500 mb-3">Manual JSON transfer without cloud sync.</p>{msg&&<div className="mb-3 text-sm text-emerald-700 bg-emerald-50 border border-emerald-200 rounded-lg px-3 py-2">{msg}</div>}<div className="flex gap-2"><button onClick={()=>{setExportOpen(!exportOpen);setImportOpen(false);}} className={`flex-1 px-3 py-1.5 border rounded-lg text-sm transition ${exportOpen?'bg-stone-800 text-white border-stone-800':'border-stone-200 hover:bg-stone-50'}`}>Export</button><button onClick={()=>{setImportOpen(!importOpen);setExportOpen(false);setImportErr('');}} className={`flex-1 px-3 py-1.5 border rounded-lg text-sm transition ${importOpen?'bg-stone-800 text-white border-stone-800':'border-stone-200 hover:bg-stone-50'}`}>Import</button></div>{exportOpen&&(<div className="mt-3 space-y-2"><textarea readOnly value={exportData} onFocus={e=>e.target.select()} className="w-full h-32 px-3 py-2 text-xs font-mono border border-stone-200 rounded-lg bg-stone-50"/><button onClick={copyExport} className="w-full py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-medium">{copyOk?'✓ Copied':'Copy to clipboard'}</button></div>)}{importOpen&&(<div className="mt-3 space-y-2"><textarea value={importText} onChange={e=>{setImportText(e.target.value);setImportErr('');}} placeholder="Paste backup JSON…" className="w-full h-32 px-3 py-2 text-xs font-mono border border-stone-200 rounded-lg focus:border-indigo-500 focus:outline-none" autoCorrect="off" autoCapitalize="off" spellCheck="false"/>{importErr&&<div className="text-sm text-rose-600">{importErr}</div>}<p className="text-xs text-rose-600">⚠ Restoring replaces current progress.</p><button onClick={doImport} disabled={!importText.trim()} className="w-full py-2 bg-rose-600 hover:bg-rose-700 disabled:opacity-40 text-white rounded-lg text-sm font-medium">Restore</button></div>)}</div>

    <div className="bg-white rounded-2xl border border-stone-200 p-5"><h3 className="font-medium mb-1">Reset progress</h3><p className="text-xs text-stone-500 mb-3">Clear all SRS state. Custom verbs and settings stay.</p>{!confirmReset?(<button onClick={()=>setConfirmReset(true)} className="flex items-center gap-1.5 px-3 py-1.5 border border-stone-200 hover:bg-stone-50 rounded-lg text-sm"><IconRefresh className="w-4 h-4"/>Reset all progress</button>):(<div className="flex gap-2"><button onClick={reset} className="px-3 py-1.5 bg-rose-600 hover:bg-rose-700 text-white rounded-lg text-sm">Yes, reset</button><button onClick={()=>setConfirmReset(false)} className="px-3 py-1.5 border border-stone-200 hover:bg-stone-50 rounded-lg text-sm">Cancel</button></div>)}</div>
    <div className="text-xs text-stone-400 text-center pt-2">Progress saves automatically to your browser.</div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
if('serviceWorker' in navigator&&location.protocol!=='file:'){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
