  const[showEnglish,setShowEnglish]=useState(true);
  const timerRef=useRef(null);
  const ambient=state.ambient||defaultState().ambient;
  const deck=useMemo(()=>buildAmbientDeck(words,state,practicePrefs,wordLists,mode,18),[words,state.cards,state.mistakes,state.enabledTypes,state.verbStats,practicePrefs,wordLists,mode]);
  const current=deck[index%Math.max(1,deck.length)]||null;
  useEffect(()=>{setIndex(0);setPlaying(false);},[mode,practicePrefs.wordListIds,practicePrefs.jlptLevels,practicePrefs.wordTypes,practicePrefs.genkiLessons]);
  useEffect(()=>()=>{if(timerRef.current)clearTimeout(timerRef.current);},[]);
  useEffect(()=>{
    if(timerRef.current){clearTimeout(timerRef.current);timerRef.current=null;}
    if(!playing||!current)return undefined;
    let cancelled=false;
    speakJapanese(current.example.ja,rate,practicePrefs.voiceURI,()=>{
      if(cancelled)return;
      bumpPlayed();
      timerRef.current=setTimeout(()=>{timerRef.current=null;if(!cancelled)setIndex(i=>(i+1)%deck.length);},1200);
    });
    return()=>{cancelled=true;if(timerRef.current){clearTimeout(timerRef.current);timerRef.current=null;}};
  },[playing,index,current?.id,rate,practicePrefs.voiceURI]);
  function bumpPlayed(){
    setState(s=>{const a=s.ambient||defaultState().ambient;return{...s,ambient:{...a,played:(a.played||0)+1,lastAt:Date.now()}};});
  }
  function startStop(){
    if(!deck.length)return;
    if(playing){setPlaying(false);if(typeof window!=='undefined'&&window.speechSynthesis)window.speechSynthesis.cancel();return;}
    setState(s=>{const a=s.ambient||defaultState().ambient;return{...s,ambient:{...a,sessions:(a.sessions||0)+1,lastAt:Date.now()}};});
    setPlaying(true);

        <button onClick={startStop} className={`px-3 py-2 rounded-lg text-sm font-medium ${playing?'bg-rose-600 hover:bg-rose-700 text-white':'bg-stone-800 hover:bg-stone-900 text-white'}`}>{playing?'Stop':'Play'}</button>
      </div>
      <div className="rounded-2xl bg-stone-50 border border-stone-200 p-5 text-center">
        <div className="text-xs uppercase tracking-wider text-indigo-600 font-medium mb-2">{current.ruleLabel} · {TYPE_LABEL[current.type]}</div>
        <ScriptDisplay view={view} className="text-3xl sm:text-4xl font-medium" subClassName="text-sm text-stone-500 mt-1"/>
        <div className="mt-3 text-sm text-stone-500 italic">{current.item.meaning}</div>
        <div className="my-4 h-px bg-stone-200"/>
        <ScriptDisplay view={formView} className="text-2xl font-semibold" subClassName="text-xs text-stone-500 mt-1"/>
        <div className="mt-3 text-lg leading-relaxed" lang="ja">{current.example.ja}</div>
        {showEnglish&&<div className="mt-2 text-sm text-stone-500">{current.example.en}</div>}

      <div className="grid sm:grid-cols-[1fr_auto] gap-3 mt-4 items-center">

          <input type="range" min="0.55" max="1.1" step="0.05" value={rate} onChange={e=>setRate(Number(e.target.value))} className="w-full"/>
        </div>
        <div className="flex flex-wrap justify-end gap-2">
          <div className="grid grid-cols-2 gap-1 p-1 bg-stone-100 rounded-lg">
            {[{id:'smart',label:'Smart'},{id:'all',label:'All'}].map(o=><button key={o.id} onClick={()=>setMode(o.id)} className={`px-2 py-1.5 rounded-md text-xs font-medium transition ${mode===o.id?'bg-white text-indigo-700 shadow-sm':'text-stone-500 hover:text-stone-800'}`}>{o.label}</button>)}
          </div>

          <button onClick={next} className="px-3 py-2 rounded-lg text-sm border border-stone-200 hover:bg-stone-50">Next</button>

    if(loopMode!=='line')nextLine();
  }
  async function startRecording(){
    setRecordErr('');setTranscript('');setAiFeedback('');

    try{
      setRecordedUrl(url=>{if(url)URL.revokeObjectURL(url);return '';});
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      streamRef.current=stream;
      chunksRef.current=[];
      const rec=new MediaRecorder(stream);

      rec.ondataavailable=e=>{if(e.data.size)chunksRef.current.push(e.data);};
      rec.onstop=()=>{if(chunksRef.current.length){const blob=new Blob(chunksRef.current,{type:'audio/webm'});setRecordedUrl(URL.createObjectURL(blob));}stream.getTracks().forEach(t=>t.stop());if(streamRef.current===stream)streamRef.current=null;recorderRef.current=null;};
      const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
      if(SpeechRecognition){
        const sr=new SpeechRecognition();
        sr.lang='ja-JP';sr.interimResults=false;sr.maxAlternatives=1;

      streamRef.current?.getTracks().forEach(t=>t.stop());

      setRecordErr(e.message||'Could not start recording.');

function formRows(item){
  const types=isAdjective(item)?ADJ_TYPES:CONJ_TYPES;
  return types.map(t=>({type:t,answer:conjugateItem(item,t.id),explanation:explainItem(item,t.id)}));
}
function searchWords(query,words){
  const q=query.trim().toLowerCase();
  if(!q)return words;
  const h=toHiragana(q);
  return words.filter(w=>{
    if(w.dict.includes(query)||w.reading.includes(h)||kanaToRomaji(w.reading).includes(q)||w.meaning.toLowerCase().includes(q)||GROUP_NAMES[w.group].toLowerCase().includes(q))return true;
    return formRows(w).some(r=>r.answer===h||r.answer.includes(h)||kanaToRomaji(r.answer).includes(q));
  });
}
function surfaceStemPair(item){
  if(!item||!item.reading||!item.dict)return{readingStem:'',dictStem:''};
  if(item.group==='suru')return{readingStem:item.reading.endsWith('する')?item.reading.slice(0,-2):'',dictStem:item.dict.endsWith('する')?item.dict.slice(0,-2):item.dict};
  if(item.group==='kuru')return{readingStem:item.reading.endsWith('くる')?item.reading.slice(0,-2):'',dictStem:item.dict.replace(/(来る|くる)$/,'')};
  if(item.group==='i-adjective'){
    if(item.irregular||item.reading==='いい'||item.reading==='かっこいい')return{readingStem:'',dictStem:''};
    return{readingStem:adjectiveStem(item),dictStem:item.dict.endsWith('い')?item.dict.slice(0,-1):item.dict};
  }
  if(item.group==='na-adjective')return{readingStem:item.reading.replace(/な$/,''),dictStem:item.dict.replace(/な$/,'')};
  return{readingStem:item.reading.slice(0,-1),dictStem:item.dict.slice(0,-1)};
}
function surfaceFormFor(item,typeId){
  const answer=conjugateItem(item,typeId);
  if(!answer||!item||!item.dict||item.dict===item.reading)return answer||'';
  const{readingStem,dictStem}=surfaceStemPair(item);
  if(item.group==='kuru'&&answer.startsWith(readingStem)){
    const tail=answer.slice(readingStem.length);
    if(['き','こ','く'].includes(tail[0]))return dictStem+'来'+tail.slice(1);
    return dictStem+tail;
  }
  if(readingStem&&answer.startsWith(readingStem))return dictStem+answer.slice(readingStem.length);
  return answer;
}
function scannerCandidatesForWord(word){
  const seen=new Set(),candidates=[];
  function add(surface,type=null,kind='form',reading=''){
    const s=String(surface||'').trim();
    if(s.length<2||seen.has(s))return;
    seen.add(s);candidates.push({surface:s,type,kind,reading:reading||s});
  }
  add(word.dict,null,'dictionary',word.reading);
  add(word.reading,null,'dictionary',word.reading);
  for(const type of compatibleTypes(word)){
    const answer=conjugateItem(word,type.id);
    add(answer,type,'form',answer);
    add(surfaceFormFor(word,type.id),type,'form',answer);
  }
  return candidates;
}
function findOccurrences(text,needle){
  const hits=[];
  if(!text||!needle)return hits;
  let idx=text.indexOf(needle);
  while(idx!==-1){hits.push(idx);idx=text.indexOf(needle,idx+1);}
  return hits;
}
function findTextScannerMatches(text,words){
  const haystack=String(text||'').normalize('NFKC');
  if(!haystack.trim())return[];
  const out=[],seen=new Set();
  for(const word of words){
    for(const c of scannerCandidatesForWord(word)){
      for(const index of findOccurrences(haystack,c.surface)){
        const key=`${wordKey(word)}|${c.type?.id||'dictionary'}|${c.surface}|${index}`;
        if(seen.has(key))continue;
        seen.add(key);
        out.push({word,key:wordKey(word),surface:c.surface,reading:c.reading,type:c.type,kind:c.kind,index,label:c.type?.label||'Dictionary'});
      }
    }
  }
  return out.sort((a,b)=>a.index-b.index||b.surface.length-a.surface.length).slice(0,240);
}
function uniqueScannerWords(matches){
  const seen=new Set(),out=[];
  for(const m of matches){if(seen.has(m.key))continue;seen.add(m.key);out.push(m.word);}
  return out;
}
function scannerContext(text,index,length){
  const raw=String(text||'');
  const start=Math.max(0,index-18),end=Math.min(raw.length,index+length+18);
  return `${start>0?'...':''}${raw.slice(start,end)}${end<raw.length?'...':''}`;
}
function scannerSentenceContext(text,index,length){
  const raw=String(text||'');
  if(!raw)return'';
  const left=raw.slice(0,Math.max(0,index));
  const rightStart=Math.min(raw.length,index+length);
  const stops=['。','！','？','!','?','\n'];
  let start=0,end=raw.length;
  for(const stop of stops){const pos=left.lastIndexOf(stop);if(pos>=start)start=pos+1;}
  for(const stop of stops){const pos=raw.indexOf(stop,rightStart);if(pos!==-1&&pos+1<end)end=pos+1;}
  return raw.slice(start,end).trim()||scannerContext(text,index,length);
}
function scannerMatchId(match){return match?`${match.key}|${match.type?.id||'dictionary'}|${match.surface}|${match.index}`:'';}
function buildScannerReaderSegments(text,matches){
  const raw=String(text||'');
  if(!raw)return[];
  const ordered=[...matches].sort((a,b)=>a.index-b.index||b.surface.length-a.surface.length);
  const segments=[];
  let cursor=0;
  for(const match of ordered){
    const start=match.index,end=start+match.surface.length;
    if(start<cursor||start<0||end>raw.length)continue;
    if(start>cursor)segments.push({kind:'text',text:raw.slice(cursor,start)});
    segments.push({kind:'match',match,id:scannerMatchId(match)});
    cursor=end;
  }
  if(cursor<raw.length)segments.push({kind:'text',text:raw.slice(cursor)});
  return segments;
}
function normalizeScannerGroup(group){
  const v=String(group||'').trim().toLowerCase();
  if(!v)return null;
  if(v.includes('i-adjective')||v.includes('i adjective')||v.includes('i-adj')||v.includes('い-adj')||v.includes('い adjective')||v.includes('い形容詞'))return'i-adjective';
  if(v.includes('na-adjective')||v.includes('na adjective')||v.includes('na-adj')||v.includes('な-adj')||v.includes('な adjective')||v.includes('な形容詞'))return'na-adjective';
  return normalizeGroup(v);
}
function parseScannerAIWords(text){
  const data=typeof text==='string'?extractJSON(text):text;
  const rows=Array.isArray(data?.words)?data.words:[];
  const seen=new Set();
  return rows.map(row=>{
    const group=normalizeScannerGroup(row.group);
    const dict=String(row.dict||'').trim();
    const reading=toHiragana(String(row.reading||'').trim());
    const meaning=String(row.meaning||'').trim();
    if(!dict||!reading||!meaning||!group||!isAllKana(reading))return null;
    const key=`${group}:${dict}`;
    if(seen.has(key))return null;
    seen.add(key);
    return{dict,reading,meaning,group,evidence:String(row.evidence||row.surface||'').trim()};
  }).filter(Boolean);
}
const SCANNER_TEXT_EXT=/\.(txt|md|csv|tsv|srt|vtt|json|html?)$/i;
function isScannerTextFile(file){return!!file&&(String(file.type||'').startsWith('text/')||SCANNER_TEXT_EXT.test(file.name||''));}
function isScannerImageFile(file){return!!file&&String(file.type||'').startsWith('image/');}
function isScannerPdfFile(file){return!!file&&(String(file.type||'')==='application/pdf'||/\.pdf$/i.test(file.name||''));}
function readScannerFileAsText(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(String(reader.result||''));
    reader.onerror=()=>reject(new Error('Could not read that file.'));
    reader.readAsText(file);
  });
}
function readScannerFileAsDataURL(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(String(reader.result||''));
    reader.onerror=()=>reject(new Error('Could not read that image.'));
    reader.readAsDataURL(file);
  });
}
function scannerInlineDataFromDataURL(dataUrl,file={}){
  const m=String(dataUrl||'').match(/^data:([^;,]+);base64,(.*)$/);
  if(!m)throw new Error('Could not prepare that file.');
  return{inlineData:{mimeType:file.type||m[1]||'application/octet-stream',data:m[2]}};
}

function parseWordRows(text){
  return text.split(/\r?\n/).map(line=>line.trim()).filter(Boolean).map(line=>{
    const cols=line.split(/\t|,/).map(c=>c.trim()).filter(Boolean);
    if(cols.length<4)return null;
    const groupText=cols[3].toLowerCase();
    const group=normalizeGroup(cols[3])||(groupText.includes('i-adjective')||groupText.includes('i-adj')||cols[3].includes('い')?'i-adjective':groupText.includes('na-adjective')||groupText.includes('na-adj')||cols[3].includes('な')?'na-adjective':null);
    if(!group)return null;
    const reading=toHiragana(cols[1]);
    if(!isAllKana(reading))return null;
    return{dict:cols[0],reading,meaning:cols[2],group};
  }).filter(Boolean);
}
function addUniqueWord(list,word){return list.some(w=>w.dict===word.dict&&w.group===word.group)?list:[...list,word];}
function sanitizeExportName(name='dojo'){
  return String(name||'dojo').normalize('NFKC').replace(/[\\/:*?"<>|]+/g,'-').replace(/\s+/g,'-').replace(/-+/g,'-').replace(/^-+|-+$/g,'').slice(0,64)||'dojo';
}
function csvCell(value){
  const s=String(value??'');
  return/[",\r\n]/.test(s)?`"${s.replace(/"/g,'""')}"`:s;
}
function tsvCell(value){return String(value??'').replace(/\r?\n/g,' ').replace(/\t/g,' ').trim();}
function ankiTag(value){return sanitizeExportName(value).toLowerCase().replace(/[^a-z0-9_-]+/g,'_')||'dojo';}
function wordsForList(list,words){
  if(!list)return[];
  const byKey=new Map(words.map(w=>[wordKey(w),w]));
  return(list.wordKeys||[]).map(k=>byKey.get(k)).filter(Boolean);
}
function buildVocabularyCsv(list,words){
  const rows=[['dictionary','reading','meaning','group','kind','jlpt','genki_lesson','list']];
  for(const word of wordsForList(list,words)){
    const meta=getWordMeta(word);
    rows.push([word.dict,word.reading,word.meaning,word.group,isAdjective(word)?'adjective':'verb',meta.jlpt||'',meta.lesson||'',list.name||'Study list']);
  }
  return rows.map(row=>row.map(csvCell).join(',')).join('\n')+'\n';
}
function buildConjugationAnkiTsv(list,words){
  const name=list?.name||'Study list';
  const rows=[
    '#separator:Tab',
    '#html:false',
    `#deck:Conjugation Dojo::${tsvCell(name)}`,
    `#tags:conjugation-dojo ${ankiTag(name)}`,
    ['Prompt','Answer','Base','Reading','Meaning','Group','Form','Rule','Tags'].join('\t')
  ];
  for(const word of wordsForList(list,words)){
    for(const type of compatibleTypes(word)){
      const answer=surfaceFormFor(word,type.id)||conjugateItem(word,type.id);
      if(!answer)continue;
      const explanation=explainItem(word,type.id);
      const prompt=`Conjugate ${word.dict} (${word.reading}) to ${type.label}.`;
      const tags=`conjugation-dojo ${ankiTag(name)} ${ankiTag(word.group)} ${ankiTag(type.id)}`;
      rows.push([prompt,answer,word.dict,word.reading,word.meaning,GROUP_NAMES[word.group]||word.group,type.label,explanation.rule||'',tags].map(tsvCell).join('\t'));
    }
  }
  return rows.join('\n')+'\n';
}
function downloadTextFile(filename,text,mime='text/plain;charset=utf-8'){
  const blob=new Blob([text],{type:mime});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function ListsView({words,customVerbs,setCustomVerbs,customAdjectives,setCustomAdjectives,wordLists,setWordLists,practicePrefs,setPracticePrefs}){
  const[name,setName]=useState('');
  const[activeId,setActiveId]=useState(wordLists[0]?.id||'');
  const[query,setQuery]=useState('');
  const[importText,setImportText]=useState('');
  const[msg,setMsg]=useState('');
  const active=wordLists.find(l=>l.id===activeId)||wordLists[0]||null;
  useEffect(()=>{if(!activeId&&wordLists[0])setActiveId(wordLists[0].id);if(activeId&&!wordLists.some(l=>l.id===activeId))setActiveId(wordLists[0]?.id||'');},[wordLists,activeId]);
  const activeKeys=new Set(active?.wordKeys||[]);
  const matches=useMemo(()=>searchWords(query,words).slice(0,120),[query,words]);
  const activeWords=useMemo(()=>wordsForList(active,words),[active,words]);
  const selectedIds=practicePrefs.wordListIds||[];
  function createList(){
    const n=name.trim()||`List ${wordLists.length+1}`;
    const l={id:'list-'+Date.now().toString(36),name:n,wordKeys:[]};
    setWordLists([...wordLists,l]);setActiveId(l.id);setName('');
  }
  function deleteList(id){
    setWordLists(wordLists.filter(l=>l.id!==id));
    setPracticePrefs({...practicePrefs,wordListIds:selectedIds.filter(x=>x!==id)});
  }
  function toggleActiveFilter(id){
    const next=selectedIds.includes(id)?selectedIds.filter(x=>x!==id):[...selectedIds,id];
    setPracticePrefs({...practicePrefs,wordListIds:next});
  }
  function toggleWord(word){
    if(!active)return;
    const key=wordKey(word);
    const next=activeKeys.has(key)?active.wordKeys.filter(k=>k!==key):[...(active.wordKeys||[]),key];
    setWordLists(wordLists.map(l=>l.id===active.id?{...l,wordKeys:next}:l));
  }
  function importRows(){
    if(!active)return;
    const rows=parseWordRows(importText);
    if(!rows.length){setMsg('No valid rows found. Use dict,reading,meaning,group.');return;}
    let verbs=customVerbs,adjs=customAdjectives,keys=new Set(active.wordKeys||[]);
    for(const r of rows){
      if(isAdjective(r))adjs=addUniqueWord(adjs,r);else verbs=addUniqueWord(verbs,r);
      keys.add(wordKey(r));
    }
    setCustomVerbs(verbs);setCustomAdjectives(adjs);
    setWordLists(wordLists.map(l=>l.id===active.id?{...l,wordKeys:[...keys]}:l));
    setImportText('');setMsg(`Imported ${rows.length} row${rows.length===1?'':'s'} into ${active.name}.`);
  }
  function importPack(pack){
    let list=wordLists.find(l=>l.id==='pack-'+pack.id);
    const id=list?.id||'pack-'+pack.id;
    let verbs=customVerbs,adjs=customAdjectives,keys=new Set(list?.wordKeys||[]);
    for(const w of pack.words){
      if(isAdjective(w))adjs=addUniqueWord(adjs,w);else verbs=addUniqueWord(verbs,w);
      keys.add(wordKey(w));
    }
    if(list)setWordLists(wordLists.map(l=>l.id===id?{...l,name:pack.name,wordKeys:[...keys]}:l));
    else setWordLists([...wordLists,{id,name:pack.name,wordKeys:[...keys]}]);
    setCustomVerbs(verbs);setCustomAdjectives(adjs);setActiveId(id);
    if(!selectedIds.includes(id))setPracticePrefs({...practicePrefs,wordListIds:[...selectedIds,id]});
    setMsg(`Imported ${pack.words.length} words from ${pack.name}.`);
  }
  function exportVocabulary(){
    if(!active||!activeWords.length){setMsg('Choose a list with words before exporting.');return;}
    downloadTextFile(`conjugation-dojo-${sanitizeExportName(active.name)}-vocab.csv`,buildVocabularyCsv(active,words),'text/csv;charset=utf-8');
    setMsg(`Exported ${activeWords.length} vocab row${activeWords.length===1?'':'s'} from ${active.name}.`);
  }
  function exportAnki(){
    if(!active||!activeWords.length){setMsg('Choose a list with words before exporting.');return;}
    const cardCount=activeWords.reduce((sum,w)=>sum+compatibleTypes(w).filter(t=>!!conjugateItem(w,t.id)).length,0);
    downloadTextFile(`conjugation-dojo-${sanitizeExportName(active.name)}-anki.txt`,buildConjugationAnkiTsv(active,words),'text/plain;charset=utf-8');
    setMsg(`Exported ${cardCount} Anki drill row${cardCount===1?'':'s'} from ${active.name}.`);
  }
  return(
    <div className="grid lg:grid-cols-[280px_1fr] gap-4">
      <div className="bg-white rounded-2xl border border-stone-200 overflow-hidden">
        <div className="p-4 border-b border-stone-100">
          <h3 className="font-medium mb-3">Study lists</h3>

        </div>
        <div className="divide-y divide-stone-50">
          {wordLists.length===0?<div className="p-6 text-sm text-stone-500">Create a list to scope drills or collect textbook vocabulary.</div>:wordLists.map(l=>(<div key={l.id} className={`p-3 ${active?.id===l.id?'bg-indigo-50':'bg-white'}`}>
            <button onClick={()=>setActiveId(l.id)} className="w-full text-left"><div className="font-medium text-stone-800">{l.name}</div><div className="text-xs text-stone-500">{(l.wordKeys||[]).length} words</div></button>
            <div className="flex gap-2 mt-2"><button onClick={()=>toggleActiveFilter(l.id)} className={`flex-1 px-2 py-1.5 rounded-lg text-xs border ${selectedIds.includes(l.id)?'bg-stone-800 text-white border-stone-800':'border-stone-200 hover:bg-stone-50'}`}>{selectedIds.includes(l.id)?'In drill':'Use in drill'}</button><button onClick={()=>deleteList(l.id)} className="px-2 py-1.5 border border-stone-200 hover:text-rose-600 rounded-lg text-xs">Delete</button></div>
          </div>))}
        </div>
      </div>
      <div className="space-y-4">
        <div className="bg-white rounded-2xl border border-stone-200 p-5">
          <h3 className="font-medium mb-1">Built-in packs</h3>
          <p className="text-xs text-stone-500 mb-3">Seed drills with curated JLPT-style packs, then edit them as normal lists.</p>
          <div className="grid sm:grid-cols-2 gap-2">
            {VOCAB_PACKS.map(pack=><div key={pack.id} className="border border-stone-200 rounded-xl p-3">
              <div className="flex items-start justify-between gap-2">
                <div><div className="font-medium text-sm">{pack.name}</div><div className="text-xs text-stone-500 mt-0.5">{pack.desc}</div><div className="text-[11px] text-stone-400 mt-1">{pack.words.length} words</div></div>
                <button onClick={()=>importPack(pack)} className="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-xs">Import</button>
              </div>

        <div className="bg-white rounded-2xl border border-stone-200 p-5">
          <div className="flex items-start justify-between gap-3 mb-3">
            <div><h3 className="font-medium">{active?active.name:'No list selected'}</h3><p className="text-xs text-stone-500">Add starter/custom words, then enable lists as drill scopes.</p></div>
            {selectedIds.length>0&&<button onClick={()=>setPracticePrefs({...practicePrefs,wordListIds:[]})} className="text-xs text-stone-400 hover:text-stone-700">Clear list filter</button>}
          </div>
          <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search words or conjugated forms" className="w-full px-3 py-2 text-sm border border-stone-200 rounded-lg focus:border-indigo-500 focus:outline-none" autoCorrect="off" spellCheck="false"/>
          <div className="mt-3 max-h-72 overflow-y-auto grid sm:grid-cols-2 gap-2">
            {matches.map(w=><button key={wordKey(w)} disabled={!active} onClick={()=>toggleWord(w)} className={`text-left px-3 py-2 rounded-xl border transition ${activeKeys.has(wordKey(w))?'bg-emerald-50 border-emerald-200':'bg-white border-stone-200 hover:border-indigo-300'}`}>
              <div className="flex items-center justify-between gap-2"><span className="font-medium" lang="ja">{w.dict}</span><span className="text-[11px] text-stone-400">{isAdjective(w)?'adj':'verb'}</span></div>
              <div className="text-xs text-stone-500" lang="ja">{w.reading}</div><div className="text-xs text-stone-400 truncate">{w.meaning}</div>
            </button>)}
          </div>
        </div>
        <div className="bg-white rounded-2xl border border-stone-200 p-5">
          <div className="flex items-start justify-between gap-3 mb-3">
            <div><h3 className="font-medium">Export active list</h3><p className="text-xs text-stone-500">{active?`${activeWords.length} resolved word${activeWords.length===1?'':'s'}`:'No list selected'}</p></div>
          </div>
          <div className="grid sm:grid-cols-2 gap-2">
            <button onClick={exportAnki} disabled={!activeWords.length} className="px-3 py-2 bg-stone-800 hover:bg-stone-900 disabled:opacity-40 text-white rounded-xl font-medium text-sm">Anki TSV</button>
            <button onClick={exportVocabulary} disabled={!activeWords.length} className="px-3 py-2 border border-stone-200 hover:bg-stone-50 disabled:opacity-40 rounded-xl font-medium text-sm">Vocab CSV</button>
          </div>
        </div>
        <div className="bg-white rounded-2xl border border-stone-200 p-5">
          <h3 className="font-medium mb-1">Bulk import into list</h3>
          <p className="text-xs text-stone-500 mb-3">Paste CSV/TSV rows: dictionary, reading, meaning, group. Groups: ichidan, godan, suru, kuru, i-adjective, na-adjective.</p>
          <textarea value={importText} onChange={e=>{setImportText(e.target.value);setMsg('');}} placeholder={"始める,はじめる,to begin,ichidan\n有名,ゆうめい,famous,na-adjective"} className="w-full h-28 px-3 py-2 text-sm font-mono border border-stone-200 rounded-lg focus:border-indigo-500 focus:outline-none" autoCorrect="off" spellCheck="false"/>
          {msg&&<div className="mt-2 text-sm text-stone-600">{msg}</div>}
          <button onClick={importRows} disabled={!active||!importText.trim()} className="w-full mt-3 py-2 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-40 text-white rounded-xl font-medium">Import rows</button>
        </div>
      </div>
    </div>
  );
}

function VerbsView({customVerbs,setCustomVerbs,geminiKey,state}){
  const[showAdd,setShowAdd]=useState(false);
  const[query,setQuery]=useState('');
  const[addPhase,setAddPhase]=useState('idle');
  const[suggestion,setSuggestion]=useState(null);
  const[addError,setAddError]=useState('');
  const[mf,setMf]=useState({dict:'',reading:'',meaning:'',group:'ichidan'});
  const[mErr,setMErr]=useState('');
  const[verbSugg,setVerbSugg]=useState(null);
  const[suggLoading,setSuggLoading]=useState(false);
  const[suggErr,setSuggErr]=useState('');
  const suggGen=useRef(0);

  const allVerbs=useMemo(()=>[...STARTER_VERBS,...customVerbs],[customVerbs]);

  async function fetchSugg(verbs){
    const gen=++suggGen.current;
    const vlist=verbs||allVerbs;
    setSuggLoading(true);setSuggErr('');setVerbSugg(null);
    try{
      const r=await getSuggestedVerb(vlist,geminiKey);
      if(gen!==suggGen.current)return;
      if(vlist.some(v=>v.dict===r.dict)){setSuggErr('Suggestion was already in your list — try again');return;}
      setVerbSugg(r);
    }
    catch(e){if(gen===suggGen.current)setSuggErr(e.message);}
    finally{if(gen===suggGen.current)setSuggLoading(false);}
  }

  useEffect(()=>{if(geminiKey)fetchSugg();},[geminiKey]);

  function resetAdd(){setShowAdd(false);setQuery('');setAddPhase('idle');setSuggestion(null);setAddError('');setMf({dict:'',reading:'',meaning:'',group:'ichidan'});setMErr('');}

  async function lookup(){
    if(!query.trim()||addPhase==='loading')return;
    setAddPhase('loading');setAddError('');
    try{const r=await lookupVerbWithGemini(query,geminiKey);setSuggestion(r);setAddPhase('confirming');}
    catch(e){setAddPhase('error');setAddError(e.message);}
  }

  function doAdd(verb){
    if([...STARTER_VERBS,...customVerbs].some(v=>v.dict===verb.dict)){setAddError(`${verb.dict} is already in your list`);setAddPhase('error');return;}
    const newCustom=[...customVerbs,verb];
    setCustomVerbs(newCustom);
    resetAdd();
    if(geminiKey)fetchSugg([...STARTER_VERBS,...newCustom]);
  }

  function addManual(){
    setMErr('');
    if(!mf.dict.trim()||!mf.reading.trim()||!mf.meaning.trim()){setMErr('All fields required');return;}
    const reading=toHiragana(mf.reading);
    if(!isAllKana(reading)){setMErr('Reading must be hiragana');return;}
    if(mf.group==='ichidan'&&!reading.endsWith('る')){setMErr('Ichidan must end in る');return;}
    if(mf.group==='godan'&&!/[うくぐすつぬぶむる]$/.test(reading)){setMErr('Godan must end in う/く/ぐ/す/つ/ぬ/ぶ/む/る');return;}
    doAdd({dict:mf.dict.trim(),reading,meaning:mf.meaning.trim(),group:mf.group});
  }

  const groupLabel={ichidan:'る-verb',godan:'う-verb',suru:'irregular',kuru:'irregular'};
  const groupLong={ichidan:'る-verb (ichidan / Group 2)',godan:'う-verb (godan / Group 1)',suru:'irregular する (Group 3)',kuru:'irregular 来る (Group 3)'};

  return(<div className="space-y-4">
    <div className="flex justify-between items-center">
      <div className="text-sm text-stone-600">{STARTER_VERBS.length} starter + {customVerbs.length} custom = {STARTER_VERBS.length+customVerbs.length} verbs</div>
      <button onClick={()=>setShowAdd(!showAdd)} className="flex items-center gap-1.5 px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm transition"><IconPlus className="w-4 h-4"/>Add verb</button>
    </div>

    {geminiKey&&(
      <div className="bg-indigo-50 border border-indigo-200 rounded-2xl p-4">
        <div className="flex items-center justify-between mb-2">
          <div className="text-xs uppercase tracking-wider text-indigo-600 font-medium">💡 Suggested next verb</div>
          <button onClick={()=>fetchSugg()} disabled={suggLoading} className="text-xs text-indigo-500 hover:text-indigo-700 disabled:opacity-50 transition">
            {suggLoading?'…':'Suggest another ↻'}
          </button>
        </div>
        {suggLoading&&!verbSugg&&<div className="text-sm text-indigo-400 italic">Finding a good next verb for you…</div>}
        {suggErr&&<div className="text-sm text-rose-600">{suggErr}</div>}
        {verbSugg&&!suggLoading&&(
          <div className="flex items-start justify-between gap-3">
            <div className="flex-1 min-w-0">
              <div className="flex items-baseline gap-2 flex-wrap">
                <span className="text-2xl font-medium" lang="ja">{verbSugg.dict}</span>
                {verbSugg.dict!==verbSugg.reading&&<span className="text-sm text-indigo-600" lang="ja">{verbSugg.reading}</span>}
              </div>
              <div className="text-sm text-stone-600 italic">{verbSugg.meaning}</div>
              <div className="text-xs text-stone-500 mt-1 leading-relaxed">{verbSugg.reason}</div>
            </div>
            <button onClick={()=>doAdd(verbSugg)} className="flex-shrink-0 px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-medium">Add</button>
          </div>
        )}
      </div>
    )}

    {showAdd&&(<div className="bg-white rounded-2xl border border-stone-200 p-5">
      <h3 className="font-medium mb-3">Add a verb</h3>
      {geminiKey?(
        addPhase!=='confirming'?(
          <div className="space-y-2">
            <div className="flex gap-2">
              <input type="text" value={query}
                onChange={e=>{setQuery(e.target.value);if(addPhase==='error'){setAddPhase('idle');setAddError('');}}}
                onKeyDown={e=>{if(e.key==='Enter')lookup();}}
                placeholder="食べる, taberu, to eat, swim…"
                disabled={addPhase==='loading'}
                autoCorrect="off" autoCapitalize="off" spellCheck="false"
                className="flex-1 px-3 py-2 border border-stone-200 rounded-lg focus:border-indigo-500 focus:outline-none disabled:opacity-50"/>
              <button onClick={lookup} disabled={!query.trim()||addPhase==='loading'}
                className="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-40 text-white rounded-lg text-sm font-medium min-w-16">
                {addPhase==='loading'?'…':'Look up'}
              </button>
            </div>
            {addError&&<div className="text-sm text-rose-600">{addError}</div>}
          </div>
        ):(
          <div className="space-y-3">
            <p className="text-sm text-stone-600">Is this the right verb?</p>
            <div className="bg-stone-50 border border-stone-200 rounded-xl p-4">
              <div className="text-3xl font-medium mb-1" lang="ja">{suggestion.dict}</div>
              {suggestion.dict!==suggestion.reading&&<div className="text-base text-stone-500 mb-1" lang="ja">{suggestion.reading}</div>}
              <div className="text-sm text-stone-500 italic">{suggestion.meaning}</div>
              <div className="text-xs text-stone-400 mt-1">{groupLong[suggestion.group]}</div>
            </div>
            <div className="flex gap-2">
              <button onClick={()=>doAdd(suggestion)} className="flex-1 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-medium">Add verb</button>
              <button onClick={()=>{setAddPhase('idle');setSuggestion(null);setQuery('');}} className="px-3 py-2 border border-stone-200 hover:bg-stone-50 rounded-lg text-sm">Try again</button>
            </div>
          </div>
        )
      ):(
        <div className="space-y-3">
          <p className="text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2">Add a Gemini API key in Settings for AI lookup and suggestions.</p>
          <div className="grid grid-cols-2 gap-3">
            <div><label className="text-xs text-stone-500 block mb-1">Dictionary form</label><input type="text" value={mf.dict} onChange={e=>setMf({...mf,dict:e.target.value})} placeholder="食べる" lang="ja" className="w-full px-3 py-2 border border-stone-200 rounded-lg focus:border-indigo-500 focus:outline-none"/></div>
            <div><label className="text-xs text-stone-500 block mb-1">Reading (kana/romaji)</label><input type="text" value={mf.reading} onChange={e=>setMf({...mf,reading:e.target.value})} placeholder="taberu" lang="ja" className="w-full px-3 py-2 border border-stone-200 rounded-lg focus:border-indigo-500 focus:outline-none"/></div>
          </div>
          <div><label className="text-xs text-stone-500 block mb-1">Meaning</label><input type="text" value={mf.meaning} onChange={e=>setMf({...mf,meaning:e.target.value})} placeholder="to eat" className="w-full px-3 py-2 border border-stone-200 rounded-lg focus:border-indigo-500 focus:outline-none"/></div>
          <div><label className="text-xs text-stone-500 block mb-1">Group</label><div className="flex gap-2">{[{id:'ichidan',label:'る-verb'},{id:'godan',label:'う-verb'},{id:'suru',label:'suru'}].map(g=>(<button key={g.id} onClick={()=>setMf({...mf,group:g.id})} className={`flex-1 px-3 py-2 rounded-lg text-sm border transition ${mf.group===g.id?'bg-stone-800 text-white border-stone-800':'bg-white border-stone-200 hover:border-stone-300'}`}>{g.label}</button>))}</div></div>
          {mErr&&<div className="text-sm text-rose-600">{mErr}</div>}
          <button onClick={addManual} className="w-full py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-medium text-sm">Add</button>
        </div>
      )}
      <button onClick={resetAdd} className="mt-3 text-xs text-stone-400 hover:text-stone-600 block">Cancel</button>
    </div>)}

    <div className="bg-white rounded-2xl border border-stone-200 overflow-hidden"><table className="w-full text-sm"><thead className="bg-stone-50 text-stone-500 text-xs uppercase tracking-wider"><tr><th className="px-4 py-2 text-left font-medium">Verb</th><th className="px-4 py-2 text-left font-medium">Reading</th><th className="px-4 py-2 text-left font-medium hidden sm:table-cell">Meaning</th><th className="px-4 py-2 text-left font-medium">Group</th><th className="px-4 py-2"></th></tr></thead><tbody>{[...STARTER_VERBS,...customVerbs].map((v,i)=>{const vvs=state?.verbStats?.[v.dict]||{};const totalSeen=Object.values(vvs).reduce((s,x)=>s+x.seen,0);const totalIncorrect=Object.values(vvs).reduce((s,x)=>s+x.incorrect,0);const acc=totalSeen>0?Math.round((totalSeen-totalIncorrect)/totalSeen*100):null;return(<tr key={v.dict} className="border-t border-stone-100"><td className="px-4 py-2 font-medium" lang="ja">{v.dict}</td><td className="px-4 py-2 text-stone-600" lang="ja">{v.reading}</td><td className="px-4 py-2 text-stone-500 hidden sm:table-cell">{v.meaning}</td><td className="px-4 py-2 text-xs"><div className="text-stone-500">{groupLabel[v.group]}</div>{acc!==null&&<div className={`mt-0.5 ${acc>=80?'text-emerald-600':acc>=50?'text-amber-600':'text-rose-600'}`}>{totalSeen} seen · {acc}%</div>}</td><td className="px-4 py-2 text-right">{i>=STARTER_VERBS.length&&<button onClick={()=>setCustomVerbs(customVerbs.filter(c=>c.dict!==v.dict))} className="text-stone-400 hover:text-rose-600 transition"><IconTrash className="w-4 h-4"/></button>}</td></tr>);})}</tbody></table></div>
  </div>);
}

// ============================================================================
// SETTINGS VIEW
// ============================================================================
function SettingsView({state,setState,customVerbs,setCustomVerbs,customAdjectives,setCustomAdjectives,wordLists,setWordLists,syncConfig,setSyncConfig,syncStatus,syncNow,geminiKey,setGeminiKey,practicePrefs,setPracticePrefs,speechVoices=[],resolvedTheme='light'}){
  const[confirmReset,setConfirmReset]=useState(false);
  const[exportOpen,setExportOpen]=useState(false);
  const[importOpen,setImportOpen]=useState(false);
  const[importText,setImportText]=useState('');
  const[importErr,setImportErr]=useState('');
  const[msg,setMsg]=useState('');
  const[copyOk,setCopyOk]=useState(false);
  const[syncForm,setSyncForm]=useState({url:syncConfig.url,anonKey:syncConfig.anonKey,syncId:syncConfig.syncId});
  const[localGeminiKey,setLocalGeminiKey]=useState(geminiKey);
  const[geminiMsg,setGeminiMsg]=useState('');

  useEffect(()=>setSyncForm({url:syncConfig.url,anonKey:syncConfig.anonKey,syncId:syncConfig.syncId}),[syncConfig.url,syncConfig.anonKey,syncConfig.syncId]);
  useEffect(()=>setLocalGeminiKey(geminiKey),[geminiKey]);

  const formReady=!!(syncForm.url.trim()&&syncForm.anonKey.trim()&&syncForm.syncId.trim());
  function saveCfg(enabled){setSyncConfig({url:syncForm.url.trim().replace(/\/+$/,''),anonKey:syncForm.anonKey.trim(),syncId:syncForm.syncId.trim(),enabled:enabled!==undefined?enabled:syncConfig.enabled});}
  const exportData=useMemo(()=>JSON.stringify({format:'jp-verb-srs',version:22,exportedAt:new Date().toISOString(),state:{cards:state.cards,enabledTypes:state.enabledTypes,verbStats:state.verbStats||{},mistakes:state.mistakes||[],shadow:state.shadow,ambient:state.ambient,game:state.game,onbin:state.onbin,meaning:state.meaning,mock:state.mock,daily:state.daily,classify:state.classify},customVerbs,customAdjectives,wordLists,practicePrefs}),[state,customVerbs,customAdjectives,wordLists,practicePrefs]);
  function toggle(id){const has=state.enabledTypes.includes(id);setState({...state,enabledTypes:has?state.enabledTypes.filter(t=>t!==id):[...state.enabledTypes,id]});}
  function togglePref(key,id,allIds){
    const cur=practicePrefs[key]||allIds;
    const next=cur.includes(id)?cur.filter(x=>x!==id):[...cur,id];
    setPracticePrefs({...practicePrefs,[key]:next.length?next:allIds});
  }
  function setGenkiLessons(ids){const clean=[...new Set(ids.map(Number))].filter(n=>GENKI_LESSONS.includes(n)).sort((a,b)=>a-b);setPracticePrefs({...practicePrefs,genkiLessons:clean.length===GENKI_LESSONS.length?[]:clean});}
  function toggleGenkiLesson(n){
    const selected=Array.isArray(practicePrefs.genkiLessons)&&practicePrefs.genkiLessons.length?practicePrefs.genkiLessons:GENKI_LESSONS;
    const next=selected.includes(n)?selected.filter(x=>x!==n):[...selected,n];
    setGenkiLessons(next.length?next:GENKI_LESSONS);
  }
  function toggleDisplayScript(id){
    const current=resolveDisplayScripts(practicePrefs);
    const next={...current,[id]:!current[id]};
    if(!next.kanji&&!next.kana&&!next.romaji)next[id]=true;
    setPracticePrefs({...practicePrefs,displayScripts:next,scriptMode:scriptModeFromDisplay(next)});
  }
  function reset(){setState({...defaultState(),enabledTypes:state.enabledTypes});setConfirmReset(false);}
  async function copyExport(){try{if(navigator.clipboard?.writeText){await navigator.clipboard.writeText(exportData);setCopyOk(true);setTimeout(()=>setCopyOk(false),2000);}}catch{}}
  function doImport(){setImportErr('');try{const data=JSON.parse(importText.trim());if(data.format!=='jp-verb-srs')throw new Error("doesn't look like a verb-drill backup");if(!data.state||typeof data.state.cards!=='object')throw new Error('missing card data');setState(mergeState(data.state,{reviewed:0,correct:0}));if(Array.isArray(data.customVerbs))setCustomVerbs(data.customVerbs);if(Array.isArray(data.customAdjectives))setCustomAdjectives(data.customAdjectives);if(Array.isArray(data.wordLists))setWordLists(data.wordLists);if(data.practicePrefs)setPracticePrefs(mergePracticePrefs(data.practicePrefs));setImportText('');setImportOpen(false);setMsg('Restored!');setTimeout(()=>setMsg(''),3000);}catch(e){setImportErr('Invalid: '+(e.message||'parse failed'));}}
  const statusColor=syncStatus.kind==='error'?'text-rose-700 bg-rose-50 border-rose-200':syncStatus.kind==='syncing'?'text-amber-700 bg-amber-50 border-amber-200':syncStatus.kind==='ok'?'text-emerald-700 bg-emerald-50 border-emerald-200':'text-stone-600 bg-stone-50 border-stone-200';
  const displayScripts=resolveDisplayScripts(practicePrefs);
  const selectedGenkiLessons=Array.isArray(practicePrefs.genkiLessons)&&practicePrefs.genkiLessons.length?practicePrefs.genkiLessons:GENKI_LESSONS;
  const selectedVoiceAvailable=!practicePrefs.voiceURI||speechVoices.some(v=>v.voiceURI===practicePrefs.voiceURI);

  return(<div className="space-y-4">
    <div className="bg-white rounded-2xl border border-stone-200 p-5">
      <h3 className="font-medium mb-3">Practice mode</h3>
      <div className="grid sm:grid-cols-2 gap-3">
        <div>
          <label className="text-xs text-stone-500 block mb-1">Answer mode</label>
          <div className="grid grid-cols-3 gap-2">{[{id:'input',label:'Free input'},{id:'guided',label:'Guided kana'},{id:'choice',label:'Choices'}].map(o=>(<button key={o.id} onClick={()=>setPracticePrefs({...practicePrefs,answerMode:o.id})} className={`px-3 py-2 rounded-lg text-sm border transition ${practicePrefs.answerMode===o.id?'bg-stone-800 text-white border-stone-800':'bg-white border-stone-200 hover:border-stone-300'}`}>{o.label}</button>))}</div>
        </div>
        <div>
          <label className="text-xs text-stone-500 block mb-1">Practice focus</label>
          <div className="flex gap-2">{[{id:'balanced',label:'Balanced'},{id:'weak',label:'Weak spots'}].map(o=>(<button key={o.id} onClick={()=>setPracticePrefs({...practicePrefs,practiceFocus:o.id})} className={`flex-1 px-3 py-2 rounded-lg text-sm border transition ${((practicePrefs.practiceFocus||'balanced')===o.id)?'bg-stone-800 text-white border-stone-800':'bg-white border-stone-200 hover:border-stone-300'}`}>{o.label}</button>))}</div>
        </div>
        <div>
          <label className="text-xs text-stone-500 block mb-1">Theme</label>
          <div className="grid grid-cols-3 gap-2">{[{id:'light',label:'Light'},{id:'dark',label:'Dark'},{id:'system',label:`System${resolvedTheme==='dark'?' dark':' light'}`}].map(o=>(<button key={o.id} onClick={()=>setPracticePrefs({...practicePrefs,theme:o.id})} className={`px-3 py-2 rounded-lg text-sm border transition ${((practicePrefs.theme||'system')===o.id)?'bg-stone-800 text-white border-stone-800':'bg-white border-stone-200 hover:border-stone-300'}`}>{o.label}</button>))}</div>
        </div>
        <div>
          <label className="text-xs text-stone-500 block mb-1">Display scripts</label>
          <div className="grid grid-cols-3 gap-2">{[{id:'kanji',label:'Kanji'},{id:'kana',label:'Kana'},{id:'romaji',label:'Romaji'}].map(o=><button key={o.id} onClick={()=>toggleDisplayScript(o.id)} className={`px-3 py-2 rounded-lg text-sm border transition ${displayScripts[o.id]?'bg-stone-800 text-white border-stone-800':'bg-white border-stone-200 hover:border-stone-300'}`}>{o.label}</button>)}</div>
          <button onClick={()=>setPracticePrefs({...practicePrefs,furigana:practicePrefs.furigana===false})} disabled={!(displayScripts.kanji&&displayScripts.kana)} className={`mt-2 w-full px-3 py-2 rounded-lg text-sm border transition disabled:opacity-40 ${practicePrefs.furigana!==false&&displayScripts.kanji&&displayScripts.kana?'bg-indigo-600 text-white border-indigo-600':'bg-white border-stone-200 hover:border-stone-300'}`}>Furigana {practicePrefs.furigana!==false?'on':'off'}</button>
        </div>
        <div className="sm:col-span-2">
          <label className="text-xs text-stone-500 block mb-1">Prompt form</label>
          <select value={practicePrefs.promptForm||'dictionary'} onChange={e=>setPracticePrefs({...practicePrefs,promptForm:e.target.value})} className="w-full px-3 py-2 border border-stone-200 rounded-lg focus:border-indigo-500 focus:outline-none">
            <option value="dictionary">Dictionary form</option>
            <option value="random">Random compatible source form</option>
            <optgroup label="Verb source forms">{CONJ_TYPES.map(t=><option key={t.id} value={t.id}>{t.label}</option>)}</optgroup>
            <optgroup label="Adjective source forms">{ADJ_TYPES.map(t=><option key={t.id} value={t.id}>{t.label}</option>)}</optgroup>
          </select>
          <p className="text-[11px] text-stone-400 mt-1">Practice transformations like て-form → passive; incompatible sources fall back to dictionary form.</p>
        </div>
        <div>
          <label className="text-xs text-stone-500 block mb-1">Daily goal</label>
          <input type="number" min="1" max="200" value={practicePrefs.dailyGoal} onChange={e=>setPracticePrefs({...practicePrefs,dailyGoal:Math.max(1,Number(e.target.value)||10)})} className="w-full px-3 py-2 border border-stone-200 rounded-lg focus:border-indigo-500 focus:outline-none"/>
        </div>
        <div className="flex items-end">
          <button onClick={()=>setPracticePrefs({...practicePrefs,autoSpeak:!practicePrefs.autoSpeak})} className={`w-full px-3 py-2 rounded-lg text-sm border transition ${practicePrefs.autoSpeak?'bg-indigo-600 text-white border-indigo-600':'bg-white border-stone-200 hover:border-stone-300'}`}><IconVolume className="w-4 h-4 inline-block mr-1.5"/>Speak answers</button>
        </div>
        <div className="flex items-end">
          <button onClick={()=>setPracticePrefs({...practicePrefs,listeningPrompt:!practicePrefs.listeningPrompt})} className={`w-full px-3 py-2 rounded-lg text-sm border transition ${practicePrefs.listeningPrompt?'bg-indigo-600 text-white border-indigo-600':'bg-white border-stone-200 hover:border-stone-300'}`}><IconVolume className="w-4 h-4 inline-block mr-1.5"/>Listening prompt</button>
        </div>
        <div className="sm:col-span-2">
          <label className="text-xs text-stone-500 block mb-1">Japanese voice</label>
          <div className="flex gap-2">
            <select value={practicePrefs.voiceURI||''} onChange={e=>setPracticePrefs({...practicePrefs,voiceURI:e.target.value})} className="flex-1 min-w-0 px-3 py-2 border border-stone-200 rounded-lg focus:border-indigo-500 focus:outline-none">
              <option value="">Auto Japanese voice</option>
              {!selectedVoiceAvailable&&<option value={practicePrefs.voiceURI}>Selected voice unavailable</option>}
              {speechVoices.map((v,i)=><option key={v.voiceURI||`${v.name}-${i}`} value={v.voiceURI}>{v.name} - {v.lang}{v.localService?' - local':''}</option>)}
            </select>
            <button onClick={()=>speakJapanese('\u98df\u3079\u3066\u304f\u3060\u3055\u3044',0.85,practicePrefs.voiceURI)} className="px-3 py-2 border border-stone-200 hover:bg-stone-50 rounded-lg text-sm flex items-center gap-1.5"><IconVolume className="w-4 h-4"/>Test</button>
          </div>
          {speechVoices.length===0&&<p className="text-[11px] text-stone-400 mt-1">Japanese voices appear after the browser loads speech voices.</p>}
        </div>
        <div>
          <label className="text-xs text-stone-500 block mb-1">Timed drill</label>
          <select value={practicePrefs.durationSec||0} onChange={e=>setPracticePrefs({...practicePrefs,durationSec:Number(e.target.value)})} className="w-full px-3 py-2 border border-stone-200 rounded-lg focus:border-indigo-500 focus:outline-none">
            <option value="0">Infinite</option><option value="30">30 seconds</option><option value="60">60 seconds</option><option value="120">120 seconds</option><option value="180">180 seconds</option>
          </select>
        </div>
        <div>
          <label className="text-xs text-stone-500 block mb-1">JLPT levels</label>
          <div className="flex gap-1">{JLPT_LEVELS.map(l=>(<button key={l} onClick={()=>togglePref('jlptLevels',l,JLPT_LEVELS)} className={`flex-1 px-2 py-2 rounded-lg text-xs border transition ${(practicePrefs.jlptLevels||JLPT_LEVELS).includes(l)?'bg-stone-800 text-white border-stone-800':'bg-white border-stone-200 hover:border-stone-300'}`}>{l}</button>))}</div>
        </div>
        <div className="sm:col-span-2">
          <div className="flex items-center justify-between gap-3 mb-1">
            <label className="text-xs text-stone-500 block">Genki lessons</label>
            <div className="flex gap-1">
              <button onClick={()=>setGenkiLessons(GENKI_LESSONS)} className="px-2 py-1 rounded-md text-[11px] border border-stone-200 hover:bg-stone-50">All</button>
              <button onClick={()=>setGenkiLessons(GENKI_LESSONS.filter(n=>n<=12))} className="px-2 py-1 rounded-md text-[11px] border border-stone-200 hover:bg-stone-50">I</button>
              <button onClick={()=>setGenkiLessons(GENKI_LESSONS.filter(n=>n>=13))} className="px-2 py-1 rounded-md text-[11px] border border-stone-200 hover:bg-stone-50">II</button>
            </div>
          </div>
          <div className="grid grid-cols-6 sm:grid-cols-[repeat(12,minmax(0,1fr))] gap-1">{GENKI_LESSONS.map(n=><button key={n} onClick={()=>toggleGenkiLesson(n)} className={`px-2 py-2 rounded-lg text-xs border transition ${selectedGenkiLessons.includes(n)?'bg-stone-800 text-white border-stone-800':'bg-white border-stone-200 hover:border-stone-300'}`}>L{n}</button>)}</div>
          <p className="text-[11px] text-stone-400 mt-1">Textbook filtering works together with JLPT, word type, and study-list filters.</p>
        </div>
        <div className="sm:col-span-2">
          <label className="text-xs text-stone-500 block mb-1">Word types</label>
          <div className="grid grid-cols-3 gap-2">{WORD_TYPE_OPTIONS.map(o=>(<button key={o.id} onClick={()=>togglePref('wordTypes',o.id,WORD_TYPE_OPTIONS.map(x=>x.id))} className={`px-3 py-2 rounded-lg text-sm border transition ${(practicePrefs.wordTypes||WORD_TYPE_OPTIONS.map(x=>x.id)).includes(o.id)?'bg-stone-800 text-white border-stone-800':'bg-white border-stone-200 hover:border-stone-300'}`}>{o.label}</button>))}</div>
        </div>
      </div>
    </div>
    <div className="bg-white rounded-2xl border border-stone-200 p-5"><h3 className="font-medium mb-1">Conjugation types in scope</h3><p className="text-xs text-stone-500 mb-4">Toggle which conjugations to drill.</p><div className="space-y-2">{ALL_CARD_TYPES.map(t=>{const on=state.enabledTypes.includes(t.id);return(<div key={t.id} className="flex items-center justify-between py-2 px-3 rounded-lg hover:bg-stone-50"><div><div className="text-sm font-medium">{t.label}</div><div className="text-xs text-stone-500">{t.sub&&(t.sub+' · ')}{t.hint}</div></div><button onClick={()=>toggle(t.id)} className={`relative w-10 h-6 rounded-full transition flex-shrink-0 ${on?'bg-indigo-600':'bg-stone-300'}`}><span className={`absolute top-0.5 left-0.5 w-5 h-5 bg-white rounded-full transition ${on?'translate-x-4':''}`}/></button></div>);})}</div></div>

    <div className="bg-white rounded-2xl border border-stone-200 p-5">
      <h3 className="font-medium mb-1 flex items-center gap-2"><IconChat className="w-4 h-4 text-indigo-600"/>AI Chat (Gemini)</h3>
      <p className="text-xs text-stone-500 mb-3">Powers "Ask Gemini why" after wrong answers, and AI verb lookup. Free key at <span className="text-indigo-600 font-medium">aistudio.google.com</span></p>
      <div><label className="text-xs text-stone-500 block mb-1">Gemini API key</label>
        <input type="password" value={localGeminiKey} onChange={e=>setLocalGeminiKey(e.target.value)} placeholder="AIza..." autoCorrect="off" autoCapitalize="off" spellCheck="false"
          className="w-full px-3 py-2 text-sm font-mono border border-stone-200 rounded-lg focus:border-indigo-500 focus:outline-none"/></div>
      <div className="grid sm:grid-cols-2 gap-3 mt-3">
        <div>
          <label className="text-xs text-stone-500 block mb-1">AI feedback</label>
          <div className="grid grid-cols-2 gap-2">{AI_FEEDBACK_LEVELS.map(o=><button key={o.id} onClick={()=>setPracticePrefs({...practicePrefs,aiFeedbackLevel:o.id})} className={`px-3 py-2 rounded-lg text-sm border transition ${((practicePrefs.aiFeedbackLevel||DEFAULT_PREFS.aiFeedbackLevel)===o.id)?'bg-stone-800 text-white border-stone-800':'bg-white border-stone-200 hover:border-stone-300'}`}>{o.label}</button>)}</div>
        </div>
        <div>
          <label className="text-xs text-stone-500 block mb-1">Guide tone</label>
          <div className="grid grid-cols-3 gap-2">{AI_GUIDE_TONES.map(o=><button key={o.id} onClick={()=>setPracticePrefs({...practicePrefs,aiGuideTone:o.id})} className={`px-3 py-2 rounded-lg text-sm border transition ${((practicePrefs.aiGuideTone||DEFAULT_PREFS.aiGuideTone)===o.id)?'bg-stone-800 text-white border-stone-800':'bg-white border-stone-200 hover:border-stone-300'}`}>{o.label}</button>)}</div>
        </div>
      </div>
      <div className="flex gap-2 mt-3">
        <button onClick={()=>{setGeminiKey(localGeminiKey.trim());setGeminiMsg('Saved!');setTimeout(()=>setGeminiMsg(''),2000);}} disabled={!localGeminiKey.trim()}
          className="flex-1 py-2 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-40 text-white rounded-lg text-sm font-medium">Save key</button>
        {geminiKey&&<button onClick={()=>{setGeminiKey('');setLocalGeminiKey('');}} className="px-3 py-2 border border-stone-200 hover:bg-stone-50 rounded-lg text-sm">Clear</button>}
      </div>
      {geminiMsg&&<div className="mt-2 text-sm text-emerald-700">{geminiMsg}</div>}
      {geminiKey&&!geminiMsg&&<div className="mt-2 text-xs text-emerald-700">✓ Key saved — AI features active</div>}
    </div>

    <div className="bg-white rounded-2xl border border-stone-200 p-5"><h3 className="font-medium mb-1 flex items-center gap-2"><IconCloud className="w-4 h-4 text-indigo-600"/>Cloud sync (Supabase)</h3><p className="text-xs text-stone-500 mb-3">Same values on every device to stay in sync.</p>{(syncStatus.message||syncConfig.enabled)&&(<div className={`mb-3 text-xs rounded-lg border px-3 py-2 ${statusColor}`}><div className="flex items-center justify-between"><span>{syncStatus.message||(syncConfig.enabled?'Enabled':'Disabled')}</span>{syncStatus.at&&<span>{new Date(syncStatus.at).toLocaleTimeString()}</span>}</div></div>)}<div className="space-y-2"><div><label className="text-xs text-stone-500 block mb-1">Project URL</label><input type="text" value={syncForm.url} onChange={e=>setSyncForm({...syncForm,url:e.target.value})} placeholder="https://xxxxx.supabase.co" autoCorrect="off" autoCapitalize="off" spellCheck="false" className="w-full px-3 py-2 text-sm font-mono border border-stone-200 rounded-lg focus:border-indigo-500 focus:outline-none"/></div><div><label className="text-xs text-stone-500 block mb-1">anon / public key</label><input type="password" value={syncForm.anonKey} onChange={e=>setSyncForm({...syncForm,anonKey:e.target.value})} placeholder="eyJ..." autoCorrect="off" autoCapitalize="off" spellCheck="false" className="w-full px-3 py-2 text-sm font-mono border border-stone-200 rounded-lg focus:border-indigo-500 focus:outline-none"/></div><div><label className="text-xs text-stone-500 block mb-1">Sync ID <span className="text-stone-400 font-normal">(same on every device)</span></label><input type="text" value={syncForm.syncId} onChange={e=>setSyncForm({...syncForm,syncId:e.target.value})} placeholder="my-japan-2026-xyz" autoCorrect="off" autoCapitalize="off" spellCheck="false" className="w-full px-3 py-2 text-sm font-mono border border-stone-200 rounded-lg focus:border-indigo-500 focus:outline-none"/></div></div><div className="flex gap-2 mt-3">{!syncConfig.enabled?(<button onClick={()=>saveCfg(true)} disabled={!formReady} className="flex-1 py-2 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-40 text-white rounded-lg text-sm font-medium">Enable sync</button>):(<><button onClick={()=>{saveCfg(true);syncNow();}} disabled={!formReady} className="flex-1 py-2 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-40 text-white rounded-lg text-sm font-medium">Sync now</button><button onClick={()=>saveCfg(false)} className="px-3 py-2 border border-stone-200 hover:bg-stone-50 rounded-lg text-sm">Disable</button></>)}</div></div>

    <div className="bg-white rounded-2xl border border-stone-200 p-5"><h3 className="font-medium mb-1">Backup & restore</h3><p className="text-xs text-stone-500 mb-3">Manual JSON transfer without cloud sync.</p>{msg&&<div className="mb-3 text-sm text-emerald-700 bg-emerald-50 border border-emerald-200 rounded-lg px-3 py-2">{msg}</div>}<div className="flex gap-2"><button onClick={()=>{setExportOpen(!exportOpen);setImportOpen(false);}} className={`flex-1 px-3 py-1.5 border rounded-lg text-sm transition ${exportOpen?'bg-stone-800 text-white border-stone-800':'border-stone-200 hover:bg-stone-50'}`}>Export</button><button onClick={()=>{setImportOpen(!importOpen);setExportOpen(false);setImportErr('');}} className={`flex-1 px-3 py-1.5 border rounded-lg text-sm transition ${importOpen?'bg-stone-800 text-white border-stone-800':'border-stone-200 hover:bg-stone-50'}`}>Import</button></div>{exportOpen&&(<div className="mt-3 space-y-2"><textarea readOnly value={exportData} onFocus={e=>e.target.select()} className="w-full h-32 px-3 py-2 text-xs font-mono border border-stone-200 rounded-lg bg-stone-50"/><button onClick={copyExport} className="w-full py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-medium">{copyOk?'✓ Copied':'Copy to clipboard'}</button></div>)}{importOpen&&(<div className="mt-3 space-y-2"><textarea value={importText} onChange={e=>{setImportText(e.target.value);setImportErr('');}} placeholder="Paste backup JSON…" className="w-full h-32 px-3 py-2 text-xs font-mono border border-stone-200 rounded-lg focus:border-indigo-500 focus:outline-none" autoCorrect="off" autoCapitalize="off" spellCheck="false"/>{importErr&&<div className="text-sm text-rose-600">{importErr}</div>}<p className="text-xs text-rose-600">⚠ Restoring replaces current progress.</p><button onClick={doImport} disabled={!importText.trim()} className="w-full py-2 bg-rose-600 hover:bg-rose-700 disabled:opacity-40 text-white rounded-lg text-sm font-medium">Restore</button></div>)}</div>

    <div className="bg-white rounded-2xl border border-stone-200 p-5"><h3 className="font-medium mb-1">Reset progress</h3><p className="text-xs text-stone-500 mb-3">Clear all SRS state. Custom verbs and settings stay.</p>{!confirmReset?(<button onClick={()=>setConfirmReset(true)} className="flex items-center gap-1.5 px-3 py-1.5 border border-stone-200 hover:bg-stone-50 rounded-lg text-sm"><IconRefresh className="w-4 h-4"/>Reset all progress</button>):(<div className="flex gap-2"><button onClick={reset} className="px-3 py-1.5 bg-rose-600 hover:bg-rose-700 text-white rounded-lg text-sm">Yes, reset</button><button onClick={()=>setConfirmReset(false)} className="px-3 py-1.5 border border-stone-200 hover:bg-stone-50 rounded-lg text-sm">Cancel</button></div>)}</div>
    <div className="text-xs text-stone-400 text-center pt-2">Progress saves automatically to your browser.</div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
if('serviceWorker' in navigator&&location.protocol!=='file:'){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
</body>
</html>
